<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Serenity Spa | Masajes Profesionales</title>
    <meta name="description" content="Descubre la mejor experiencia de bienestar en Serenity Spa. Masajes personalizados en un entorno profesional y relajante.">
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2C3E50;
            --primary-light: #3A546D;
            --secondary: #FDFBF7;
            --accent: #C9A961;
            --accent-dark: #B28B4E;
            --accent-soft: rgba(201, 169, 97, 0.1);
            --text-dark: #1E2A36;
            --text-medium: #4A5B6E;
            --text-light: #7C8B9C;
            --white: #FFFFFF;
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.03);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06), 0 2px 4px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 12px 28px rgba(0, 0, 0, 0.08), 0 4px 10px rgba(0, 0, 0, 0.04);
            --shadow-glow: 0 0 24px rgba(201, 169, 97, 0.25);
            --radius-sm: 12px;
            --radius-md: 20px;
            --radius-lg: 28px;
            --radius-full: 999px;
            --transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
        }

        body {
            font-family: 'Manrope', sans-serif;
            background-color: var(--secondary);
            color: var(--text-dark);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            line-height: 1.2;
            color: var(--primary);
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(253, 251, 247, 0.88);
            backdrop-filter: blur(16px);
            z-index: 1000;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: var(--transition);
            border-bottom: 1px solid rgba(0,0,0,0.04);
        }

        header.scrolled {
            padding: 0.65rem 5%;
            background: rgba(253, 251, 247, 0.95);
            box-shadow: var(--shadow-sm);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
        }

        .logo i {
            color: var(--accent);
            font-size: 1.4rem;
        }

        .logo-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid rgba(201, 169, 97, 0.5);
        }

        nav ul {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        nav a {
            font-weight: 500;
            position: relative;
            padding: 0.5rem 0;
            font-size: 0.9rem;
            color: var(--text-medium);
            transition: color 0.25s ease;
            text-decoration: none;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        nav a:hover {
            color: var(--primary);
        }

        /* HERO - DINÁMICO */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(160deg, rgba(26, 35, 50, 0.9) 0%, rgba(44, 62, 80, 0.82) 50%, rgba(201, 169, 97, 0.6) 100%);
        }

        .hero-content {
            max-width: 760px;
            padding: 2rem;
            animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1);
            position: relative;
            z-index: 1;
        }

        .hero-content h1 {
            font-size: clamp(2.5rem, 6vw, 4.2rem);
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #FFFFFF 20%, #F5E6C8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .hero-content p {
            font-size: clamp(0.95rem, 1.8vw, 1.15rem);
            margin-bottom: 2rem;
            opacity: 0.8;
            color: rgba(255,255,255,0.85);
        }

        .btn-hero {
            background: var(--white);
            color: var(--primary);
            padding: 0.85rem 2rem;
            border-radius: var(--radius-full);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-hero:hover {
            background: var(--accent);
            color: var(--white);
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg), var(--shadow-glow);
        }

        /* SERVICES */
        .services {
            padding: 6rem 5%;
            background: var(--white);
        }

        .section-title {
            text-align: center;
            margin-bottom: 3.5rem;
        }

        .section-title span {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.7rem;
            font-weight: 600;
            display: block;
            margin-bottom: 0.8rem;
        }

        .section-title h2 {
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            position: relative;
            display: inline-block;
        }

        .section-title h2::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 48px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px;
        }

        .section-title p {
            color: var(--text-light);
            max-width: 620px;
            margin: 1.5rem auto 0;
            font-size: 0.95rem;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.04);
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(201, 169, 97, 0.15);
        }

        .card-img {
            width: 100%;
            height: 210px;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .card:hover .card-img {
            transform: scale(1.04);
        }

        .card-content {
            padding: 1.4rem;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.7rem;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .card-header h3 {
            font-size: 1.3rem;
        }

        .price {
            background: var(--accent-soft);
            color: var(--accent-dark);
            padding: 0.25rem 0.85rem;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 0.82rem;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            border: 1px solid rgba(201, 169, 97, 0.12);
        }

        .description {
            color: var(--text-medium);
            margin-bottom: 0.8rem;
            font-size: 0.88rem;
            line-height: 1.5;
        }

        .benefits-list {
            list-style: none;
            margin-top: 0.8rem;
        }

        .benefits-list li {
            display: flex;
            align-items: center;
            gap: 0.55rem;
            margin-bottom: 0.5rem;
            font-size: 0.82rem;
            color: var(--text-light);
        }

        .benefits-list i {
            color: var(--accent);
            font-size: 0.7rem;
        }

        .card-cta {
            margin-top: 1rem;
            padding-top: 0.8rem;
            border-top: 1px solid rgba(0,0,0,0.04);
            display: flex;
            justify-content: flex-end;
        }

        .btn-details {
            color: var(--text-medium);
            font-weight: 600;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: var(--transition);
            text-decoration: none;
        }

        .btn-details:hover {
            color: var(--accent);
            gap: 0.65rem;
        }

        /* MODAL DETALLES */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 35, 50, 0.7);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            padding: 1rem;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--white);
            border-radius: var(--radius-lg);
            max-width: 860px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            transform: scale(0.96) translateY(8px);
            transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            position: relative;
            height: 240px;
            overflow: hidden;
        }

        .modal-header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-header::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(26,35,50,0.85) 0%, transparent 60%);
        }

        .modal-title {
            position: absolute;
            bottom: 1.5rem;
            left: 2rem;
            right: 2rem;
            color: white;
            z-index: 2;
        }

        .modal-title h2 {
            font-size: 1.8rem;
            color: white;
            margin-bottom: 0.5rem;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            z-index: 3;
            color: var(--primary);
        }

        .modal-close:hover {
            background: var(--accent);
            color: white;
            transform: rotate(90deg);
        }

        .modal-body {
            padding: 2rem;
        }

        .modal-section {
            margin-bottom: 2rem;
        }

        .modal-section h3 {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 1.3rem;
        }

        .modal-section h3 i {
            color: var(--accent);
        }

        .benefits-grid, .effects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 0.75rem;
        }

        .benefit-item, .effect-item {
            background: var(--secondary);
            padding: 0.85rem 1rem;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 0.7rem;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .benefit-item:hover, .effect-item:hover {
            background: var(--accent-soft);
            border-color: rgba(201, 169, 97, 0.15);
        }

        .benefit-item i, .effect-item i {
            color: var(--accent);
        }

        .modal-footer {
            padding: 1.5rem 2rem 2rem;
            border-top: 1px solid rgba(0,0,0,0.04);
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .btn-book-now, .btn-share {
            padding: 0.75rem 1.6rem;
            border-radius: var(--radius-full);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            transition: var(--transition);
            border: none;
            font-size: 0.88rem;
        }

        .btn-book-now {
            background: var(--accent);
            color: white;
        }

        .btn-book-now:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .btn-share {
            background: var(--white);
            color: var(--primary);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .btn-share:hover {
            background: var(--primary);
            color: white;
        }

        /* CONTACT / CHAT */
        .contact {
            padding: 5rem 5%;
            background: linear-gradient(160deg, #1a2332 0%, #2C3E50 60%, #3A546D 100%);
            color: white;
            text-align: center;
        }

        .contact .section-title h2,
        .contact .section-title p {
            color: white;
        }

        .contact .section-title h2::after {
            background: var(--accent);
        }

        .chat-container {
            max-width: 820px;
            margin: 2rem auto 0;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(16px);
            border-radius: var(--radius-lg);
            padding: 1.25rem;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .chat-panel {
            background: rgba(255,255,255,0.97);
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            height: 500px;
            overflow: hidden;
        }

        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.9rem 1.4rem;
            background: white;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .chat-header h2 {
            font-size: 1.15rem;
            margin: 0;
            color: var(--primary);
        }

        .chat-header h2 i {
            color: var(--accent);
            margin-right: 0.4rem;
        }

        .status {
            background: rgba(16, 185, 129, 0.1);
            color: #10B981;
            padding: 0.2rem 0.7rem;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 600;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: #f8f9fb;
        }

        .message {
            display: flex;
            gap: 0.7rem;
            max-width: 85%;
        }

        .message.bot {
            align-self: flex-start;
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .avatar {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: #eef0f4;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .message-bubble {
            padding: 0.7rem 1.1rem;
            border-radius: 16px;
            font-size: 0.88rem;
            line-height: 1.5;
            word-break: break-word;
            white-space: pre-wrap;
        }

        .message.bot .message-bubble {
            background: white;
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.04);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            border-bottom-right-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.7rem 1.1rem;
            background: white;
            border-radius: 16px;
            width: fit-content;
        }

        .typing-indicator span {
            width: 7px;
            height: 7px;
            background: #c0c6cf;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        .input-area {
            display: flex;
            gap: 0.5rem;
            padding: 0.9rem;
            background: white;
            border-top: 1px solid rgba(0,0,0,0.06);
        }

        .input-area input {
            flex: 1;
            border: 1px solid rgba(0,0,0,0.08);
            border-radius: var(--radius-full);
            padding: 0.75rem 1rem;
            outline: none;
            font-size: 0.88rem;
            font-family: 'Manrope', sans-serif;
            background: #f8f9fb;
        }

        .input-area input:focus {
            border-color: var(--accent);
            background: white;
            box-shadow: 0 0 0 3px rgba(201, 169, 97, 0.08);
        }

        .input-area button {
            background: var(--accent);
            border: none;
            color: white;
            padding: 0 1.1rem;
            border-radius: var(--radius-full);
            font-size: 1.1rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .input-area button:hover {
            background: var(--accent-dark);
        }

        .input-area.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .share-section {
            background: var(--white);
            padding: 3rem 5%;
            text-align: center;
            border-top: 1px solid rgba(0,0,0,0.04);
        }

        .share-title {
            font-size: 1.2rem;
            margin-bottom: 1.25rem;
            color: var(--primary);
        }

        .share-bar {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
        }

        .share-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.1rem;
            transition: var(--transition);
            border: none;
            cursor: pointer;
        }

        .share-btn.facebook { background: #1877F2; }
        .share-btn.whatsapp { background: #25D366; }
        .share-btn.instagram { background: radial-gradient(circle at 30% 110%, #ffdb8a, #f46f30, #d62976); }

        .share-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0,0,0,0.15);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        .scroll-reveal {
            opacity: 0;
            transform: translateY(24px);
            transition: all 0.7s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .scroll-reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            header { padding: 0.8rem 1.5rem; }
            nav ul { display: none; }
            .services-grid { grid-template-columns: 1fr; }
            .chat-container { padding: 0.75rem; }
            .chat-panel { height: 440px; }
            .modal-header { height: 180px; }
            .modal-title h2 { font-size: 1.4rem; }
            .modal-body { padding: 1.25rem; }
        }
    </style>
</head>
<body>
    <header id="header">
        <div class="logo">
            <i class="fas fa-spa"></i> SERENITY SPA
            <a href="https://pacho-fg.onrender.com>
            <img class="logo-img" src="https://i.ibb.co/LDG7Gf2d/fotor-ai-2025020222510.jpg" alt="Serenity Spa Logo"></a>
        </div>
        <nav>
            <ul>
                <li><a href="#inicio">Inicio</a></li>
                <li><a href="#servicios">Masajes</a></li>
                <li><a href="#contacto">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <!-- HERO - DINÁMICO -->
        <section id="inicio" class="hero" id="heroSection">
            <div class="hero-content">
                <h1 id="heroTitulo">Cargando...</h1>
                <p id="heroSubtitulo"></p>
                <a href="#servicios" class="btn-hero" id="heroBoton"><i class="fas fa-arrow-down"></i> Explorar Tratamientos</a>
            </div>
        </section>

        <!-- SECCIÓN SERVICIOS - DINÁMICA -->
        <section id="servicios" class="services">
            <div class="section-title scroll-reveal">
                <span id="serviciosEtiqueta">Cargando...</span>
                <h2 id="serviciosTitulo"></h2>
                <p id="serviciosDescripcion"></p>
            </div>
            <div class="services-grid" id="servicesGrid">
                <div style="text-align:center; padding:2rem;">Cargando servicios...</div>
            </div>
        </section>

        <!-- SECCIÓN CONTACTO - DINÁMICA -->
        <section id="contacto" class="contact">
            <div class="section-title scroll-reveal">
                <h2 id="contactoTitulo">Cargando...</h2>
                <p id="contactoDescripcion"></p>
            </div>
            <div class="chat-container scroll-reveal">
                <div class="chat-panel">
                    <div class="chat-header">
                        <h2><i class="fas fa-comment-dots"></i> Asistente de Masajes</h2>
                        <div class="status">en línea</div>
                    </div>
                    <div class="messages-area" id="chatMessages"></div>
                    <div class="input-area" id="inputArea">
                        <input type="text" id="userInput" placeholder="Escribe tu mensaje..." autocomplete="off">
                        <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
                    </div>
                </div>
            </div>
        </section>

        <!-- SECCIÓN COMPARTIR - DINÁMICA -->
        <section class="share-section">
            <h3 class="share-title" id="shareTitulo">Cargando...</h3>
            <div class="share-bar">
                <button class="share-btn facebook" data-social="facebook"><i class="fab fa-facebook-f"></i></button>
                <button class="share-btn whatsapp" data-social="whatsapp"><i class="fab fa-whatsapp"></i></button>
                <button class="share-btn instagram" data-social="instagram"><i class="fab fa-instagram"></i></button>
            </div>
        </section>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
            <div class="modal-header">
                <img id="modalImg" src="" alt="Detalle del masaje">
                <div class="modal-title">
                    <h2 id="modalTitle"></h2>
                    <span class="price" id="modalPrice"></span>
                </div>
            </div>
            <div class="modal-body">
                <div class="modal-section">
                    <h3><i class="fas fa-star"></i> Beneficios Principales</h3>
                    <div class="benefits-grid" id="modalBenefits"></div>
                </div>
                <div class="modal-section">
                    <h3><i class="fas fa-heartbeat"></i> Efectos en el Cuerpo</h3>
                    <div class="effects-grid" id="modalEffects"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-book-now" id="modalReserveBtn"><i class="fas fa-calendar-plus"></i> Reservar Ahora</button>
                <button class="btn-share" id="modalShareBtn"><i class="fas fa-share-alt"></i> Compartir</button>
            </div>
        </div>
    </div>

    <script>
        (function(){
            const API_URL = '/turnos';
            const SERVICIOS_API = '/api/servicios';
            const CONFIG_API = '/api/config';
            const DIAS_VALIDOS = ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado', 'domingo'];

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            class SerenitySpaApp {
                constructor() {
                    this.turnos = [];
                    this.servicios = [];
                    this.config = null;
                    this.clientName = null;
                    this.selectedMassageType = null;
                    this.bookingState = null;
                    this.pendingBooking = { nombre: '', dia: '', hora: null, massageType: null, proximo: null, telefono: null, ubicacion: null, tipoServicio: 'salon' };
                    this.isBotTyping = false;
                    this.messageQueue = [];

                    this.initDOM();
                    this.bindEvents();
                    this.cargarConfiguracion();
                    this.cargarServicios();
                    this.cargarTurnos();
                    this.initScrollReveal();
                    this.addMessage('Hola! Soy tu asistente para turnos de masajes. Escribe tu nombre por favor?', 'bot');
                }

                initDOM() {
                    this.servicesGrid = document.getElementById('servicesGrid');
                    this.chatMessages = document.getElementById('chatMessages');
                    this.userInput = document.getElementById('userInput');
                    this.sendBtn = document.getElementById('sendBtn');
                    this.modalOverlay = document.getElementById('modalOverlay');
                    this.modalClose = document.getElementById('modalClose');
                    this.modalReserveBtn = document.getElementById('modalReserveBtn');
                    this.modalShareBtn = document.getElementById('modalShareBtn');
                    this.modalImg = document.getElementById('modalImg');
                    this.modalTitle = document.getElementById('modalTitle');
                    this.modalPrice = document.getElementById('modalPrice');
                    this.modalBenefits = document.getElementById('modalBenefits');
                    this.modalEffects = document.getElementById('modalEffects');
                    this.inputArea = document.getElementById('inputArea');
                    this.header = document.getElementById('header');
                    
                    // Elementos de configuración dinámica
                    this.heroSection = document.getElementById('heroSection');
                    this.heroTitulo = document.getElementById('heroTitulo');
                    this.heroSubtitulo = document.getElementById('heroSubtitulo');
                    this.heroBoton = document.getElementById('heroBoton');
                    this.serviciosEtiqueta = document.getElementById('serviciosEtiqueta');
                    this.serviciosTitulo = document.getElementById('serviciosTitulo');
                    this.serviciosDescripcion = document.getElementById('serviciosDescripcion');
                    this.contactoTitulo = document.getElementById('contactoTitulo');
                    this.contactoDescripcion = document.getElementById('contactoDescripcion');
                    this.shareTitulo = document.getElementById('shareTitulo');
                }

                bindEvents() {
                    this.sendBtn.addEventListener('click', () => this.sendMessage());
                    this.userInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') this.sendMessage(); });
                    this.modalClose.addEventListener('click', () => this.closeModal());
                    this.modalOverlay.addEventListener('click', (e) => { if (e.target === this.modalOverlay) this.closeModal(); });
                    this.modalReserveBtn.addEventListener('click', () => this.initReservationFromModal());
                    this.modalShareBtn.addEventListener('click', () => this.shareOnWhatsApp());
                    
                    document.querySelectorAll('.share-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const social = btn.dataset.social;
                            if (social === 'facebook') this.shareOnFacebook();
                            else if (social === 'whatsapp') this.shareOnWhatsApp();
                            else if (social === 'instagram') this.shareOnInstagram();
                        });
                    });

                    window.addEventListener('scroll', () => {
                        if (window.scrollY > 100) this.header.classList.add('scrolled');
                        else this.header.classList.remove('scrolled');
                    });
                }

                async cargarConfiguracion() {
                    try {
                        const response = await fetch(CONFIG_API);
                        this.config = await response.json();
                        this.aplicarConfiguracion();
                    } catch (error) {
                        console.error('Error al cargar configuración:', error);
                        this.aplicarConfiguracionDefault();
                    }
                }

                aplicarConfiguracion() {
                    if (!this.config) {
                        this.aplicarConfiguracionDefault();
                        return;
                    }
                    
                    // Hero
                    if (this.config.hero) {
                        this.heroTitulo.textContent = this.config.hero.titulo || 'Renueva tu Energía';
                        this.heroSubtitulo.textContent = this.config.hero.subtitulo || 'Experiencias de bienestar diseñadas para armonizar cuerpo, mente y espíritu.';
                        this.heroBoton.innerHTML = `<i class="fas fa-arrow-down"></i> ${this.config.hero.botonTexto || 'Explorar Tratamientos'}`;
                        if (this.config.hero.imagenFondo) {
                            this.heroSection.style.backgroundImage = `linear-gradient(160deg, rgba(26, 35, 50, 0.9) 0%, rgba(44, 62, 80, 0.82) 50%, rgba(201, 169, 97, 0.6) 100%), url('${this.config.hero.imagenFondo}')`;
                        }
                    }
                    
                    // Servicios Section
                    if (this.config.serviciosSection) {
                        this.serviciosEtiqueta.textContent = this.config.serviciosSection.etiqueta || 'Nuestros Servicios';
                        this.serviciosTitulo.textContent = this.config.serviciosSection.titulo || 'Elige tu Masaje Ideal';
                        this.serviciosDescripcion.textContent = this.config.serviciosSection.descripcion || 'Tratamientos personalizados con terapeutas certificados en un ambiente de absoluta tranquilidad.';
                    }
                    
                    // Contacto Section
                    if (this.config.contactoSection) {
                        this.contactoTitulo.textContent = this.config.contactoSection.titulo || 'Asistente de Reservas';
                        this.contactoDescripcion.textContent = this.config.contactoSection.descripcion || 'Habla con nuestro asistente virtual para reservar tu turno de forma rápida y sencilla.';
                    }
                    
                    // Share Section
                    if (this.config.shareSection) {
                        this.shareTitulo.textContent = this.config.shareSection.titulo || 'Comparte Serenity Spa';
                    }
                }

                aplicarConfiguracionDefault() {
                    this.heroTitulo.textContent = 'Renueva tu Energía';
                    this.heroSubtitulo.textContent = 'Experiencias de bienestar diseñadas para armonizar cuerpo, mente y espíritu.';
                    this.heroBoton.innerHTML = '<i class="fas fa-arrow-down"></i> Explorar Tratamientos';
                    this.serviciosEtiqueta.textContent = 'Nuestros Servicios';
                    this.serviciosTitulo.textContent = 'Elige tu Masaje Ideal';
                    this.serviciosDescripcion.textContent = 'Tratamientos personalizados con terapeutas certificados en un ambiente de absoluta tranquilidad.';
                    this.contactoTitulo.textContent = 'Asistente de Reservas';
                    this.contactoDescripcion.textContent = 'Habla con nuestro asistente virtual para reservar tu turno de forma rápida y sencilla.';
                    this.shareTitulo.textContent = 'Comparte Serenity Spa';
                }

                async cargarServicios() {
                    try {
                        const response = await fetch(SERVICIOS_API);
                        this.servicios = await response.json();
                        this.renderServices();
                    } catch (error) {
                        console.error('Error al cargar servicios:', error);
                        if (this.servicesGrid) {
                            this.servicesGrid.innerHTML = '<div style="text-align:center; padding:2rem;">Error al cargar servicios. Refresque la página.</div>';
                        }
                    }
                }

                async cargarTurnos() {
                    try {
                        const resp = await fetch(API_URL);
                        if (!resp.ok) throw new Error();
                        this.turnos = await resp.json();
                    } catch (error) {
                        this.turnos = [];
                    }
                }

                renderServices() {
                    if (!this.servicesGrid) return;
                    
                    if (!this.servicios || this.servicios.length === 0) {
                        this.servicesGrid.innerHTML = '<div style="text-align:center; padding:2rem;">No hay servicios disponibles. El administrador los agregará pronto.</div>';
                        return;
                    }

                    this.servicesGrid.innerHTML = this.servicios.map(s => `
                        <div class="card scroll-reveal" data-id="${s.id}" data-nombre="${escapeHtml(s.nombre)}">
                            <img src="${s.imagen}" alt="${escapeHtml(s.nombre)}" class="card-img" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1544161515-4ab6ce6db874?ixlib=rb-1.2.1&auto=format&fit=crop&w=800&q=80'">
                            <div class="card-content">
                                <div class="card-header">
                                    <h3>${escapeHtml(s.nombre)}</h3>
                                    <span class="price"><i class="fas fa-tag"></i> ${escapeHtml(s.precio)}</span>
                                </div>
                                <p class="description">${escapeHtml(s.descripcion)}</p>
                                <ul class="benefits-list">
                                    ${s.beneficios?.map(b => `<li><i class="fas fa-check-circle"></i> ${escapeHtml(b)}</li>`).join('') || ''}
                                </ul>
                                <div class="card-cta">
                                    <a href="#" class="btn-details">Ver detalles <i class="fas fa-arrow-right"></i></a>
                                </div>
                            </div>
                        </div>
                    `).join('');

                    document.querySelectorAll('.card').forEach(card => {
                        card.addEventListener('click', (e) => {
                            if (e.target.closest('.btn-details')) return;
                            const servicioId = card.dataset.id;
                            const servicioNombre = card.dataset.nombre;
                            if (servicioId) this.openModal(servicioId, servicioNombre);
                        });
                    });
                    
                    document.querySelectorAll('.btn-details').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.preventDefault();
                            const card = btn.closest('.card');
                            if (card && card.dataset.id) this.openModal(card.dataset.id, card.dataset.nombre);
                        });
                    });
                    
                    this.initScrollReveal();
                }

                openModal(servicioId, servicioNombre) {
                    const servicio = this.servicios.find(s => s.id === servicioId);
                    if (!servicio) return;
                    
                    this.modalTitle.textContent = servicio.nombre;
                    this.modalPrice.textContent = servicio.precio;
                    this.modalImg.src = servicio.imagen;
                    
                    this.modalBenefits.innerHTML = (servicio.beneficios || []).map(b => `
                        <div class="benefit-item">
                            <i class="fas fa-check-circle"></i>
                            <span>${escapeHtml(b)}</span>
                        </div>
                    `).join('');
                    
                    this.modalEffects.innerHTML = (servicio.efectos || []).map(e => `
                        <div class="effect-item">
                            <i class="fas fa-bolt"></i>
                            <span>${escapeHtml(e)}</span>
                        </div>
                    `).join('');
                    
                    this.modalReserveBtn.setAttribute('data-massage-nombre', servicio.nombre);
                    this.modalOverlay.classList.add('active');
                    document.body.style.overflow = 'hidden';
                }

                closeModal() {
                    this.modalOverlay.classList.remove('active');
                    document.body.style.overflow = '';
                }

                initReservationFromModal() {
                    const massageNombre = this.modalReserveBtn.getAttribute('data-massage-nombre');
                    this.selectedMassageType = massageNombre;
                    this.closeModal();
                    document.getElementById('contacto').scrollIntoView({ behavior: 'smooth' });
                    
                    if (this.clientName) {
                        this.pendingBooking = { nombre: this.clientName, dia: '', hora: null, massageType: this.selectedMassageType, proximo: null, telefono: null, ubicacion: null, tipoServicio: 'salon' };
                        this.bookingState = 'awaiting_phone';
                        this.addMessage(`Hola de nuevo ${escapeHtml(this.clientName)}. Has seleccionado el Masaje ${escapeHtml(this.selectedMassageType)}. Cuál es tu número de teléfono? (Ej: 099123456)`, 'bot');
                    } else {
                        this.bookingState = 'awaiting_name_with_massage';
                        this.addMessage(`Hola! Has seleccionado el Masaje ${escapeHtml(this.selectedMassageType)}. Para comenzar, cuál es tu nombre?`, 'bot');
                    }
                }

                addMessage(text, sender = 'bot') {
                    if (!this.chatMessages) return;
                    const safeText = escapeHtml(text);
                    
                    if (sender === 'user') {
                        const msgDiv = document.createElement('div');
                        msgDiv.className = 'message user';
                        const avatar = document.createElement('div');
                        avatar.className = 'avatar';
                        avatar.textContent = this.clientName ? this.clientName.charAt(0).toUpperCase() : '?';
                        const bubble = document.createElement('div');
                        bubble.className = 'message-bubble';
                        bubble.innerText = safeText;
                        msgDiv.appendChild(avatar);
                        msgDiv.appendChild(bubble);
                        this.chatMessages.appendChild(msgDiv);
                        this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
                        return;
                    }

                    const typingDiv = document.createElement('div');
                    typingDiv.className = 'message bot typing-placeholder';
                    const avatar = document.createElement('div');
                    avatar.className = 'avatar';
                    const img = document.createElement('img');
                    img.src = 'https://images.unsplash.com/photo-1544161515-4ab6ce6db874?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80';
                    img.alt = 'Asistente';
                    avatar.appendChild(img);
                    const typingIndicator = document.createElement('div');
                    typingIndicator.className = 'typing-indicator';
                    for(let i=0;i<3;i++) typingIndicator.appendChild(document.createElement('span'));
                    typingDiv.appendChild(avatar);
                    typingDiv.appendChild(typingIndicator);
                    this.chatMessages.appendChild(typingDiv);
                    this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
                    this.isBotTyping = true;
                    this.inputArea.classList.add('disabled');

                    setTimeout(() => {
                        if (typingDiv.parentNode) typingDiv.remove();
                        const realMsgDiv = document.createElement('div');
                        realMsgDiv.className = 'message bot';
                        const realAvatar = document.createElement('div');
                        realAvatar.className = 'avatar';
                        const realImg = document.createElement('img');
                        realImg.src = 'https://images.unsplash.com/photo-1544161515-4ab6ce6db874?ixlib=rb-1.2.1&auto=format&fit=crop&w=1920&q=80';
                        realImg.alt = 'Asistente';
                        realAvatar.appendChild(realImg);
                        const realBubble = document.createElement('div');
                        realBubble.className = 'message-bubble';
                        realBubble.innerText = safeText;
                        realMsgDiv.appendChild(realAvatar);
                        realMsgDiv.appendChild(realBubble);
                        this.chatMessages.appendChild(realMsgDiv);
                        this.chatMessages.scrollTop = this.chatMessages.scrollHeight;
                        this.isBotTyping = false;
                        this.inputArea.classList.remove('disabled');
                        if (this.messageQueue.length > 0) {
                            const nextMsg = this.messageQueue.shift();
                            this.procesarMensaje(nextMsg);
                        }
                    }, 1200);
                }

                sendMessage() {
                    const texto = this.userInput.value.trim();
                    if (texto === '') return;
                    this.addMessage(texto, 'user');
                    this.userInput.value = '';
                    if (this.isBotTyping) {
                        this.messageQueue.push(texto);
                    } else {
                        this.procesarMensaje(texto);
                    }
                }

                normalizarDia(msg) {
                    const dia = msg.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
                    const map = { 'lunes':'lunes','martes':'martes','miercoles':'miercoles','jueves':'jueves','viernes':'viernes','sabado':'sabado','domingo':'domingo' };
                    for (let key in map) if (dia.includes(key)) return map[key];
                    return null;
                }

                capitalize(str) {
                    if (!str) return '';
                    return str.charAt(0).toUpperCase() + str.slice(1);
                }

                horarioOcupado(dia, hora, excluirIndex = -1) {
                    return this.turnos.some((t, idx) => t.dia === dia && t.hora === hora && idx !== excluirIndex);
                }

                buscarProximoDisponible(dia, hora, excluirIndex = -1) {
                    let diaIndex = DIAS_VALIDOS.indexOf(dia.toLowerCase());
                    if (diaIndex === -1) return null;
                    
                    for (let d = 0; d < 7; d++) {
                        let diaActualIndex = (diaIndex + d) % 7;
                        let diaActual = DIAS_VALIDOS[diaActualIndex];
                        let horaInicio = (d === 0) ? hora : 8;
                        for (let h = horaInicio; h < 22; h++) {
                            if (!this.horarioOcupado(diaActual, h, excluirIndex)) return { dia: diaActual, hora: h };
                        }
                    }
                    return null;
                }

                async agregarTurno(nombre, dia, hora, massageType = null, telefono = null, ubicacion = null, tipoServicio = 'salon') {
                    try {
                        const resp = await fetch(API_URL, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ 
                                nombre: escapeHtml(nombre), 
                                dia, 
                                hora, 
                                massageType: massageType ? escapeHtml(massageType) : null, 
                                telefono: telefono ? escapeHtml(telefono) : null, 
                                ubicacion: ubicacion ? escapeHtml(ubicacion) : null, 
                                tipoServicio 
                            })
                        });
                        const data = await resp.json();
                        if (!resp.ok) throw new Error(data.error || 'Error en reserva');
                        await this.cargarTurnos();
                        return data;
                    } catch (error) {
                        return { error: error.message };
                    }
                }

                async iniciarReservaDirect() {
                    if (this.clientName) {
                        this.pendingBooking = { nombre: this.clientName, dia: '', hora: null, massageType: null, proximo: null, telefono: null, ubicacion: null, tipoServicio: 'salon' };
                        this.bookingState = 'awaiting_phone_simple';
                        this.addMessage(`Gracias ${escapeHtml(this.clientName)}. Cuál es tu número de teléfono?`, 'bot');
                    } else {
                        this.bookingState = 'awaiting_name_simple';
                        this.addMessage('Para reservar un turno, necesito tu nombre. Cuál es?', 'bot');
                    }
                }

                async manejarReservaConMasaje(msg) {
                    if (this.bookingState === 'awaiting_name_with_massage') {
                        if (!msg.trim()) { this.addMessage('Por favor, ingresa tu nombre.', 'bot'); return; }
                        this.clientName = escapeHtml(msg);
                        this.pendingBooking.nombre = this.clientName;
                        this.bookingState = 'awaiting_phone';
                        this.addMessage(`Gracias ${this.clientName}. Cuál es tu número de teléfono? (Ej: 099123456)`, 'bot');
                    }
                    else if (this.bookingState === 'awaiting_phone') {
                        const telefono = msg.replace(/\D/g, '');
                        if (telefono.length < 8) { this.addMessage('Por favor, ingresa un número de teléfono válido (mínimo 8 dígitos).', 'bot'); return; }
                        this.pendingBooking.telefono = telefono;
                        this.bookingState = 'awaiting_service_type';
                        this.addMessage(`Dónde prefieres recibir el masaje?\n1. En el salón\n2. A domicilio\nResponde "1" o "2"`, 'bot');
                    }
                    else if (this.bookingState === 'awaiting_service_type') {
                        if (msg === '1') {
                            this.pendingBooking.tipoServicio = 'salon';
                            this.pendingBooking.ubicacion = 'Salón Serenity Spa';
                            this.bookingState = 'awaiting_day';
                            this.addMessage(`Perfecto. Has elegido servicio en el salón. Qué día prefieres? (Ej: lunes, martes...)`, 'bot');
                        } else if (msg === '2') {
                            this.pendingBooking.tipoServicio = 'domicilio';
                            this.bookingState = 'awaiting_location';
                            this.addMessage(`Has elegido servicio a domicilio. Por favor, ingresa la dirección completa:`, 'bot');
                        } else {
                            this.addMessage(`Por favor, responde "1" para salón o "2" para domicilio.`, 'bot');
                        }
                    }
                    else if (this.bookingState === 'awaiting_location') {
                        if (!msg.trim()) { this.addMessage('Por favor, ingresa una dirección válida.', 'bot'); return; }
                        this.pendingBooking.ubicacion = escapeHtml(msg);
                        this.bookingState = 'awaiting_day';
                        this.addMessage(`Dirección registrada. Qué día prefieres para tu masaje a domicilio?`, 'bot');
                    }
                    else if (this.bookingState === 'awaiting_day') {
                        const dia = this.normalizarDia(msg);
                        if (!dia) { this.addMessage('Día no reconocido. Escribe lunes, martes...', 'bot'); return; }
                        this.pendingBooking.dia = dia;
                        this.bookingState = 'awaiting_time';
                        this.addMessage('A qué hora? (formato 24h, ejemplo: 15 para las 3pm)', 'bot');
                    }
                    else if (this.bookingState === 'awaiting_time') {
                        const hora = parseInt(msg, 10);
                        if (isNaN(hora) || hora < 8 || hora > 22) { this.addMessage('Hora válida entre 8 y 22.', 'bot'); return; }
                        this.pendingBooking.hora = hora;
                        if (!this.horarioOcupado(this.pendingBooking.dia, this.pendingBooking.hora)) {
                            const resultado = await this.agregarTurno(this.pendingBooking.nombre, this.pendingBooking.dia, this.pendingBooking.hora, this.selectedMassageType, this.pendingBooking.telefono, this.pendingBooking.ubicacion, this.pendingBooking.tipoServicio);
                            if (resultado.error) {
                                this.addMessage(`${resultado.error}`, 'bot');
                            } else {
                                const tipoTexto = this.pendingBooking.tipoServicio === 'domicilio' ? 'a domicilio' : 'en el salón';
                                this.addMessage(`✅ Turno confirmado!\n\nDatos de la reserva:\n${this.pendingBooking.nombre}\n${this.pendingBooking.telefono}\n${this.selectedMassageType}\n${tipoTexto}\n${this.capitalize(this.pendingBooking.dia)} a las ${this.pendingBooking.hora}:00\n${this.pendingBooking.tipoServicio === 'domicilio' ? this.pendingBooking.ubicacion : ''}\n\nTe esperamos!`, 'bot');
                            }
                            this.bookingState = null;
                            this.pendingBooking = { nombre: '', dia: '', hora: null, massageType: null, proximo: null, telefono: null, ubicacion: null, tipoServicio: 'salon' };
                            this.selectedMassageType = null;
                        } else {
                            const proximo = this.buscarProximoDisponible(this.pendingBooking.dia, this.pendingBooking.hora);
                            if (proximo) {
                                this.addMessage(`⚠️ El horario del ${this.capitalize(this.pendingBooking.dia)} a las ${this.pendingBooking.hora}:00 está ocupado. ¿Quieres el próximo disponible: ${this.capitalize(proximo.dia)} a las ${proximo.hora}:00? Responde "si" para aceptar.`, 'bot');
                                this.bookingState = 'awaiting_confirmation';
                                this.pendingBooking.proximo = proximo;
                            } else {
                                this.addMessage('❌ No hay disponibilidad en los próximos 7 días. Intenta con otro día.', 'bot');
                                this.bookingState = null;
                                this.pendingBooking = { nombre: '', dia: '', hora: null, massageType: null, proximo: null, telefono: null, ubicacion: null, tipoServicio: 'salon' };
                                this.selectedMassageType = null;
                            }
                        }
                    }
                    else if (this.bookingState === 'awaiting_confirmation') {
                        if (msg.toLowerCase().includes('si') || msg.toLowerCase().includes('ok')) {
                            const resultado = await this.agregarTurno(this.pendingBooking.nombre, this.pendingBooking.proximo.dia, this.pendingBooking.proximo.hora, this.selectedMassageType, this.pendingBooking.telefono, this.pendingBooking.ubicacion, this.pendingBooking.tipoServicio);
                            if (resultado.error) {
                                this.addMessage(`${resultado.error}`, 'bot');
                            } else {
                                const tipoTexto = this.pendingBooking.tipoServicio === 'domicilio' ? 'a domicilio' : 'en el salón';
                                this.addMessage(`✅ Turno confirmado!\n\n${this.capitalize(this.pendingBooking.proximo.dia)} a las ${this.pendingBooking.proximo.hora}:00\n${tipoTexto}\n\nTe esperamos!`, 'bot');
                            }
                            this.bookingState = null;
                            this.pendingBooking = { nombre: '', dia: '', hora: null, massageType: null, proximo: null, telefono: null, ubicacion: null, tipoServicio: 'salon' };
                            this.selectedMassageType = null;
                        } else {
                            this.addMessage('Reserva cancelada. Puedes pedir otro turno cuando quieras.', 'bot');
                            this.bookingState = null;
                            this.pendingBooking = { nombre: '', dia: '', hora: null, massageType: null, proximo: null, telefono: null, ubicacion: null, tipoServicio: 'salon' };
                            this.selectedMassageType = null;
                        }
                    }
                }

                async manejarReservaDirecta(msg) {
                    if (this.bookingState === 'awaiting_name_simple') {
                        if (!msg.trim()) { this.addMessage('Por favor, ingresa tu nombre.', 'bot'); return; }
                        this.clientName = escapeHtml(msg);
                        this.pendingBooking.nombre = this.clientName;
                        this.bookingState = 'awaiting_phone_simple';
                        this.addMessage(`Gracias ${this.clientName}. Cuál es tu número de teléfono?`, 'bot');
                    }
                    else if (this.bookingState === 'awaiting_phone_simple') {
                        const telefono = msg.replace(/\D/g, '');
                        if (telefono.length < 8) { this.addMessage('Por favor, ingresa un número de teléfono válido.', 'bot'); return; }
                        this.pendingBooking.telefono = telefono;
                        this.bookingState = 'awaiting_service_type_simple';
                        this.addMessage(`Dónde prefieres recibir el masaje?\n1. En el salón\n2. A domicilio`, 'bot');
                    }
                    else if (this.bookingState === 'awaiting_service_type_simple') {
                        if (msg === '1') {
                            this.pendingBooking.tipoServicio = 'salon';
                            this.pendingBooking.ubicacion = 'Salón Serenity Spa';
                            this.bookingState = 'awaiting_day_simple';
                            this.addMessage(`Perfecto. Qué día prefieres?`, 'bot');
                        } else if (msg === '2') {
                            this.pendingBooking.tipoServicio = 'domicilio';
                            this.bookingState = 'awaiting_location_simple';
                            this.addMessage(`Has elegido servicio a domicilio. Por favor, ingresa la dirección:`, 'bot');
                        } else {
                            this.addMessage(`Por favor, responde "1" para salón o "2" para domicilio.`, 'bot');
                        }
                    }
                    else if (this.bookingState === 'awaiting_location_simple') {
                        if (!msg.trim()) { this.addMessage('Por favor, ingresa una dirección válida.', 'bot'); return; }
                        this.pendingBooking.ubicacion = escapeHtml(msg);
                        this.bookingState = 'awaiting_day_simple';
                        this.addMessage(`Dirección registrada. Qué día prefieres?`, 'bot');
                    }
                    else if (this.bookingState === 'awaiting_day_simple') {
                        const dia = this.normalizarDia(msg);
                        if (!dia) { this.addMessage('Día no reconocido.', 'bot'); return; }
                        this.pendingBooking.dia = dia;
                        this.bookingState = 'awaiting_time_simple';
                        this.addMessage('A qué hora? (8 a 22)', 'bot');
                    }
                    else if (this.bookingState === 'awaiting_time_simple') {
                        const hora = parseInt(msg, 10);
                        if (isNaN(hora) || hora < 8 || hora > 22) { this.addMessage('Hora válida entre 8 y 22.', 'bot'); return; }
                        this.pendingBooking.hora = hora;
                        if (!this.horarioOcupado(this.pendingBooking.dia, this.pendingBooking.hora)) {
                            const resultado = await this.agregarTurno(this.pendingBooking.nombre, this.pendingBooking.dia, this.pendingBooking.hora, null, this.pendingBooking.telefono, this.pendingBooking.ubicacion, this.pendingBooking.tipoServicio);
                            if (resultado.error) {
                                this.addMessage(`${resultado.error}`, 'bot');
                            } else {
                                const tipoTexto = this.pendingBooking.tipoServicio === 'domicilio' ? 'a domicilio' : 'en el salón';
                                this.addMessage(`✅ Turno confirmado!\n\n${this.pendingBooking.nombre}\n${this.pendingBooking.telefono}\n${this.capitalize(this.pendingBooking.dia)} a las ${this.pendingBooking.hora}:00\n${tipoTexto}\n${this.pendingBooking.tipoServicio === 'domicilio' ? this.pendingBooking.ubicacion : ''}`, 'bot');
                            }
                            this.bookingState = null;
                            this.pendingBooking = { nombre: '', dia: '', hora: null, massageType: null, proximo: null, telefono: null, ubicacion: null, tipoServicio: 'salon' };
                        } else {
                            const proximo = this.buscarProximoDisponible(this.pendingBooking.dia, this.pendingBooking.hora);
                            if (proximo) {
                                this.addMessage(`⚠️ El horario está ocupado. ¿Quieres el ${this.capitalize(proximo.dia)} a las ${proximo.hora}:00? Responde "si".`, 'bot');
                                this.bookingState = 'awaiting_confirmation_simple';
                                this.pendingBooking.proximo = proximo;
                            } else {
                                this.addMessage('❌ No hay disponibilidad. Intenta con otro día.', 'bot');
                                this.bookingState = null;
                                this.pendingBooking = { nombre: '', dia: '', hora: null, massageType: null, proximo: null, telefono: null, ubicacion: null, tipoServicio: 'salon' };
                            }
                        }
                    }
                    else if (this.bookingState === 'awaiting_confirmation_simple') {
                        if (msg.toLowerCase().includes('si') || msg.toLowerCase().includes('ok')) {
                            const resultado = await this.agregarTurno(this.pendingBooking.nombre, this.pendingBooking.proximo.dia, this.pendingBooking.proximo.hora, null, this.pendingBooking.telefono, this.pendingBooking.ubicacion, this.pendingBooking.tipoServicio);
                            if (resultado.error) {
                                this.addMessage(`${resultado.error}`, 'bot');
                            } else {
                                this.addMessage(`✅ Turno asignado: ${this.capitalize(this.pendingBooking.proximo.dia)} a las ${this.pendingBooking.proximo.hora}:00.`, 'bot');
                            }
                            this.bookingState = null;
                            this.pendingBooking = { nombre: '', dia: '', hora: null, massageType: null, proximo: null, telefono: null, ubicacion: null, tipoServicio: 'salon' };
                        } else {
                            this.addMessage('Cancelado. Puedes pedir otro turno.', 'bot');
                            this.bookingState = null;
                            this.pendingBooking = { nombre: '', dia: '', hora: null, massageType: null, proximo: null, telefono: null, ubicacion: null, tipoServicio: 'salon' };
                        }
                    }
                }

                async procesarMensaje(msg) {
                    const userMsg = msg.toLowerCase().trim();
                    
                    if (this.bookingState) {
                        if (this.bookingState.includes('massage') || this.bookingState === 'awaiting_day' || this.bookingState === 'awaiting_time' || this.bookingState === 'awaiting_confirmation' || this.bookingState === 'awaiting_phone' || this.bookingState === 'awaiting_service_type' || this.bookingState === 'awaiting_location') {
                            await this.manejarReservaConMasaje(userMsg);
                        } else {
                            await this.manejarReservaDirecta(userMsg);
                        }
                        return;
                    }
                    
                    if (this.clientName === null) {
                        const saludos = ['hola', 'buenas', 'que tal', 'hey', 'hi'];
                        if (saludos.some(s => userMsg.includes(s)) || userMsg.length < 2) {
                            this.addMessage('Por favor, ingresa tu nombre para poder ayudarte mejor.', 'bot');
                            return;
                        }
                        this.clientName = escapeHtml(msg);
                        this.addMessage(`Gracias ${this.clientName}, ¿en qué puedo ayudarte? Puedes preguntarme sobre tipos de masaje, precios, reservar una cita o reajustar un turno.`, 'bot');
                        return;
                    }
                    
                    if (userMsg.includes('turno') || userMsg.includes('reservar') || userMsg.includes('cita') || userMsg.includes('agendar')) {
                        this.iniciarReservaDirect();
                    } else if (userMsg.includes('hola') || userMsg.includes('buenas')) {
                        this.addMessage(`Hola ${this.clientName}! ¿Cómo puedo ayudarte hoy?`, 'bot');
                    } else {
                        this.addMessage('No entendí del todo. Puedes preguntarme sobre tipos de masaje, precios o reservar un turno.', 'bot');
                    }
                }

                shareOnFacebook() {
                    window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}`, '_blank', 'width=600,height=400');
                }
                shareOnWhatsApp() {
                    window.open(`https://wa.me/?text=${encodeURIComponent('Descubre Serenity Spa - Masajes profesionales. Reserva tu cita hoy!')}%20${encodeURIComponent(window.location.href)}`, '_blank');
                }
                shareOnInstagram() {
                    navigator.clipboard?.writeText(window.location.href).then(() => alert('Enlace copiado. Compártelo en Instagram.'));
                    window.open('https://www.instagram.com/', '_blank');
                }

                initScrollReveal() {
                    const observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            if (entry.isIntersecting) entry.target.classList.add('visible');
                        });
                    }, { threshold: 0.1 });
                    document.querySelectorAll('.scroll-reveal').forEach(el => observer.observe(el));
                }
            }

            document.addEventListener('DOMContentLoaded', () => {
                window.app = new SerenitySpaApp();
            });
        })();
    </script>
</body>
</html>
