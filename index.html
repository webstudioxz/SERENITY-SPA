<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Serenity Spa</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0d0804;
            font-family: 'Arial', sans-serif;
            text-align: center;
            color: #e8d5b8;
        }
        .loader {
            border: 3px solid rgba(201, 168, 122, 0.1);
            border-top: 3px solid #c9a87a;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a { color: #c9a87a; text-decoration: none; }
        a:hover { color: #e8c98a; }
        h1 { font-family: 'Georgia', serif; font-size: 2rem; color: #e8c98a; }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h1>Serenity Spa</h1>
        <p>Cargando experiencia de bienestar...</p>
        <p style="font-size: 0.8rem; color: #a8906e; margin-top: 10px;">
            <a href="/I-2.html">Haz clic aquí si no eres redirigido</a>
        </p>
    </div>
    <script>
        // Redirigir a la página principal de la web
        window.location.href = '/I-2.html';
    </script>
</body>
</html>
