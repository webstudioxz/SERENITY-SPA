<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin | Serenity Spa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Segoe UI',sans-serif;
            background:#f0f2f5;min-height:100vh;
            padding:1rem;
        }
        .container{max-width:900px;margin:0 auto}
        header{
            background:white;padding:1rem 1.5rem;
            border-radius:16px;margin-bottom:1.5rem;
            display:flex;justify-content:space-between;align-items:center;
            box-shadow:0 2px 8px rgba(0,0,0,.05);
        }
        header h1{font-size:1.3rem;color:#1a2332}
        .logout-btn{
            background:#ef4444;color:white;border:none;
            padding:.5rem 1rem;border-radius:8px;cursor:pointer;
        }
        .card{
            background:white;border-radius:16px;
            padding:1.5rem;margin-bottom:1rem;
            box-shadow:0 2px 8px rgba(0,0,0,.05);
        }
        .card h2{font-size:1.1rem;margin-bottom:1rem;color:#1a2332}
        table{width:100%;border-collapse:collapse}
        th,td{padding:.75rem;text-align:left;border-bottom:1px solid #eee}
        th{color:#6b7280;font-size:.8rem;text-transform:uppercase}
        .loading{text-align:center;padding:2rem;color:#6b7280}
        .delete-btn{
            background:#fee2e2;color:#ef4444;border:none;
            padding:.3rem .8rem;border-radius:6px;cursor:pointer;
        }
        .no-auth{
            text-align:center;padding:4rem 2rem;
            color:#6b7280;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="no-auth" id="noAuth">
            <i class="fas fa-lock" style="font-size:3rem;margin-bottom:1rem;color:#C9A961"></i>
            <h2>Acceso Restringido</h2>
            <p style="margin-top:.5rem">Necesitás iniciar sesión</p>
            <a href="/login.html" style="display:inline-block;margin-top:1rem;padding:.7rem 2rem;background:#C9A961;color:white;text-decoration:none;border-radius:8px">Ir al Login</a>
        </div>
        
        <div id="adminPanel" style="display:none">
            <header>
                <h1><i class="fas fa-spa" style="color:#C9A961"></i> Panel de Turnos</h1>
                <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
            </header>
            
            <div class="card">
                <h2>📅 Turnos Reservados</h2>
                <div id="turnosTable">
                    <div class="loading">Cargando turnos...</div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
    const token = sessionStorage.getItem('adminToken');
    
    async function checkAuth() {
        if (!token) return false;
        try {
            const res = await fetch('/api/verify', {
                headers: {'Authorization': `Bearer ${token}`}
            });
            const data = await res.json();
            return data.valid;
        } catch { return false; }
    }
    
    async function init() {
        const valid = await checkAuth();
        if (!valid) {
            document.getElementById('noAuth').style.display = 'block';
            return;
        }
        
        document.getElementById('noAuth').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadTurnos();
    }
    
    async function loadTurnos() {
        try {
            const res = await fetch('/turnos');
            const turnos = await res.json();
            
            if (!turnos.length) {
                document.getElementById('turnosTable').innerHTML = '<p style="text-align:center;padding:2rem;color:#6b7280">No hay turnos reservados</p>';
                return;
            }
            
            const html = `
                <table>
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Día</th>
                            <th>Hora</th>
                            <th>Masaje</th>
                            <th>Teléfono</th>
                            <th>Acción</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${turnos.map(t => `
                            <tr>
                                <td>${t.nombre}</td>
                                <td>${t.dia}</td>
                                <td>${t.hora}:00</td>
                                <td>${t.massageType}</td>
                                <td>${t.telefono}</td>
                                <td><button class="delete-btn" onclick="cancelarTurno('${t.id}')">Cancelar</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
            document.getElementById('turnosTable').innerHTML = html;
        } catch(e) {
            document.getElementById('turnosTable').innerHTML = '<p style="color:#ef4444">Error al cargar turnos</p>';
        }
    }
    
    async function cancelarTurno(id) {
        if (!confirm('¿Cancelar este turno?')) return;
        try {
            const res = await fetch(`/turnos/${id}`, {
                method: 'DELETE',
                headers: {'Authorization': `Bearer ${token}`}
            });
            if (res.ok) {
                alert('Turno cancelado');
                loadTurnos();
            }
        } catch(e) {
            alert('Error al cancelar');
        }
    }
    
    function logout() {
        sessionStorage.removeItem('adminToken');
        window.location.href = '/';
    }
    
    init();
    </script>
</body>
</html>
