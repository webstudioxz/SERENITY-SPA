<script>
    // --- ESTADO GLOBAL (Inicialmente defaults, luego carga del servidor) ---
    const appConfig = {
        allowedCountry: 'CU', // Default por si falla la carga
        voiceMode: 'human',
        countryNames: {
            'CU': 'Cuba', 'MX': 'México', 'AR': 'Argentina', 'ES': 'España', 'US': 'Estados Unidos'
        }
    };

    // --- FUNCIÓN PARA CARGAR CONFIGURACIÓN DESDE EL SERVIDOR ---
    async function loadConfigFromServer() {
        try {
            const response = await fetch('/api/config');
            if (response.ok) {
                const data = await response.json();
                // Actualizar configuración global con lo que viene del Admin
                if (data.activeCountry) appConfig.allowedCountry = data.activeCountry;
                if (data.voiceMode) appConfig.voiceMode = data.voiceMode;
                console.log("Configuración cargada del servidor:", appConfig);
            }
        } catch (error) {
            console.warn("No se pudo conectar al servidor para cargar config, usando local:", error);
        }
    }

    /**
     * CONTROLADOR DE APLICACIÓN (Router simple)
     */
    const app = {
        init() {
            // 1. Cargar configuración real
            loadConfigFromServer();

            // 2. Iniciar módulos
            VoiceEngine.init();
            SpeechEngine.init();
            ui.init();
        },

        switchView(viewName) {
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('body').forEach(el => el.className = ''); // Reset classes
            
            if (viewName === 'admin') {
                // Nota: Normalmente el admin es otro archivo, pero si usas modo SPA:
                document.getElementById('view-admin').classList.add('active');
                document.body.classList.add('admin-mode');
                this.updateAdminUI();
            } else {
                document.getElementById('view-user').classList.add('active');
                document.body.classList.add('user-mode');
            }
        },

        updateAdminUI() {
            // (Código de UI de admin si lo integras en este mismo archivo)
        }
    };

    /**
     * LÓGICA DE ADMIN (Lee inputs, actualiza appConfig)
     */
    const admin = {
        saveConfig() {
            // En voice.html usualmente solo leemos, pero si permites edición local:
            // En un entorno real, esto haría un POST a /api/config
            console.log("Guardando configuración...");
        }
    };

    /**
     * MOTOR DE VOZ (TTS) - Lógica Robusta
     */
    const VoiceEngine = {
        synth: window.speechSynthesis,
        voice: null,

        init() {
            if (this.synth.onvoiceschanged !== undefined) {
                this.synth.onvoiceschanged = () => this.loadVoices();
            }
            this.loadVoices();
        },

        loadVoices() {
            const voices = this.synth.getVoices();
            // Intentar obtener voz en español
            this.voice = voices.find(v => v.lang === 'es-ES' || v.lang === 'es-MX') || voices[0];
        },

        speak(text) {
            if (this.synth.speaking) this.synth.cancel();

            // Lee la configuración GLOBAL (proveniente de Admin)
            const mode = appConfig.voiceMode;

            if (mode === 'human') {
                // Modo humano con pausas
                const sentences = text.split(/(?<=[.?!])\s+/);
                let index = 0;
                const speakNext = () => {
                    if (index >= sentences.length) {
                        ui.setSpeaking(false);
                        return;
                    }
                    ui.setSpeaking(true);
                    const u = new SpeechSynthesisUtterance(sentences[index]);
                    u.voice = this.voice;
                    u.rate = 0.92;
                    u.onend = () => {
                        index++;
                        setTimeout(speakNext, 350); // Pausa respiración
                    };
                    this.synth.speak(u);
                };
                speakNext();
            } else {
                // Modo Robótico directo
                const u = new SpeechSynthesisUtterance(text);
                u.voice = this.voice;
                u.rate = 1.1;
                ui.setSpeaking(true);
                u.onend = () => ui.setSpeaking(false);
                this.synth.speak(u);
            }
        }
    };

    /**
     * MOTOR DE RECONOCIMIENTO (STT)
     */
    const SpeechEngine = {
        recognition: null,
        onResult: null,
        init() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                ui.addMessage('bot', 'Navegador no compatible con voz.');
                return;
            }
            this.recognition = new SpeechRecognition();
            this.recognition.lang = 'es-ES';
            this.recognition.continuous = false;
            this.recognition.interimResults = false;

            this.recognition.onresult = (e) => {
                if (this.onResult) this.onResult(e.results[0][0].transcript);
            };
        },
        start() { try { this.recognition.start(); } catch(e){} },
        stop() { try { this.recognition.stop(); } catch(e){} }
    };

    /**
     * CEREBRO DEL BOT (Lógica de Negocio + Validación País)
     */
    const BotLogic = {
        state: { nombre: null, servicio: null, lugar: null, hora: null, telefono: null },

        process(text) {
            const lower = text.toLowerCase();
            this.extractNombre(text);
            this.extractServicio(lower);
            this.extractLugar(lower);
            this.extractHora(lower);
            this.extractTelefono(text);

            // --- Punto 2: Validación de País basada en Admin ---
            if (appConfig.allowedCountry !== 'ALL') {
                const blocked = this.checkCountryRestriction(lower);
                if (blocked) return blocked;
            }

            return this.generateResponse();
        },

        checkCountryRestriction(text) {
            const targetCode = appConfig.allowedCountry;
            const targetName = appConfig.countryNames[targetCode];
            
            // Diccionario simple inverso para detectar menciones de otros países
            const mentions = {
                'mexico': 'MX', 'mexicanos': 'MX',
                'argentina': 'AR', 'argentinos': 'AR',
                'españa': 'ES', 'españoles': 'ES',
                'eeuu': 'US', 'estados unidos': 'US'
            };

            for (let word in mentions) {
                if (text.includes(word) && mentions[word] !== targetCode) {
                    return `Lo siento, nuestro sistema solo permite reservas para clientes en ${targetName}. No puedo procesar reservas para ${word}.`;
                }
            }
            return null;
        },

        // Extractores...
        extractNombre(t) {
            if(this.state.nombre) return;
            const m = t.match(/(?:me llamo|soy)\s+([a-zA-Záéíóúñ]+)/i);
            if(m) this.state.nombre = m[1].charAt(0).toUpperCase() + m[1].slice(1);
        },
        extractServicio(t) {
            if(this.state.servicio) return;
            if(t.includes('facial')) this.state.servicio = 'Masaje Facial';
            else if(t.includes('corporal') || t.includes('relajante')) this.state.servicio = 'Masaje Relajante';
        },
        extractLugar(t) {
            if(this.state.lugar) return;
            if(t.includes('domicilio') || t.includes('casa')) this.state.lugar = 'Domicilio';
            else if(t.includes('salon') || t.includes('local')) this.state.lugar = 'Salón';
        },
        extractHora(t) {
            if(this.state.hora) return;
            if(t.includes('12')) this.state.hora = 12;
            if(t.includes('16') || t.includes('4')) this.state.hora = 16;
            if(t.includes('20') || t.includes('8')) this.state.hora = 20;
        },
        extractTelefono(t) {
            if(this.state.telefono) return;
            // Regex mejorada para evitar precios
            const clean = t.replace(/\$\d+/g, '').replace(/:/g, ' ');
            const m = clean.match(/\b\d{7,8}\b/);
            if(m) this.state.telefono = m[0];
        },

        generateResponse() {
            const s = this.state;
            const name = s.nombre ? `${s.nombre}, ` : '';
            
            if (!s.nombre) return "¿Cuál es tu nombre?";
            if (!s.servicio) return "¿Qué servicio deseas? Facial o Relajante.";
            if (!s.lugar) return `${name}¿A domicilio o en el salón?`;
            if (!s.hora) return `${name}¿A qué hora? 12, 16 o 20.`;
            if (!s.telefono) return `${name}Resumen: ${s.servicio} en ${s.lugar} a las ${s.hora}. Dame tu teléfono para confirmar.`;

            return `${name}¡Reserva confirmada! ${s.servicio} a las ${s.hora}. Te esperamos.`;
        }
    };

    /**
     * UI CONTROLLER (Interfaz Usuario)
     */
    const ui = {
        micBtn: document.getElementById('micBtn'),
        chat: document.getElementById('chatContainer'),
        
        init() {
            this.micBtn.addEventListener('mousedown', () => {
                if(VoiceEngine.synth.speaking) VoiceEngine.synth.cancel();
                SpeechEngine.start();
                this.micBtn.classList.add('listening');
                document.getElementById('userStatusText').innerText = 'Escuchando...';
            });
            
            this.micBtn.addEventListener('mouseup', () => {
                SpeechEngine.stop();
                this.micBtn.classList.remove('listening');
                document.getElementById('userStatusText').innerText = 'Procesando...';
            });
            
            // Touch events
            this.micBtn.addEventListener('touchstart', (e) => { e.preventDefault(); this.micBtn.dispatchEvent(new Event('mousedown')); });
            this.micBtn.addEventListener('touchend', (e) => { e.preventDefault(); this.micBtn.dispatchEvent(new Event('mouseup')); });

            SpeechEngine.onResult = (text) => {
                this.addMessage('user', text);
                setTimeout(() => {
                    const response = BotLogic.process(text);
                    this.addMessage('bot', response);
                    document.getElementById('userStatusText').innerText = 'En línea';
                }, 500);
            };
        },

        addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `
                <div class="avatar"><i class="fas fa-${role === 'bot' ? 'robot' : 'user'}"></i></div>
                <div class="bubble">${text}</div>
            `;
            this.chat.appendChild(div);
            this.chat.scrollTop = this.chat.scrollHeight;
            
            if(role === 'bot') VoiceEngine.speak(text);
        },

        setSpeaking(active) {
            this.micBtn.disabled = active;
            const dot = document.querySelector('.status-dot');
            dot.style.backgroundColor = active ? 'var(--primary)' : 'var(--success)';
        }
    };

    // Iniciar App
    window.addEventListener('DOMContentLoaded', () => app.init());

</script>
