<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Asistente de Voz | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#0E0F0D 0%,#1a1c18 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}
        .card{width:100%;max-width:550px;background:rgba(22,24,20,.95);backdrop-filter:blur(20px);border-radius:48px;border:1px solid rgba(255,255,255,.1);overflow:hidden;box-shadow:0 25px 50px -12px rgba(0,0,0,.5)}
        .header{padding:2rem 1.75rem 1.5rem;border-bottom:1px solid rgba(255,255,255,.08);text-align:center}
        .avatar{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,#C9A961,#A8883F);display:flex;align-items:center;justify-content:center;margin:0 auto;transition:all .3s;box-shadow:0 10px 30px rgba(201,169,97,.3)}
        .avatar.speaking{animation:pulseVoice .6s ease-in-out infinite}
        .avatar.thinking{animation:thinkVoice 1.2s ease-in-out infinite}
        .avatar.listening{animation:listenPulse 1s ease-in-out infinite}
        @keyframes pulseVoice{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
        @keyframes thinkVoice{0%,100%{opacity:1}50%{opacity:.7}}
        @keyframes listenPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .avatar svg{width:38px;height:38px;color:#fff}
        .title{font-family:'Playfair Display',serif;font-size:1.5rem;color:#F5F2EB;margin-top:.9rem}
        .subtitle{font-size:.7rem;color:rgba(245,242,235,.5);margin-top:.3rem}
        .status{display:inline-flex;align-items:center;gap:.6rem;padding:.4rem 1.2rem;border-radius:40px;background:rgba(255,255,255,.05);font-size:.75rem;color:#F5F2EB;margin-top:.9rem}
        .dot{width:8px;height:8px;border-radius:50%;background:#6DB98C;transition:all .3s}
        .dot.recording{background:#E8A060;animation:blinkMic .8s infinite}
        .dot.speaking{background:#6BA3D6;animation:blinkMic .5s infinite}
        .dot.thinking{background:#C9A961;animation:blinkMic 1s infinite}
        .dot.offline{background:#dc2626}
        @keyframes blinkMic{0%,100%{opacity:1}50%{opacity:.4}}
        .conversation{height:420px;overflow-y:auto;padding:1.35rem;display:flex;flex-direction:column;gap:1rem}
        .conversation::-webkit-scrollbar{width:5px}
        .conversation::-webkit-scrollbar-track{background:transparent}
        .conversation::-webkit-scrollbar-thumb{background:rgba(201,169,97,.3);border-radius:10px}
        .message{display:flex;gap:.8rem;align-items:flex-end;animation:fadeInUp .3s ease-out}
        @keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
        .message.user{flex-direction:row-reverse}
        .msg-pip{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#C9A961,#A8883F);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:#fff;flex-shrink:0}
        .message.user .msg-pip{background:rgba(255,255,255,.15);color:#C9A961}
        .bubble{max-width:78%;padding:.8rem 1.1rem;border-radius:20px;font-size:.88rem;line-height:1.55;color:#F5F2EB;white-space:pre-line}
        .message.bot .bubble{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);border-bottom-left-radius:6px}
        .message.user .bubble{background:linear-gradient(135deg,#C9A961,#A8883F);color:#1A160A;font-weight:500;border-bottom-right-radius:6px}
        .typing-indicator{display:flex;align-items:center;gap:.4rem;padding:.7rem 1.1rem;background:rgba(255,255,255,.08);border-radius:20px;width:fit-content;margin:.5rem 0}
        .typing-indicator span{width:8px;height:8px;background:#C9A961;border-radius:50%;animation:typingAnim 1.4s infinite}
        .typing-indicator span:nth-child(2){animation-delay:.2s}
        .typing-indicator span:nth-child(3){animation-delay:.4s}
        @keyframes typingAnim{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-10px);opacity:1}}
        .controls{padding:1.2rem 1.75rem 1.75rem;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between}
        .btn-back{padding:.6rem 1.2rem;border-radius:40px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:#F5F2EB;text-decoration:none;font-size:.8rem;transition:all .2s}
        .btn-back:hover{background:rgba(255,255,255,.12);border-color:#C9A961;transform:translateX(-2px)}
        .btn-mic{width:80px;height:80px;border-radius:50%;background:linear-gradient(145deg,#E8C97A,#A8883F);border:none;color:#fff;cursor:pointer;box-shadow:0 10px 35px rgba(201,169,97,.4);display:flex;align-items:center;justify-content:center;transition:all .3s}
        .btn-mic.recording{background:linear-gradient(145deg,#F0A060,#C06030);animation:pulseMic 1.3s infinite}
        .btn-mic:active{transform:scale(.94)}
        @keyframes pulseMic{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .btn-mic svg{width:32px;height:32px}
        .btn-mode{padding:.55rem 1.1rem;border-radius:40px;background:transparent;border:1px solid rgba(255,255,255,.15);color:#F5F2EB;font-size:.7rem;cursor:pointer;transition:all .2s}
        .btn-mode:hover{border-color:#C9A961;color:#C9A961}
        .btn-mode.active{background:rgba(201,169,97,.2);border-color:#C9A961;color:#C9A961}
        .text-input-area{display:none;padding:0 1.75rem 1.75rem}
        .text-input-area.show{display:block}
        .text-input-row{display:flex;gap:.6rem}
        .text-input-row input{flex:1;padding:.8rem 1.1rem;border-radius:40px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#F5F2EB;font-family:inherit;font-size:.88rem;outline:none}
        .text-input-row input:focus{border-color:#C9A961;background:rgba(255,255,255,.08)}
        .text-input-row input::placeholder{color:rgba(245,242,235,.3)}
        .btn-send{padding:.8rem 1.4rem;border-radius:40px;background:#C9A961;border:none;color:#1A160A;cursor:pointer;font-weight:600;font-size:.85rem;transition:all .2s}
        .btn-send:hover{filter:brightness(1.1);transform:translateX(2px)}
        @media(max-width:560px){.card{border-radius:28px}.conversation{height:350px}.btn-mic{width:65px;height:65px}.btn-mic svg{width:26px;height:26px}}
    </style>
</head>
<body>
<main class="card">
    <header class="header">
        <div class="avatar" id="avatarEl">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.6">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </div>
        <h1 class="title">Asistente IA</h1>
        <p class="subtitle">Mantén presionado y habla</p>
        <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Listo</span>
        </div>
    </header>
    <section class="conversation" id="conversation"></section>
    <footer class="controls" id="voiceControls">
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Volver</a>
        <button class="btn-mic" id="micBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        <button class="btn-mode" id="btnMode" title="Cambiar modo"><i class="fas fa-keyboard"></i></button>
    </footer>
    <div class="text-input-area" id="textInputArea">
        <div class="text-input-row">
            <input type="text" id="textInput" placeholder="Escribe tu mensaje..." autocomplete="off">
            <button class="btn-send" id="btnSendText"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</main>

<script>
(function() {
    'use strict';

    // DOM Elements
    const micBtn = document.getElementById('micBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const conversation = document.getElementById('conversation');
    const avatarEl = document.getElementById('avatarEl');
    const btnMode = document.getElementById('btnMode');
    const textInputArea = document.getElementById('textInputArea');
    const textInput = document.getElementById('textInput');
    const btnSendText = document.getElementById('btnSendText');
    const voiceControls = document.getElementById('voiceControls');

    // Estado
    let isRecording = false;
    let isSpeaking = false;
    let isThinking = false;
    let textMode = false;
    let recognition = null;
    let mediaStream = null;

    // WebSocket
    let ws = null;
    let reconnectAttempt = 0;

    // Síntesis de voz mejorada
    let speechQueue = [];
    let isSpeakingQueue = false;
    let currentUtterance = null;
    let bestVoice = null;

    // Inicializar voz
    function initSpeech() {
        if (!window.speechSynthesis) return;
        
        const loadVoices = () => {
            const voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) {
                setTimeout(loadVoices, 100);
                return;
            }
            
            // Buscar la mejor voz en español
            const preferred = ['Google español', 'Microsoft Sabina', 'Microsoft Helena', 'Samantha', 'Mónica', 'Paulina', 'es-ES', 'es-MX', 'es-AR'];
            
            for (const pref of preferred) {
                const voice = voices.find(v => 
                    (v.lang === 'es-ES' || v.lang === 'es-MX' || v.lang === 'es-AR' || v.lang === 'es-419') &&
                    (v.name.toLowerCase().includes(pref.toLowerCase()) || v.lang === pref)
                );
                if (voice) {
                    bestVoice = voice;
                    console.log('[VOZ] Voz seleccionada:', voice.name);
                    return;
                }
            }
            
            // Fallback: cualquier voz en español
            bestVoice = voices.find(v => v.lang.startsWith('es')) || voices[0];
            if (bestVoice) console.log('[VOZ] Voz fallback:', bestVoice.name);
        };
        
        if (window.speechSynthesis.getVoices().length > 0) {
            loadVoices();
        } else {
            window.speechSynthesis.onvoiceschanged = loadVoices;
        }
    }
    
    initSpeech();

    // Limpiar texto para voz
    function cleanTextForSpeech(text) {
        return text
            .replace(/[^\w\sáéíóúñü.,!?;:()\-]/gi, ' ')
            .replace(/[*_#]/g, '')
            .replace(/\s+/g, ' ')
            .trim();
    }

    // Dividir texto en frases naturales
    function splitIntoSentences(text) {
        const sentences = [];
        let current = '';
        const parts = text.split(/([.!?])\s*/);
        
        for (let i = 0; i < parts.length; i++) {
            current += parts[i];
            if (parts[i].match(/[.!?]/) || i === parts.length - 1) {
                if (current.trim()) {
                    sentences.push(current.trim());
                }
                current = '';
            }
        }
        
        return sentences;
    }

    // Hablar texto de forma natural
    async function speakText(text) {
        if (!window.speechSynthesis) return;
        
        const cleanText = cleanTextForSpeech(text);
        if (!cleanText) return;
        
        const sentences = splitIntoSentences(cleanText);
        
        for (const sentence of sentences) {
            if (!sentence.trim()) continue;
            
            await new Promise((resolve) => {
                const utterance = new SpeechSynthesisUtterance(sentence);
                
                if (bestVoice) utterance.voice = bestVoice;
                utterance.lang = 'es-ES';
                utterance.rate = 0.92;
                utterance.pitch = 1.05;
                utterance.volume = 1;
                
                utterance.onstart = () => {
                    isSpeaking = true;
                    isSpeakingQueue = true;
                    currentUtterance = utterance;
                    updateStatus('speaking', 'Hablando...');
                    avatarEl.classList.add('speaking');
                };
                
                utterance.onend = () => {
                    currentUtterance = null;
                    isSpeakingQueue = false;
                    if (!isRecording && !isThinking) {
                        isSpeaking = false;
                        updateStatus('ready', 'Listo');
                        avatarEl.classList.remove('speaking');
                    }
                    resolve();
                };
                
                utterance.onerror = () => {
                    currentUtterance = null;
                    isSpeakingQueue = false;
                    isSpeaking = false;
                    resolve();
                };
                
                window.speechSynthesis.speak(utterance);
            });
        }
    }

    // Actualizar estado visual
    function updateStatus(state, text) {
        statusText.textContent = text;
        
        switch(state) {
            case 'ready':
                statusDot.className = 'dot';
                avatarEl.classList.remove('speaking', 'thinking', 'listening');
                break;
            case 'listening':
                statusDot.className = 'dot recording';
                avatarEl.classList.add('listening');
                avatarEl.classList.remove('speaking', 'thinking');
                break;
            case 'thinking':
                statusDot.className = 'dot thinking';
                avatarEl.classList.add('thinking');
                avatarEl.classList.remove('speaking', 'listening');
                break;
            case 'speaking':
                statusDot.className = 'dot speaking';
                break;
            case 'offline':
                statusDot.className = 'dot offline';
                avatarEl.classList.remove('speaking', 'thinking', 'listening');
                break;
        }
    }

    // Agregar mensajes
    function addUserMessage(text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message user';
        messageDiv.innerHTML = `
            <div class="msg-pip">T</div>
            <div class="bubble">${escapeHtml(text)}</div>
        `;
        conversation.appendChild(messageDiv);
        conversation.scrollTop = conversation.scrollHeight;
    }

    function addBotMessage(text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message bot';
        messageDiv.innerHTML = `
            <div class="msg-pip">S</div>
            <div class="bubble">${escapeHtml(text)}</div>
        `;
        conversation.appendChild(messageDiv);
        conversation.scrollTop = conversation.scrollHeight;
        
        // Leer en voz alta
        speakText(text);
    }

    function addTypingIndicator() {
        const typingDiv = document.createElement('div');
        typingDiv.className = 'typing-indicator';
        typingDiv.id = 'typingIndicator';
        for (let i = 0; i < 3; i++) {
            const span = document.createElement('span');
            typingDiv.appendChild(span);
        }
        conversation.appendChild(typingDiv);
        conversation.scrollTop = conversation.scrollHeight;
    }

    function removeTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (indicator) indicator.remove();
    }

    function showThinking() {
        isThinking = true;
        updateStatus('thinking', 'Pensando...');
        addTypingIndicator();
    }

    function hideThinking() {
        isThinking = false;
        removeTypingIndicator();
        if (!isRecording && !isSpeaking) {
            updateStatus('ready', 'Listo');
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML.replace(/\n/g, '<br>');
    }

    // WebSocket
    function connectWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws-voice`;
        
        ws = new WebSocket(wsUrl);
        
        ws.onopen = () => {
            console.log('[WS] Conectado');
            reconnectAttempt = 0;
            updateStatus('ready', 'Listo');
            
            if (!conversation.children.length) {
                addBotMessage('🌸 Bienvenido a Serenity Spa.\n\nTe ayudo a reservar turnos, consultar servicios y horarios.\n\n¿Cómo te llamas?');
            }
        };
        
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.tipo === 'respuesta' && data.texto) {
                    hideThinking();
                    addBotMessage(data.texto);
                }
            } catch (e) {
                console.error('[WS] Error:', e);
            }
        };
        
        ws.onclose = () => {
            console.log('[WS] Desconectado');
            updateStatus('offline', 'Reconectando...');
            reconnectAttempt++;
            setTimeout(connectWebSocket, Math.min(3000 + reconnectAttempt * 1000, 15000));
        };
        
        ws.onerror = (error) => {
            console.error('[WS] Error:', error);
        };
    }

    // Enviar mensaje
    function sendToServer(text) {
        if (!text || text.trim() === '') return;
        
        addUserMessage(text);
        showThinking();
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ tipo: 'transcripcion', texto: text }));
        } else {
            hideThinking();
            addBotMessage('⚠️ Error de conexión. Recarga la página.');
        }
    }

    // Reconocimiento de voz mejorado
    async function startVoiceRecording() {
        if (isRecording || isSpeaking) return;
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (!SpeechRecognition) {
            addBotMessage('⚠️ Tu navegador no soporta reconocimiento de voz. Usa el modo texto (icono teclado).');
            return;
        }
        
        // Solicitar permiso de micrófono
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaStream = stream;
            stream.getTracks().forEach(track => track.stop());
        } catch (err) {
            addBotMessage('🎤 Necesito acceso al micrófono para ayudarte. Permite el acceso en tu navegador.');
            return;
        }
        
        recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        
        let finalTranscript = '';
        
        recognition.onstart = () => {
            isRecording = true;
            updateStatus('listening', 'Escuchando...');
            micBtn.classList.add('recording');
        };
        
        recognition.onresult = (event) => {
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalTranscript += transcript + ' ';
                } else {
                    interim += transcript;
                }
            }
        };
        
        recognition.onend = () => {
            isRecording = false;
            micBtn.classList.remove('recording');
            
            if (finalTranscript && finalTranscript.trim()) {
                sendToServer(finalTranscript.trim());
            } else {
                if (!isSpeaking && !isThinking) {
                    updateStatus('ready', 'Listo');
                }
            }
            
            finalTranscript = '';
            recognition = null;
            
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
        };
        
        recognition.onerror = (event) => {
            console.error('[REC] Error:', event.error);
            isRecording = false;
            micBtn.classList.remove('recording');
            recognition = null;
            
            if (event.error !== 'no-speech') {
                addBotMessage('⚠️ No entendí lo que dijiste. Intenta de nuevo o usa el modo texto.');
            }
            
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
            
            if (!isSpeaking && !isThinking) {
                updateStatus('ready', 'Listo');
            }
        };
        
        recognition.start();
    }
    
    function stopVoiceRecording() {
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
    }

    // Modo texto
    function toggleTextMode() {
        textMode = !textMode;
        if (textMode) {
            textInputArea.classList.add('show');
            btnMode.classList.add('active');
            btnMode.innerHTML = '<i class="fas fa-microphone"></i>';
            voiceControls.style.visibility = 'hidden';
            textInput.focus();
        } else {
            textInputArea.classList.remove('show');
            btnMode.classList.remove('active');
            btnMode.innerHTML = '<i class="fas fa-keyboard"></i>';
            voiceControls.style.visibility = 'visible';
        }
    }

    // Eventos
    micBtn.addEventListener('mousedown', (e) => {
        e.preventDefault();
        if (!textMode && !isSpeaking && !isThinking) {
            startVoiceRecording();
        }
    });
    
    micBtn.addEventListener('mouseup', (e) => {
        e.preventDefault();
        if (isRecording) stopVoiceRecording();
    });
    
    micBtn.addEventListener('mouseleave', () => {
        if (isRecording) stopVoiceRecording();
    });
    
    micBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!textMode && !isSpeaking && !isThinking) {
            startVoiceRecording();
        }
    }, { passive: false });
    
    micBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (isRecording) stopVoiceRecording();
    }, { passive: false });
    
    micBtn.addEventListener('touchcancel', () => {
        if (isRecording) stopVoiceRecording();
    });
    
    btnMode.addEventListener('click', toggleTextMode);
    
    btnSendText.addEventListener('click', () => {
        const text = textInput.value.trim();
        if (text) {
            sendToServer(text);
            textInput.value = '';
        }
    });
    
    textInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const text = textInput.value.trim();
            if (text) {
                sendToServer(text);
                textInput.value = '';
            }
        }
    });
    
    // Atajos
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'm') {
            e.preventDefault();
            if (!textMode) {
                if (!isRecording) startVoiceRecording();
                else stopVoiceRecording();
            }
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 't') {
            e.preventDefault();
            toggleTextMode();
        }
    });
    
    // Limpiar
    window.addEventListener('beforeunload', () => {
        if (ws) ws.close();
        if (currentUtterance) {
            window.speechSynthesis.cancel();
        }
        if (mediaStream) {
            mediaStream.getTracks().forEach(track => track.stop());
        }
    });
    
    // Iniciar
    connectWebSocket();
})();
</script>
</body>
</html>
