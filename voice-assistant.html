<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Asistente de voz para reservas en Serenity Spa">
    <meta name="theme-color" content="#C9A961">
    <title>Asistente Virtual | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            -webkit-user-select: none;
            user-select: none;
        }
        .call-container {
            max-width: 500px;
            width: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .call-header {
            background: linear-gradient(135deg, rgba(201,169,97,0.12), rgba(168,136,63,0.03));
            padding: 1.75rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .avatar-wrapper { position: relative; display: inline-block; }
        .avatar {
            width: 85px; height: 85px;
            background: linear-gradient(135deg, #C9A961, #A8883F);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(201,169,97,0.3);
            transition: all 0.3s ease;
        }
        .avatar i { font-size: 2.5rem; color: white; }
        .pulse-ring {
            position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%; border: 2px solid rgba(201,169,97,0.4);
            animation: pulse-ring 2s cubic-bezier(0.215,0.61,0.355,1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
        .call-title { font-size: 1.3rem; font-weight: 600; color: white; margin-top: 0.75rem; }
        .call-subtitle { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 0.25rem; }
        .call-status {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: rgba(16,185,129,0.15); padding: 0.35rem 0.9rem;
            border-radius: 40px; margin-top: 0.75rem; font-size: 0.7rem; font-weight: 500;
            transition: all 0.3s ease;
        }
        .status-dot { width: 8px; height: 8px; background: #10B981; border-radius: 50%; animation: pulse-green 1.5s infinite; }
        @keyframes pulse-green { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.5; transform:scale(1.2); } }
        .call-status.listening { background: rgba(245,158,11,0.15); }
        .call-status.listening .status-dot { background: #F59E0B; animation: pulse-amber 0.6s infinite; }
        @keyframes pulse-amber { 0%,100% { transform:scale(1); opacity:1; } 50% { transform:scale(1.6); opacity:0.5; } }
        .call-status.speaking { background: rgba(59,130,246,0.15); }
        .call-status.speaking .status-dot { background: #3B82F6; animation: speakingPulse 0.5s infinite; }
        @keyframes speakingPulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.8); opacity:0.6; } }
        .call-status.error { background: rgba(239,68,68,0.15); }
        .call-status.error .status-dot { background: #EF4444; animation: none; }
        .timer { font-family: 'Inter', monospace; font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 0.5rem; letter-spacing: 1px; }

        .conversation-area {
            height: 380px; padding: 1.25rem; overflow-y: auto;
            display: flex; flex-direction: column; gap: 1rem;
        }
        .conversation-area::-webkit-scrollbar { width: 4px; }
        .conversation-area::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        .conversation-area::-webkit-scrollbar-thumb { background: rgba(201,169,97,0.4); border-radius: 10px; }

        .message { display: flex; gap: 0.75rem; animation: messageIn 0.3s cubic-bezier(0.2,0.9,0.4,1.1); }
        @keyframes messageIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        .message.user { justify-content: flex-end; }
        .message-avatar { width: 32px; height: 32px; border-radius: 50%; background: rgba(201,169,97,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .message-avatar i { font-size: 0.8rem; color: #C9A961; }
        .message.user .message-avatar { background: rgba(201,169,97,0.25); }
        .message-bubble { max-width: 75%; padding: 0.7rem 1rem; border-radius: 20px; font-size: 0.85rem; line-height: 1.45; }
        .message.bot .message-bubble { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); border-top-left-radius: 4px; border: 1px solid rgba(255,255,255,0.03); }
        .message.user .message-bubble { background: linear-gradient(135deg, #C9A961, #A8883F); color: #0f172a; border-bottom-right-radius: 4px; font-weight: 500; }
        .typing-effect { display: flex; align-items: center; gap: 4px; padding: 0.7rem 1rem; background: rgba(255,255,255,0.08); border-radius: 20px; border-top-left-radius: 4px; }
        .typing-dot { width: 7px; height: 7px; background: rgba(255,255,255,0.5); border-radius: 50%; animation: typingDot 1.2s infinite ease-in-out; }
        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }
        @keyframes typingDot { 0%,60%,100% { transform:translateY(0); opacity:0.3; } 30% { transform:translateY(-5px); opacity:1; } }

        .listening-indicator {
            display: none; align-items: center; justify-content: center; gap: 0.75rem;
            padding: 0.75rem; font-size: 0.75rem; color: #F59E0B;
            border-top: 1px solid rgba(245,158,11,0.2); background: rgba(245,158,11,0.05);
        }
        .listening-indicator.active { display: flex; }
        .waveform { display: flex; align-items: center; gap: 3px; }
        .waveform span { width: 3px; background: #F59E0B; border-radius: 3px; animation: wave 0.8s ease-in-out infinite; }
        .waveform span:nth-child(1) { animation-delay: 0s; height: 8px; }
        .waveform span:nth-child(2) { animation-delay: 0.1s; height: 16px; }
        .waveform span:nth-child(3) { animation-delay: 0.2s; height: 10px; }
        .waveform span:nth-child(4) { animation-delay: 0.3s; height: 20px; }
        .waveform span:nth-child(5) { animation-delay: 0.15s; height: 12px; }
        .waveform span:nth-child(6) { animation-delay: 0.25s; height: 16px; }
        @keyframes wave { 0%,100% { height:6px; opacity:0.4; } 50% { height:20px; opacity:1; } }

        .call-controls {
            display: flex; justify-content: center; align-items: center; gap: 2rem;
            padding: 1.5rem; background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .call-btn {
            border-radius: 50%; border: none; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; justify-content: center;
        }

        /* Botón MIC grande - PUSH TO TALK */
        .call-btn.mic {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #C9A961, #A8883F);
            color: white; font-size: 1.8rem;
            box-shadow: 0 8px 24px rgba(201,169,97,0.4);
            position: relative;
        }
        .call-btn.mic:active, .call-btn.mic.pressed {
            transform: scale(0.92);
            background: linear-gradient(135deg, #F59E0B, #D97706);
            box-shadow: 0 4px 16px rgba(245,158,11,0.5);
        }
        .call-btn.mic:disabled {
            opacity: 0.4; cursor: not-allowed;
            transform: none !important;
            box-shadow: none;
        }
        .mic-label {
            position: absolute; bottom: -28px; left: 50%; transform: translateX(-50%);
            font-size: 0.6rem; color: rgba(255,255,255,0.5); white-space: nowrap;
            font-weight: 500; letter-spacing: 0.5px;
        }
        .call-btn.mic:active .mic-label,
        .call-btn.mic.pressed .mic-label {
            color: #F59E0B;
        }

        .call-btn.end {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: white; font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(220,38,38,0.3);
        }
        .call-btn.end:hover { transform: scale(1.05); }

        .call-btn.speed {
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7);
            border: 1px solid rgba(255,255,255,0.1); font-size: 0.65rem; font-weight: 700;
        }
        .call-btn.speed:hover { background: rgba(255,255,255,0.15); color: white; }

        @media (max-width: 480px) {
            .call-container { border-radius: 32px; }
            .conversation-area { height: 300px; }
            .call-btn.mic { width: 70px; height: 70px; font-size: 1.5rem; }
            .call-controls { gap: 1.5rem; padding: 1.25rem; }
            .avatar { width: 70px; height: 70px; }
            .avatar i { font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="call-container">
    <div class="call-header">
        <div class="avatar-wrapper">
            <div class="pulse-ring"></div>
            <div class="avatar"><i class="fas fa-headset"></i></div>
        </div>
        <div class="call-title">Asistente Virtual</div>
        <div class="call-subtitle">Serenity Spa</div>
        <div class="call-status" id="callStatus">
            <span class="status-dot"></span>
            <span>Conectando...</span>
        </div>
        <div class="timer" id="callTimer">00:00</div>
    </div>

    <div class="conversation-area" id="conversationArea"></div>

    <div class="listening-indicator" id="listeningIndicator">
        <div class="waveform"><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <span>Escuchando... suelta el botón para enviar</span>
    </div>

    <div class="call-controls">
        <button class="call-btn speed" id="speedBtn" title="Velocidad de voz">1x</button>
        <!-- PUSH TO TALK: mantener presionado para hablar -->
        <button class="call-btn mic" id="micBtn" disabled title="Mantén presionado para hablar">
            <i class="fas fa-microphone"></i>
            <span class="mic-label">MANTÉN PARA HABLAR</span>
        </button>
        <button class="call-btn end" id="endCallBtn" title="Finalizar"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<script>
    // ==================== ESTADO GLOBAL ====================
    let ws = null;
    let synthesis = window.speechSynthesis;
    let isCallActive = true;
    let isBotSpeaking = false;
    let isListening = false;
    let callStartTime = null;
    let timerInterval = null;
    let reconnectAttempts = 0;
    let recognition = null;
    let finalTranscript = '';
    let silenceTimer = null;

    // Velocidad de voz
    const speeds = [0.8, 0.95, 1.1, 1.25];
    const speedNames = ['Lento', 'Normal', 'Rápido', 'Muy rápido'];
    let speedIdx = 1;
    let voiceSpeed = 0.95;

    // DOM
    const DOM = {
        area: document.getElementById('conversationArea'),
        status: document.getElementById('callStatus'),
        timer: document.getElementById('callTimer'),
        listening: document.getElementById('listeningIndicator'),
        micBtn: document.getElementById('micBtn'),
        endBtn: document.getElementById('endCallBtn'),
        speedBtn: document.getElementById('speedBtn')
    };

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    // ==================== UI ====================
    function setStatus(text, type) {
        DOM.status.innerHTML = `<span class="status-dot"></span><span>${text}</span>`;
        DOM.status.className = 'call-status' + (type ? ' ' + type : '');
    }

    function addMsg(text, sender, isTyping) {
        const div = document.createElement('div');
        div.className = `message ${sender}`;
        const icon = sender === 'bot' ? 'fas fa-robot' : 'fas fa-user';
        if (isTyping) {
            div.innerHTML = `<div class="message-avatar"><i class="${icon}"></i></div><div class="typing-effect"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            DOM.area.appendChild(div);
            DOM.area.scrollTop = DOM.area.scrollHeight;
            return div;
        }
        div.innerHTML = `<div class="message-avatar"><i class="${icon}"></i></div><div class="message-bubble">${text.replace(/\n/g, '<br>')}</div>`;
        DOM.area.appendChild(div);
        DOM.area.scrollTop = DOM.area.scrollHeight;
        return div;
    }

    function removeLastTyping() {
        const msgs = DOM.area.querySelectorAll('.message.bot');
        const last = msgs[msgs.length - 1];
        if (last && last.querySelector('.typing-effect')) last.remove();
    }

    // ==================== TIMER ====================
    function startTimer() {
        callStartTime = Date.now();
        timerInterval = setInterval(() => {
            const s = Math.floor((Date.now() - callStartTime) / 1000);
            DOM.timer.textContent = `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        }, 1000);
    }
    function stopTimer() { if (timerInterval) clearInterval(timerInterval); }

    // ==================== SÍNTESIS DE VOZ ====================
    function getBestVoice() {
        const voices = synthesis.getVoices();
        const prefs = ['Google español','Google es-es','Microsoft Helena','Microsoft Laura','Microsoft Pablo','Monica','Paulina','es-ES','es-MX'];
        for (const p of prefs) { const v = voices.find(x => x.name.toLowerCase().includes(p.toLowerCase())); if (v) return v; }
        return voices.find(v => v.lang.startsWith('es')) || voices[0] || null;
    }

    function speak(texto) {
        if (!synthesis || !isCallActive) return;
        synthesis.cancel();

        let clean = texto
            .replace(/\*/g, '').replace(/[_~`#\[\]]/g, '')
            .replace(/\n{2,}/g, '. ').replace(/\n/g, ', ')
            .replace(/\s+/g, ' ')
            .replace(/📅|⏰|💆‍♂️|📍|📞|✅|❌|🌸|🖼️|🌿|✨|💆‍♀️|🌟|👋|🎤|⚠️/g, '')
            .trim();

        clean = clean.replace(/\bhs\b/gi, 'horas')
            .replace(/\b12:00\b/g, '12 del mediodía')
            .replace(/\b16:00\b/g, '4 de la tarde')
            .replace(/\b20:00\b/g, '8 de la noche');

        if (!clean) return;

        const utt = new SpeechSynthesisUtterance(clean);
        utt.lang = 'es-ES';
        utt.rate = voiceSpeed;
        utt.pitch = 1.0;
        utt.volume = 1.0;
        const voice = getBestVoice();
        if (voice) utt.voice = voice;

        isBotSpeaking = true;
        DOM.micBtn.disabled = true;
        setStatus('Hablando...', 'speaking');

        utt.onend = () => { isBotSpeaking = false; DOM.micBtn.disabled = false; if (isCallActive) setStatus('Listo para escuchar'); };
        utt.onerror = (e) => { if (e.error !== 'interrupted' && e.error !== 'canceled') console.log('Error voz:', e.error); isBotSpeaking = false; DOM.micBtn.disabled = false; if (isCallActive) setStatus('Listo para escuchar'); };

        setTimeout(() => { if (isCallActive) synthesis.speak(utt); }, 200);
    }

    // ==================== PUSH TO TALK ====================
    function startListening() {
        if (!SpeechRecognition || isBotSpeaking || isListening || !isCallActive) return;

        recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        finalTranscript = '';

        recognition.onstart = () => {
            isListening = true;
            DOM.listening.classList.add('active');
            setStatus('Escuchando...', 'listening');
        };

        recognition.onresult = (event) => {
            if (silenceTimer) clearTimeout(silenceTimer);
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                if (event.results[i].isFinal) finalTranscript += event.results[i][0].transcript + ' ';
                else interim += event.results[i][0].transcript;
            }
            if (interim) setStatus(`"${interim.substring(0, 35)}${interim.length > 35 ? '...' : ''}"`, 'listening');
        };

        recognition.onerror = (event) => {
            console.log('Error reconocimiento:', event.error);
            if (event.error === 'not-allowed') {
                addMsg('Permite el acceso al micrófono para usar el asistente.', 'bot');
                setStatus('Micrófono bloqueado', 'error');
                isListening = false;
                DOM.listening.classList.remove('active');
                return;
            }
            // Para otros errores, simplemente limpiamos
            isListening = false;
            DOM.listening.classList.remove('active');
            if (isCallActive && !isBotSpeaking) setStatus('Listo para escuchar');
        };

        recognition.onend = () => {
            isListening = false;
            DOM.listening.classList.remove('active');
        };

        try { recognition.start(); } catch(e) { console.error('Error start:', e); }
    }

    function stopListening() {
        if (!recognition || !isListening) {
            isListening = false;
            DOM.listening.classList.remove('active');
            return;
        }

        try { recognition.stop(); } catch(e) {}

        // Pequeña espera para que se procesen los resultados finales
        setTimeout(() => {
            isListening = false;
            DOM.listening.classList.remove('active');
            const texto = finalTranscript.trim();
            finalTranscript = '';
            if (texto) {
                sendToServer(texto);
            } else {
                if (isCallActive && !isBotSpeaking) setStatus('No se detectó voz. Intenta de nuevo.');
                setTimeout(() => { if (isCallActive && !isBotSpeaking) setStatus('Listo para escuchar'); }, 2000);
            }
        }, 300);
    }
