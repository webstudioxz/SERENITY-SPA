<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Asistente de Voz | Serenity Spa</title>
  <meta name="description" content="Asistente de voz inteligente para reservas en Serenity Spa. Hablá con nosotros." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --gold:#C9A961;--gold-deep:#A8883F;--bg:#0E0F0D;
      --bg-card:rgba(22,24,20,.82);--text:#F5F2EB;
      --text-muted:rgba(245,242,235,.35);--border:rgba(255,255,255,.06);
      --radius:40px;--shadow:0 32px 64px -16px rgba(0,0,0,.7);
    }
    body{
      font-family:'DM Sans',sans-serif;background:var(--bg);
      min-height:100dvh;display:flex;align-items:center;justify-content:center;
      padding:1rem;
    }
    .card{
      width:100%;max-width:480px;background:var(--bg-card);
      backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
      border-radius:var(--radius);box-shadow:var(--shadow);
      border:1px solid var(--border);overflow:hidden;
    }
    .header{
      padding:2rem 1.75rem 1.5rem;border-bottom:1px solid var(--border);
      text-align:center;position:relative;
    }
    /* Onda de audio cuando habla el bot */
    .audio-wave{
      display:flex;align-items:center;justify-content:center;gap:3px;
      height:40px;margin-top:.5rem;opacity:0;transition:opacity .3s;
    }
    .audio-wave.active{opacity:1}
    .audio-wave .bar{
      width:4px;border-radius:2px;background:var(--gold);
      animation:none;transition:height .1s;
    }
    .audio-wave.active .bar:nth-child(1){animation:waveBar .6s ease-in-out infinite}
    .audio-wave.active .bar:nth-child(2){animation:waveBar .6s ease-in-out .1s infinite}
    .audio-wave.active .bar:nth-child(3){animation:waveBar .6s ease-in-out .2s infinite}
    .audio-wave.active .bar:nth-child(4){animation:waveBar .6s ease-in-out .15s infinite}
    .audio-wave.active .bar:nth-child(5){animation:waveBar .6s ease-in-out .25s infinite}
    @keyframes waveBar{0%,100%{height:4px}50%{height:28px}}
    
    .avatar{
      width:80px;height:80px;border-radius:50%;
      background:linear-gradient(135deg,var(--gold),var(--gold-deep));
      display:flex;align-items:center;justify-content:center;
      margin:0 auto;box-shadow:0 8px 32px rgba(201,169,97,.35);
      transition:all .3s;position:relative;
    }
    .avatar.listening{
      animation:avatarListen 1.5s ease-in-out infinite;
      box-shadow:0 0 40px rgba(201,169,97,.6);
    }
    .avatar.speaking{
      animation:avatarSpeak .4s ease-in-out infinite;
      box-shadow:0 0 50px rgba(100,160,220,.6);
    }
    .avatar.processing{
      animation:avatarPulse .8s ease-in-out infinite;
      box-shadow:0 0 30px rgba(201,169,97,.4);
    }
    @keyframes avatarListen{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.06)}
    }
    @keyframes avatarSpeak{
      0%,100%{transform:scale(1)}
      25%{transform:scale(1.04)}
      75%{transform:scale(0.97)}
    }
    @keyframes avatarPulse{
      0%,100%{transform:scale(1);opacity:1}
      50%{transform:scale(1.03);opacity:.8}
    }
    
    .avatar svg{width:32px;height:32px;color:white;position:relative;z-index:1}
    
    /* Anillos de pulso */
    .pulse-ring{
      position:absolute;inset:-6px;border-radius:50%;
      border:2px solid var(--gold);opacity:0;
    }
    .avatar.listening .pulse-ring{
      animation:pulseOut 1.5s ease-out infinite;
    }
    @keyframes pulseOut{
      0%{opacity:.6;transform:scale(.9)}
      100%{opacity:0;transform:scale(1.4)}
    }
    
    .title{
      font-family:'Playfair Display',serif;font-size:1.35rem;
      color:var(--text);margin-top:.75rem;
    }
    .status{
      display:inline-flex;align-items:center;gap:.5rem;
      padding:.35rem .9rem;border-radius:40px;
      background:rgba(255,255,255,.05);font-size:.7rem;
      color:var(--text);margin-top:.5rem;
    }
    .status-dot{width:7px;height:7px;border-radius:50%;background:#6DB98C}
    .status-dot.listening{background:#E8A060;animation:blink .8s infinite alternate}
    .status-dot.speaking{background:#6BA3D6;animation:blink .5s infinite alternate}
    .status-dot.processing{background:#C9A961;animation:blink 1s infinite alternate}
    .status-dot.error{background:#E07070}
    @keyframes blink{from{opacity:1}to{opacity:.35}}
    
    .conversation{
      height:280px;overflow-y:auto;padding:1.25rem;
      display:flex;flex-direction:column;gap:.8rem;
    }
    .message{display:flex;gap:.6rem;align-items:flex-end}
    .message.user{flex-direction:row-reverse}
    .msg-pip{
      width:26px;height:26px;border-radius:50%;
      background:linear-gradient(135deg,var(--gold),var(--gold-deep));
      display:flex;align-items:center;justify-content:center;
      font-size:.6rem;color:white;flex-shrink:0;
    }
    .message.user .msg-pip{background:rgba(255,255,255,.1);color:var(--gold)}
    .bubble{
      max-width:76%;padding:.6rem .9rem;border-radius:16px;
      font-size:.8rem;line-height:1.5;color:var(--text);
    }
    .message.bot .bubble{
      background:rgba(255,255,255,.07);border:1px solid var(--border);
      border-bottom-left-radius:4px;
    }
    .message.user .bubble{
      background:linear-gradient(135deg,var(--gold),var(--gold-deep));
      color:#1A160A;font-weight:500;border-bottom-right-radius:4px;
    }
    .time{font-size:.6rem;color:var(--text-muted);margin-top:.25rem;text-align:right}
    .message.bot .time{text-align:left}
    
    .controls{
      padding:1.2rem 1.75rem 1.5rem;border-top:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
    }
    .btn-back{
      padding:.6rem 1rem;border-radius:40px;
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
      color:var(--text);text-decoration:none;font-size:.75rem;font-weight:500;
    }
    .mic-container{
      display:flex;flex-direction:column;align-items:center;gap:.4rem;
    }
    .btn-mic{
      width:68px;height:68px;border-radius:50%;
      background:linear-gradient(145deg,#E8C97A,#A8883F);
      border:none;color:white;font-size:1.4rem;cursor:pointer;
      box-shadow:0 8px 32px rgba(201,169,97,.4);
      display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;
      user-select:none;-webkit-user-select:none;
      touch-action:manipulation;transition:all .3s;
    }
    .btn-mic:hover{transform:scale(1.05)}
    .btn-mic:active{transform:scale(.95)}
    .btn-mic.listening{
      background:linear-gradient(145deg,#F0A060,#C06030);
      animation:micPulse 1.5s infinite;
    }
    @keyframes micPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    
    .mic-hint{font-size:.6rem;color:var(--text-muted)}
    
    .voice-toggle{
      position:absolute;top:1rem;left:1rem;
      width:34px;height:34px;border-radius:50%;
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
      color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;
      font-size:.75rem;z-index:2;transition:all .2s;
    }
    .voice-toggle.muted{color:#E07070;border-color:rgba(224,112,112,.3)}
    
    .toast-container{
      position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
      z-index:999;display:flex;flex-direction:column;align-items:center;
      gap:.5rem;pointer-events:none;width:min(90vw,380px);
    }
    .toast{
      background:rgba(22,24,20,.95);border:1px solid var(--border);
      border-radius:12px;padding:.65rem 1.1rem;font-size:.8rem;
      color:var(--text);display:flex;align-items:center;gap:.6rem;
      backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.4);
      pointer-events:auto;animation:toastIn .35s ease both;
    }
    @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    
    @media(max-width:520px){
      .card{border-radius:24px}.conversation{height:240px}
      .btn-mic{width:60px;height:60px}
    }
  </style>
</head>
<body>

<main class="card" role="main" aria-label="Asistente de Voz - Serenity Spa">
  <header class="header">
    <button class="voice-toggle" id="voiceToggle" aria-label="Activar/desactivar voz" title="Voz del asistente">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
    </button>

    <div class="avatar" id="avatarEl" aria-hidden="true">
      <span class="pulse-ring"></span>
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </div>
    
    <!-- Onda de audio cuando el bot habla -->
    <div class="audio-wave" id="audioWave" aria-hidden="true">
      <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      <span class="bar"></span><span class="bar"></span>
    </div>
    
    <h1 class="title">Asistente de Voz</h1>
    <div class="status" id="statusBadge" role="status" aria-live="polite">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Conectando...</span>
    </div>
  </header>
  
  <section class="conversation" id="conversation" aria-live="polite"></section>
  
  <footer class="controls">
    <a href="/" class="btn-back">← Volver</a>
    <div class="mic-container">
      <button class="btn-mic" id="micBtn" aria-label="Mantener para hablar">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <span class="mic-hint">Mantener para hablar</span>
    </div>
    <div style="width:70px"></div>
  </footer>
</main>

<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================================
// ASISTENTE DE VOZ - AUDIO BIDIRECCIONAL
// Entrada: SpeechRecognition (voz del usuario)
// Salida: SpeechSynthesis (voz del asistente)
// ============================================================
(function() {
  'use strict';
  
  // DOM
  const micBtn = document.getElementById('micBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const conversation = document.getElementById('conversation');
  const toastContainer = document.getElementById('toastContainer');
  const avatarEl = document.getElementById('avatarEl');
  const voiceToggle = document.getElementById('voiceToggle');
  const audioWave = document.getElementById('audioWave');
  
  // Estado
  let ws = null;
  let recognition = null;
  let isRecording = false;
  let isMuted = false;
  let isSpeaking = false;
  let reconnectAttempt = 0;
  let reconnectTimer = null;
  
  // ============================================================
  // UTILIDADES
  // ============================================================
  function showToast(msg, dur) {
    dur = dur || 3000;
    const t = document.createElement('div');
    t.className = 'toast';t.textContent = msg;
    toastContainer.appendChild(t);
    setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .3s';setTimeout(()=>t.remove(),300);},dur);
  }
  
  function setStatus(text, type) {
    statusText.textContent = text;
    statusDot.className = 'status-dot';
    if(type) statusDot.classList.add(type);
  }
  
  function setAvatarState(state) {
    avatarEl.classList.remove('listening','speaking','processing');
    if(state) avatarEl.classList.add(state);
    audioWave.classList.toggle('active', state === 'speaking');
  }
  
  function addMessage(text, who) {
    const row = document.createElement('div');
    row.className = 'message ' + (who==='user'?'user':'bot');
    const pip = document.createElement('div');
    pip.className = 'msg-pip';
    pip.textContent = who==='user'?'T':'S';
    pip.setAttribute('aria-hidden','true');
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    const time = document.createElement('div');
    time.className = 'time';
    time.textContent = new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit'});
    bubble.appendChild(time);
    row.appendChild(pip);
    row.appendChild(bubble);
    conversation.appendChild(row);
    conversation.scrollTop = conversation.scrollHeight;
  }
  
  // ============================================================
  // TTS - TEXTO A VOZ (El asistente HABLA)
  // ============================================================
  function speak(text) {
    if(isMuted || !window.speechSynthesis) return;
    
    // Limpiar texto para voz
    const clean = text.replace(/<[^>]*>/g,'').replace(/\*/g,'').replace(/[_~`]/g,'').trim();
    if(!clean) return;
    
    // Cancelar voz anterior
    window.speechSynthesis.cancel();
    
    const u = new SpeechSynthesisUtterance(clean);
    u.lang = 'es-AR';
    u.rate = 0.92;
    u.pitch = 1.04;
    u.volume = 1;
    
    // Buscar mejor voz español
    const voices = window.speechSynthesis.getVoices();
    const best = voices.find(v=>v.lang.startsWith('es')&&v.name.includes('Google'))||
                 voices.find(v=>v.lang.startsWith('es-AR'))||
                 voices.find(v=>v.lang.startsWith('es-MX'))||
                 voices.find(v=>v.lang.startsWith('es-ES'))||
                 voices.find(v=>v.lang.startsWith('es'));
    if(best) u.voice = best;
    
    u.onstart = ()=>{
      isSpeaking = true;
      setAvatarState('speaking');
      setStatus('Hablando...','speaking');
    };
    u.onend = ()=>{
      isSpeaking = false;
      setAvatarState(null);
      setStatus('Escuchando');
    };
    u.onerror = ()=>{
      isSpeaking = false;
      setAvatarState(null);
      setStatus('Escuchando');
    };
    
    window.speechSynthesis.speak(u);
  }
  
  // ============================================================
  // TOGGLE SILENCIAR VOZ
  // ============================================================
  const muteSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>';
  const unmuteSvg = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>';
  
  voiceToggle.onclick = ()=>{
    isMuted = !isMuted;
    voiceToggle.classList.toggle('muted',isMuted);
    voiceToggle.innerHTML = isMuted ? muteSvg : unmuteSvg;
    if(isMuted){window.speechSynthesis&&window.speechSynthesis.cancel();isSpeaking=false;setAvatarState(null);setStatus('Escuchando');}
    showToast(isMuted?'Voz silenciada':'Voz activada',2000);
  };
  
  // ============================================================
  // WEBSOCKET
  // ============================================================
  function connectWS() {
    if(reconnectTimer){clearTimeout(reconnectTimer);reconnectTimer=null;}
    if(ws&&(ws.readyState===WebSocket.OPEN||ws.readyState===WebSocket.CONNECTING)){ws.close(1000,'Reconexión');}
    
    const url = (location.protocol==='https:'?'wss:':'ws:')+'//'+location.host+'/ws-voice';
    console.log('🔌 WS:',url);
    
    try{ws=new WebSocket(url);}catch(e){setStatus('Error','error');scheduleReconnect();return;}
    
    ws.onopen=()=>{
      console.log('✅ WS conectado');
      reconnectAttempt=0;
      setStatus('Escuchando');
      setAvatarState(null);
      const msg='🌿 ¡Hola! Soy el asistente de Serenity Spa. Decime "reservar turno" para agendar o "cancelar turno" para cancelar. Atendemos de lunes a sábado a las 12, 16 y 20 horas. ¿En qué puedo ayudarte?';
      addMessage(msg,'bot');
      speak(msg);
    };
    
    ws.onmessage=(e)=>{
      try{
        const d=JSON.parse(e.data);
        if(d.tipo==='respuesta'){
          addMessage(d.texto,'bot');
          speak(d.texto);
        }
      }catch(err){console.error('Parse:',err);}
    };
    
    ws.onerror=()=>{setStatus('Error','error');};
    ws.onclose=(e)=>{if(e.code!==1000)scheduleReconnect();};
  }
  
  function scheduleReconnect(){
    reconnectAttempt++;
    const d=Math.min(3000+reconnectAttempt*1000,12000);
    setStatus('Reconectando...','error');
    reconnectTimer=setTimeout(connectWS,d);
  }
  
  // ============================================================
  // RECONOCIMIENTO DE VOZ (El usuario HABLA)
  // ============================================================
  function startListening() {
    if(isRecording) return;
    
    // Detener TTS si está hablando
    if(window.speechSynthesis&&isSpeaking){window.speechSynthesis.cancel();isSpeaking=false;setAvatarState(null);}
    
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){showToast('Navegador no soportado. Usá Chrome.');addMessage('❌ Este navegador no soporta reconocimiento de voz. Probá con Google Chrome.','bot');return;}
    if(!ws||ws.readyState!==WebSocket.OPEN){showToast('Reconectando...');connectWS();return;}
    
    try{
      recognition = new SR();
      recognition.lang = 'es-ES';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      
      recognition.onstart = ()=>{
        console.log('🎤 Escuchando...');
        isRecording = true;
        micBtn.classList.add('listening');
        setAvatarState('listening');
        setStatus('Escuchando...','listening');
        if(navigator.vibrate) navigator.vibrate(30);
      };
      
      recognition.onresult = (e)=>{
        const text = e.results[0][0].transcript;
        console.log('📝',text);
        addMessage(text,'user');
        setAvatarState('processing');
        setStatus('Procesando...','processing');
        
        if(ws&&ws.readyState===WebSocket.OPEN){
          ws.send(JSON.stringify({tipo:'transcripcion',texto:text}));
        }else{
          addMessage('⚠️ Sin conexión.','bot');
          connectWS();
        }
      };
      
      recognition.onerror = (e)=>{
        console.error('❌',e.error);
        const msgs={'no-speech':'No detecté sonido. Hablá más fuerte.','audio-capture':'No se pudo acceder al micrófono.','not-allowed':'Permiso de micrófono denegado.','network':'Error de red.'};
        const msg=msgs[e.error];
        if(msg){showToast(msg);if(e.error!=='aborted')addMessage('⚠️ '+msg,'bot');}
        stopListening();
      };
      
      recognition.onend = ()=>{
        console.log('🎤 Fin escucha');
        stopListening();
      };
      
      recognition.start();
    }catch(e){
      console.error(e);
      stopListening();
    }
  }
  
  function stopListening() {
    if(recognition){
      try{recognition.stop();}catch(e){}
      recognition = null;
    }
    isRecording = false;
    micBtn.classList.remove('listening');
    if(!isSpeaking){
      setAvatarState(null);
      setStatus('Escuchando');
    }
  }
  
  // ============================================================
  // EVENTOS DEL BOTÓN
  // ============================================================
  micBtn.addEventListener('mousedown',(e)=>{e.preventDefault();startListening();});
  micBtn.addEventListener('mouseup',(e)=>{e.preventDefault();stopListening();});
  micBtn.addEventListener('mouseleave',()=>{if(isRecording)stopListening();});
  micBtn.addEventListener('touchstart',(e)=>{e.preventDefault();startListening();},{passive:false});
  micBtn.addEventListener('touchend',(e)=>{e.preventDefault();stopListening();},{passive:false});
  micBtn.addEventListener('touchcancel',(e)=>{e.preventDefault();stopListening();},{passive:false});
  micBtn.addEventListener('keydown',(e)=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();if(!isRecording)startListening();else stopListening();}});
  micBtn.addEventListener('contextmenu',(e)=>e.preventDefault());
  
  document.addEventListener('keydown',(e)=>{
    if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='m'){e.preventDefault();if(!isRecording)startListening();else stopListening();}
  });
  
  // ============================================================
  // INICIO
  // ============================================================
  console.log('🎤 Serenity Spa Voice Assistant v4.0 - AUDIO BIDIRECCIONAL');
  console.log('🎤 SpeechRecognition:',!!(window.SpeechRecognition||window.webkitSpeechRecognition)?'✅':'❌');
  console.log('🔊 SpeechSynthesis:',!!window.speechSynthesis?'✅':'❌');
  
  // Precargar voces
  if(window.speechSynthesis){
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
    // Despertar motor de voz
    const d=new SpeechSynthesisUtterance('');d.volume=0;window.speechSynthesis.speak(d);
  }
  
  connectWS();
})();
</script>
</body>
</html>
