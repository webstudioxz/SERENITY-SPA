<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Asistente de Voz | Serenity Spa</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{--gold:#C9A961;--gold-deep:#A8883F;--bg:#0E0F0D;--bg-card:rgba(22,24,20,.82);--text:#F5F2EB;--text-muted:rgba(245,242,235,.35);--border:rgba(255,255,255,.06)}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:1rem}
    .card{width:100%;max-width:480px;background:var(--bg-card);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-radius:40px;border:1px solid var(--border);overflow:hidden}
    .header{padding:2rem 1.75rem 1.5rem;border-bottom:1px solid var(--border);text-align:center;position:relative}
    .avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-deep));display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 8px 32px rgba(201,169,97,.35);transition:all .3s}
    .avatar.speaking{animation:avatarPulse .6s ease-in-out infinite}
    @keyframes avatarPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    .avatar svg{width:32px;height:32px;color:white}
    .title{font-family:'Playfair Display',serif;font-size:1.35rem;color:var(--text);margin-top:.75rem}
    .status{display:inline-flex;align-items:center;gap:.5rem;padding:.35rem .9rem;border-radius:40px;background:rgba(255,255,255,.05);font-size:.7rem;color:var(--text);margin-top:.75rem}
    .dot{width:7px;height:7px;border-radius:50%;background:#6DB98C}
    .dot.recording{background:#E8A060;animation:blink .8s infinite alternate}
    .dot.speaking{background:#6BA3D6;animation:blink .5s infinite alternate}
    @keyframes blink{from{opacity:1}to{opacity:.35}}
    .conversation{height:350px;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:.9rem}
    .message{display:flex;gap:.6rem;align-items:flex-end}
    .message.user{flex-direction:row-reverse}
    .msg-pip{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-deep));display:flex;align-items:center;justify-content:center;font-size:.65rem;color:white;flex-shrink:0}
    .message.user .msg-pip{background:rgba(255,255,255,.1);color:var(--gold)}
    .bubble{max-width:76%;padding:.65rem 1rem;border-radius:18px;font-size:.84rem;line-height:1.55;color:var(--text);word-wrap:break-word;overflow-wrap:break-word}
    .message.bot .bubble{background:rgba(255,255,255,.07);border:1px solid var(--border);border-bottom-left-radius:4px;white-space:pre-line}
    .message.user .bubble{background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#1A160A;font-weight:500;border-bottom-right-radius:4px}
    .time{font-size:.6rem;color:var(--text-muted);margin-top:.3rem;text-align:right}
    .message.bot .time{text-align:left}
    .controls{padding:1.4rem 1.75rem 1.75rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .btn-back{padding:.6rem 1.15rem;border-radius:40px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:var(--text);text-decoration:none;font-size:.8rem}
    .btn-mic{width:72px;height:72px;border-radius:50%;background:linear-gradient(145deg,#E8C97A,#A8883F);border:none;color:white;font-size:1.5rem;cursor:pointer;box-shadow:0 8px 32px rgba(201,169,97,.4);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
    .btn-mic.recording{background:linear-gradient(145deg,#F0A060,#C06030);animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    @media(max-width:520px){body{padding:.5rem}.card{border-radius:24px}.conversation{height:280px}.btn-mic{width:64px;height:64px}}
  </style>
</head>
<body>

<main class="card">
  <header class="header">
    <div class="avatar" id="avatarEl">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </div>
    <h1 class="title">Asistente de Voz</h1>
    <div class="status"><span class="dot" id="statusDot"></span><span id="statusText">Conectando...</span></div>
  </header>
  <section class="conversation" id="conversation"></section>
  <footer class="controls">
    <a href="/" class="btn-back">← Volver</a>
    <button class="btn-mic" id="micBtn">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <div style="width:85px"></div>
  </footer>
</main>

<script>
(function() {
  'use strict';
  const micBtn=document.getElementById('micBtn'),statusDot=document.getElementById('statusDot'),statusText=document.getElementById('statusText'),conversation=document.getElementById('conversation'),avatarEl=document.getElementById('avatarEl');
  let ws=null,recognition=null,isRecording=false,isSpeaking=false,reconnectAttempt=0,speechQueue=[];

  function speakNatural(texto){
    if(!window.speechSynthesis)return;
    const limpio=texto.replace(/<[^>]*>/g,'').replace(/\*/g,'').replace(/_/g,'').trim();
    if(!limpio)return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(limpio);
    u.lang='es-AR';u.rate=0.9;u.pitch=1.0;u.volume=1;
    const voices=window.speechSynthesis.getVoices();
    const best=voices.find(v=>v.lang==='es-AR'&&v.name.includes('Google'))||voices.find(v=>v.lang==='es-MX'&&v.name.includes('Google'))||voices.find(v=>v.lang==='es-ES'&&v.name.includes('Google'))||voices.find(v=>v.lang.startsWith('es-AR'))||voices.find(v=>v.lang.startsWith('es-MX'))||voices.find(v=>v.lang.startsWith('es'));
    if(best)u.voice=best;
    u.onstart=()=>{isSpeaking=true;avatarEl.classList.add('speaking');statusDot.className='dot speaking';statusText.textContent='Hablando...'};
    u.onend=()=>{isSpeaking=false;avatarEl.classList.remove('speaking');statusDot.className='dot';statusText.textContent='Escuchando';if(speechQueue.length>0)setTimeout(()=>speakNatural(speechQueue.shift()),400)};
    window.speechSynthesis.speak(u);
  }
  if(window.speechSynthesis){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices()}

  function addMessage(texto,who){
    const row=document.createElement('div');row.className='message '+(who==='user'?'user':'bot');
    const pip=document.createElement('div');pip.className='msg-pip';pip.textContent=who==='user'?'T':'S';
    const bubble=document.createElement('div');bubble.className='bubble';bubble.textContent=texto;
    row.appendChild(pip);row.appendChild(bubble);conversation.appendChild(row);conversation.scrollTop=conversation.scrollHeight;
    if(who==='bot'){if(isSpeaking)speechQueue.push(texto);else speakNatural(texto)}
  }

  function connectWebSocket(){
    const protocol=location.protocol==='https:'?'wss:':'ws:';
    try{ws=new WebSocket(protocol+'//'+location.host+'/ws-voice')}catch(e){setTimeout(connectWebSocket,5000);return}
    ws.onopen=()=>{reconnectAttempt=0;statusDot.className='dot';statusText.textContent='Escuchando';addMessage('Hola, ¿cómo está? Sea bienvenido a Serenity Spa. Soy su asistente virtual. Este servicio de reservas está disponible para Cuba. ¿Me podría decir su nombre?','bot')};
    ws.onmessage=(event)=>{try{const data=JSON.parse(event.data);if(data.tipo==='respuesta')addMessage(data.texto,'bot')}catch(e){}};
    ws.onclose=()=>{reconnectAttempt++;setTimeout(connectWebSocket,Math.min(3000+reconnectAttempt*1000,12000))};
  }

  function startRecording(){
    if(isRecording)return;
    if(window.speechSynthesis&&isSpeaking){window.speechSynthesis.cancel();isSpeaking=false;avatarEl.classList.remove('speaking')}
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){addMessage('Este navegador no soporta reconocimiento de voz. Usá Google Chrome.','bot');return}
    try{
      recognition=new SR();recognition.lang='es-ES';recognition.continuous=false;recognition.interimResults=false;
      recognition.onstart=()=>{isRecording=true;micBtn.classList.add('recording');statusDot.className='dot recording';statusText.textContent='Grabando...'};
      recognition.onresult=(event)=>{const texto=event.results[0][0].transcript;addMessage(texto,'user');if(ws&&ws.readyState===WebSocket.OPEN)ws.send(JSON.stringify({tipo:'transcripcion',texto:texto}))};
      recognition.onend=()=>{isRecording=false;micBtn.classList.remove('recording');recognition=null;statusDot.className='dot';statusText.textContent='Escuchando'};
      recognition.onerror=(event)=>{if(event.error==='no-speech')addMessage('No detecté ningún sonido. Intentá de nuevo.','bot')};
      recognition.start();
    }catch(e){isRecording=false;micBtn.classList.remove('recording')}
  }
  function stopRecording(){if(recognition)try{recognition.stop()}catch(e){}}

  micBtn.addEventListener('mousedown',(e)=>{e.preventDefault();startRecording()});
  micBtn.addEventListener('mouseup',(e)=>{e.preventDefault();stopRecording()});
  micBtn.addEventListener('mouseleave',()=>{if(isRecording)stopRecording()});
  micBtn.addEventListener('touchstart',(e)=>{e.preventDefault();startRecording()},{passive:false});
  micBtn.addEventListener('touchend',(e)=>{e.preventDefault();stopRecording()},{passive:false});
  micBtn.addEventListener('touchcancel',(e)=>{e.preventDefault();if(isRecording)stopRecording()},{passive:false});
  document.addEventListener('keydown',(e)=>{if((e.ctrlKey||e.metaKey)&&e.key==='m'){e.preventDefault();if(!isRecording)startRecording();else stopRecording()}});

  connectWebSocket();
})();
</script>
</body>
</html>
