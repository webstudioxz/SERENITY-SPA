<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Asistente de voz profesional para reservas en Serenity Spa">
    <meta name="theme-color" content="#C9A961">
    <title>Asistente Virtual | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem}

        .call-container{max-width:500px;width:100%;background:rgba(15,23,42,0.88);backdrop-filter:blur(20px);border-radius:48px;box-shadow:0 25px 50px -12px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);overflow:hidden;animation:slideUp .4s ease-out}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}

        .call-header{background:linear-gradient(135deg,rgba(201,169,97,0.12),rgba(168,136,63,0.03));padding:1.75rem 1.5rem;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05)}
        .avatar-wrapper{position:relative;display:inline-block}
        .avatar{width:85px;height:85px;background:linear-gradient(135deg,#C9A961,#A8883F);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(201,169,97,0.3)}
        .avatar i{font-size:2.5rem;color:white}
        .pulse-ring{position:absolute;top:-5px;left:-5px;right:-5px;bottom:-5px;border-radius:50%;border:2px solid rgba(201,169,97,0.4);animation:pulseRing 1.5s cubic-bezier(.215,.61,.355,1) infinite}
        @keyframes pulseRing{0%{transform:scale(.8);opacity:1}100%{transform:scale(1.4);opacity:0}}

        .call-title{font-size:1.3rem;font-weight:600;color:white;margin-top:.75rem}
        .call-subtitle{font-size:.75rem;color:rgba(255,255,255,0.5);margin-top:.25rem}

        .call-status{display:inline-flex;align-items:center;gap:.5rem;background:rgba(16,185,129,0.15);padding:.35rem .9rem;border-radius:40px;margin-top:.75rem;font-size:.7rem;font-weight:500;transition:all .3s}
        .status-dot{width:8px;height:8px;background:#10B981;border-radius:50%;animation:pulseGreen 1.5s infinite}
        @keyframes pulseGreen{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.2)}}
        .call-status.listening{background:rgba(245,158,11,0.15)}
        .call-status.listening .status-dot{background:#F59E0B}
        .call-status.speaking{background:rgba(59,130,246,0.15)}
        .call-status.speaking .status-dot{background:#3B82F6;animation:none}
        .call-status.thinking{background:rgba(139,92,246,0.15)}
        .call-status.thinking .status-dot{background:#8B5CF6;animation:none}

        .timer{font-family:'Inter',monospace;font-size:.75rem;color:rgba(255,255,255,0.4);margin-top:.5rem;letter-spacing:1px}

        .conversation-area{height:380px;padding:1.25rem;overflow-y:auto;display:flex;flex-direction:column;gap:1rem}
        .conversation-area::-webkit-scrollbar{width:4px}
        .conversation-area::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:10px}
        .conversation-area::-webkit-scrollbar-thumb{background:rgba(201,169,97,0.4);border-radius:10px}

        .message{display:flex;gap:.75rem;animation:msgIn .3s cubic-bezier(.2,.9,.4,1.1)}
        @keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .message.user{justify-content:flex-end}
        .message-avatar{width:32px;height:32px;border-radius:50%;background:rgba(201,169,97,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .message-avatar i{font-size:.8rem;color:#C9A961}
        .message.user .message-avatar{background:rgba(201,169,97,0.25)}
        .message-bubble{max-width:75%;padding:.7rem 1rem;border-radius:20px;font-size:.85rem;line-height:1.45}
        .message.bot .message-bubble{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.9);border-top-left-radius:4px;border:1px solid rgba(255,255,255,0.03)}
        .message.user .message-bubble{background:linear-gradient(135deg,#C9A961,#A8883F);color:#0f172a;border-bottom-right-radius:4px;font-weight:500}

        .typing-effect{display:flex;align-items:center;gap:4px;padding:.7rem 1rem;background:rgba(255,255,255,0.08);border-radius:20px;border-top-left-radius:4px}
        .typing-dot{width:7px;height:7px;background:rgba(255,255,255,0.5);border-radius:50%;animation:typingDot 1.2s infinite ease-in-out}
        .typing-dot:nth-child(2){animation-delay:.15s}
        .typing-dot:nth-child(3){animation-delay:.3s}
        @keyframes typingDot{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}

        .listening-badge{display:flex;align-items:center;justify-content:center;gap:.5rem;padding:.5rem;font-size:.7rem;color:rgba(255,255,255,0.4);border-top:1px solid rgba(255,255,255,0.05);background:rgba(0,0,0,0.2)}
        .waveform{display:flex;align-items:center;gap:2px}
        .waveform span{width:2px;background:#C9A961;border-radius:2px;animation:wave .8s ease-in-out infinite}
        .waveform span:nth-child(1){animation-delay:0s;height:8px}
        .waveform span:nth-child(2){animation-delay:.1s;height:14px}
        .waveform span:nth-child(3){animation-delay:.2s;height:10px}
        .waveform span:nth-child(4){animation-delay:.3s;height:16px}
        .waveform span:nth-child(5){animation-delay:.4s;height:8px}
        @keyframes wave{0%,100%{height:6px;opacity:.4}50%{height:16px;opacity:1}}

        .call-controls{display:flex;justify-content:center;gap:1.5rem;padding:1.25rem 1.5rem;background:rgba(0,0,0,0.3);border-top:1px solid rgba(255,255,255,0.05)}
        .call-btn{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:1.2rem}
        .call-btn.end{background:linear-gradient(135deg,#dc2626,#b91c1c);color:white;box-shadow:0 4px 12px rgba(220,38,38,0.3)}
        .call-btn.end:hover{transform:scale(1.05)}
        .call-btn.mic{background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.1)}
        .call-btn.mic:hover{background:rgba(255,255,255,0.15);transform:scale(1.05)}
        .call-btn.mic.muted{background:rgba(245,158,11,0.2);color:#F59E0B}

        @media(max-width:480px){
            .call-container{border-radius:32px}
            .conversation-area{height:320px}
            .call-btn{width:48px;height:48px}
            .avatar{width:70px;height:70px}
            .avatar i{font-size:2rem}
        }
    </style>
</head>
<body>
<div class="call-container">
    <div class="call-header">
        <div class="avatar-wrapper">
            <div class="pulse-ring"></div>
            <div class="avatar"><i class="fas fa-headset"></i></div>
        </div>
        <div class="call-title">Asistente Virtual</div>
        <div class="call-subtitle">Serenity Spa</div>
        <div class="call-status" id="callStatus">
            <span class="status-dot"></span>
            <span id="statusText">Conectando</span>
        </div>
        <div class="timer" id="callTimer">00:00</div>
    </div>

    <div class="conversation-area" id="conversationArea">
        <div class="message bot">
            <div class="message-avatar"><i class="fas fa-robot"></i></div>
            <div class="message-bubble">Hola, soy el asistente virtual de Serenity Spa. Puedo reservarte un turno de masaje. ¿En qué puedo ayudarte?</div>
        </div>
    </div>

    <div class="listening-badge" id="listeningBadge" style="display:none">
        <div class="waveform"><span></span><span></span><span></span><span></span><span></span></div>
        <span>Escuchando...</span>
    </div>

    <div class="call-controls">
        <button class="call-btn mic" id="micToggleBtn"><i class="fas fa-microphone"></i></button>
        <button class="call-btn end" id="endCallBtn"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<script>
(function() {
    'use strict';

    // ==================== VARIABLES GLOBALES ====================
    let ws = null;
    let recognition = null;
    let synthesis = window.speechSynthesis;

    // Estados del flujo de voz
    let isMicActive = true;      // El micrófono está habilitado
    let isCallActive = true;     // La llamada está activa
    let isBotSpeaking = false;   // El bot está hablando (TTS)
    let isBotThinking = false;   // Esperando respuesta del servidor
    let isListening = false;     // El reconocimiento está activo

    // Timer
    let callStartTime = null;
    let timerInterval = null;

    // Anti-eco: guarda las últimas palabras del bot para filtrar
    let ultimasPalabrasBot = '';
    let ultimasPalabrasBotLower = '';

    // Timeout para detectar silencio del usuario
    let silenceTimeout = null;
    let currentTranscript = '';
    let transcriptLength = 0;

    // Audio para feedback
    let keyAudioCtx = null;

    // ==================== ELEMENTOS DOM ====================
    const DOM = {
        area: document.getElementById('conversationArea'),
        status: document.getElementById('callStatus'),
        statusText: document.getElementById('statusText'),
        timer: document.getElementById('callTimer'),
        badge: document.getElementById('listeningBadge'),
        micBtn: document.getElementById('micToggleBtn'),
        endBtn: document.getElementById('endCallBtn')
    };

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
        agregarMensaje('Tu navegador no soporta reconocimiento de voz. Usa Chrome o Edge.', 'bot');
        isMicActive = false;
        DOM.micBtn.classList.add('muted');
        DOM.micBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
    }

    // ==================== SONIDO DE FEEDBACK ====================
    function initAudio() {
        if (keyAudioCtx) return;
        try {
            keyAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            keyAudioCtx.resume();
        } catch(e) {}
    }

    function playTick() {
        if (!keyAudioCtx) return;
        try {
            const t = keyAudioCtx.currentTime;
            const o = keyAudioCtx.createOscillator();
            const g = keyAudioCtx.createGain();
            o.type = 'sine';
            o.frequency.value = 600 + Math.random() * 400;
            g.gain.value = 0.04;
            o.connect(g);
            g.connect(keyAudioCtx.destination);
            o.start(t);
            g.gain.exponentialRampToValueAtTime(0.00001, t + 0.05);
            o.stop(t + 0.05);
        } catch(e) {}
    }

    // ==================== ESTADO VISUAL ====================
    function setStatus(text, type) {
        DOM.statusText.textContent = text;
        DOM.status.className = 'call-status';
        if (type) DOM.status.classList.add(type);
    }

    function setBadge(visible) {
        DOM.badge.style.display = visible ? 'flex' : 'none';
        if (visible) setStatus('Escuchando...', 'listening');
    }

    // ==================== MENSAJES ====================
    function agregarMensaje(texto, tipo, esTyping) {
        const div = document.createElement('div');
        div.className = 'message ' + tipo;
        const icon = tipo === 'bot' ? 'fas fa-robot' : 'fas fa-user';

        if (esTyping && tipo === 'bot') {
            div.innerHTML = '<div class="message-avatar"><i class="' + icon + '"></i></div>' +
                '<div class="typing-effect"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
            DOM.area.appendChild(div);
            DOM.area.scrollTop = DOM.area.scrollHeight;
            return div;
        }

        div.innerHTML = '<div class="message-avatar"><i class="' + icon + '"></i></div>' +
            '<div class="message-bubble">' + texto.replace(/\n/g, '<br>') + '</div>';
        DOM.area.appendChild(div);
        DOM.area.scrollTop = DOM.area.scrollHeight;

        // Si es mensaje del bot, hablarlo
        if (tipo === 'bot' && texto) {
            hablar(texto);
        }

        return div;
    }

    // ==================== SÍNTESIS DE VOZ (TTS) ====================
    function hablar(texto) {
        if (!synthesis || !isCallActive) return;
        synthesis.cancel(); // Cancelar cualquier habla previa

        // Limpiar emojis y formato para la voz
        let textoLimpio = texto.replace(/[✅📍📅⏰💆‍♂️📞🌸🔊💡❌⚠️🌟🎶]/g, '');
        textoLimpio = textoLimpio.replace(/\*[^\*]+\*/g, ''); // quitar *negritas*
        textoLimpio = textoLimpio.replace(/\n+/g, '. ');
        textoLimpio = textoLimpio.replace(/\s+/g, ' ').trim();

        // Formatear números de teléfono para que se lean bien
        textoLimpio = textoLimpio.replace(/\b(\d{6,12})\b/g, function(match) {
            const grupos = [];
            for (let i = 0; i < match.length; i += 2) grupos.push(match.substr(i, 2));
            return grupos.join(' ');
        });

        // Guardar para anti-eco
        ultimasPalabrasBot = textoLimpio;
        ultimasPalabrasBotLower = textoLimpio.toLowerCase().substring(0, 120);

        const utterance = new SpeechSynthesisUtterance(textoLimpio);
        utterance.lang = 'es-ES';
        utterance.rate = 0.92;
        utterance.pitch = 1.05;
        utterance.volume = 1;

        // Buscar voz en español
        const voces = synthesis.getVoices();
        const vozES = voces.find(v => v.lang.startsWith('es') && v.name.includes('Google')) ||
                      voces.find(v => v.lang.startsWith('es')) || null;
        if (vozES) utterance.voice = vozES;

        utterance.onstart = function() {
            isBotSpeaking = true;
            setStatus('Hablando...', 'speaking');
            setBadge(false);
            // DETENER reconocimiento mientras el bot habla para evitar eco
            detenerReconocimiento();
        };

        utterance.onend = function() {
            isBotSpeaking = false;
            // Esperar un momento después de hablar para que el eco se disipe
            setTimeout(function() {
                if (isCallActive && isMicActive && !isBotThinking) {
                    setStatus('En línea');
                    iniciarReconocimiento();
                    setBadge(true);
                }
            }, 900); // 900ms de pausa anti-eco
        };

        utterance.onerror = function() {
            isBotSpeaking = false;
            if (isCallActive && isMicActive && !isBotThinking) {
                setTimeout(function() {
                    iniciarReconocimiento();
                    setBadge(true);
                }, 500);
            }
        };

        synthesis.speak(utterance);
    }

    // Cargar voces (algunos navegadores las cargan async)
    if (synthesis) {
        synthesis.onvoiceschanged = function() { synthesis.getVoices(); };
    }

    // ==================== RECONOCIMIENTO DE VOZ (STT) ====================
    function iniciarReconocimiento() {
        if (!SpeechRecognition || !isCallActive || !isMicActive || isBotSpeaking || isBotThinking) return;

        // Detener reconocimiento previo si existe
        detenerReconocimiento();

        initAudio();

        recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;

        currentTranscript = '';
        transcriptLength = 0;

        recognition.onstart = function() {
            isListening = true;
            setBadge(true);
        };

        recognition.onresult = function(event) {
            // Reiniciar timeout de silencio
            if (silenceTimeout) clearTimeout(silenceTimeout);

            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    currentTranscript += transcript;
                } else {
                    interim += transcript;
                }
            }

            // Sonido de feedback al detectar nuevas palabras
            const totalLen = (currentTranscript + interim).length;
            if (totalLen > transcriptLength) {
                const diff = totalLen - transcriptLength;
                const ticks = Math.min(diff, 3);
                for (let i = 0; i < ticks; i++) playTick();
                transcriptLength = totalLen;
            }

            // Mostrar lo que se está escuchando
            if (interim) {
                setStatus('"' + interim.substring(0, 30) + '..."', 'listening');
            }

            // Cuando hay texto final, esperar silencio antes de enviar
            if (currentTranscript.trim()) {
                silenceTimeout = setTimeout(function() {
                    const textoFinal = currentTranscript.trim();
                    currentTranscript = '';
                    transcriptLength = 0;

                    // FILTRO ANTI-ECO: verificar que no sea eco del bot
                    if (esEcoDelBot(textoFinal)) {
                        console.log('🔄 Eco detectado, ignorando:', textoFinal.substring(0, 40));
                        return;
                    }

                    // Si parece demasiado corto o solo ruido, ignorar
                    if (textoFinal.length < 2) return;

                    // Procesar el texto del usuario
                    procesarTextoUsuario(textoFinal);
                }, 1800); // Esperar 1.8 segundos de silencio
            }
        };

        recognition.onerror = function(event) {
            if (event.error === 'not-allowed') {
                agregarMensaje('Por favor, permite el acceso al micrófono para usar el asistente.', 'bot');
                setStatus('Sin micrófono');
                isMicActive = false;
                DOM.micBtn.classList.add('muted');
                DOM.micBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
                isListening = false;
                return;
            }
            // Para otros errores, intentar reconectar después de una pausa
            console.log('STT error:', event.error);
            isListening = false;
            if (isCallActive && isMicActive && !isBotSpeaking && !isBotThinking) {
                setTimeout(function() {
                    if (isCallActive && isMicActive && !isBotSpeaking && !isBotThinking) {
                        iniciarReconocimiento();
                    }
                }, 1500);
            }
        };

        recognition.onend = function() {
            isListening = false;
            // Solo reiniciar automáticamente si estamos en modo escucha activa
            // y NO estamos esperando respuesta del servidor ni hablando
            if (isCallActive && isMicActive && !isBotSpeaking && !isBotThinking) {
                setTimeout(function() {
                    if (isCallActive && isMicActive && !isBotSpeaking && !isBotThinking && !isListening) {
                        iniciarReconocimiento();
                    }
                }, 500);
            }
        };

        try {
            recognition.start();
        } catch(e) {
            console.log('Error al iniciar STT:', e);
        }
    }

    function detenerReconocimiento() {
        if (silenceTimeout) { clearTimeout(silenceTimeout); silenceTimeout = null; }
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
            recognition = null;
        }
        isListening = false;
        setBadge(false);
    }

    // ==================== FILTRO ANTI-ECO ====================
    // Compara el texto reconocido con lo que el bot dijo recientemente
    // Si hay demasiada coincidencia, es eco del altavoz
    function esEcoDelBot(texto) {
        if (!ultimasPalabrasBotLower || ultimasPalabrasBotLower.length < 10) return false;

        const textoLower = texto.toLowerCase();
        const botWords = ultimasPalabrasBotLower.split(/\s+/);
        const userWords = textoLower.split(/\s+/);

        if (userWords.length < 2) return false;

        let coincidencias = 0;
        for (const w of userWords) {
            if (w.length < 3) continue; // Ignorar palabras muy cortas
            for (const bw of botWords) {
                if (bw.length < 3) continue;
                if (w === bw || (w.length > 4 && bw.includes(w)) || (bw.length > 4 && w.includes(bw))) {
                    coincidencias++;
                    break;
                }
            }
        }

        // Si más del 50% de las palabras del usuario coinciden con el bot → es eco
        const ratio = coincidencias / userWords.length;
        return ratio > 0.5;
    }

    // ==================== PROCESAMIENTO DE TEXTO DEL USUARIO ====================
    async function procesarTextoUsuario(texto) {
        if (!texto.trim() || isBotThinking) return;

        isBotThinking = true;
        detenerReconocimiento(); // Detener micrófono mientras pensamos
        setStatus('Procesando...', 'thinking');
        setBadge(false);

        // Mostrar mensaje del usuario
        agregarMensaje(texto, 'user');

        // Mostrar indicador de escritura del bot
        const typingEl = agregarMensaje('', 'bot', true);

        // Enviar al servidor
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ tipo: 'transcripcion', texto: texto }));
            // La respuesta vendrá por ws.onmessage
        } else {
            // Sin conexión WebSocket
            await esperar(1500);
            if (typingEl && typingEl.parentNode) typingEl.remove();
            agregarMensaje('Estoy teniendo problemas de conexión. Por favor, espera un momento e intenta de nuevo.', 'bot');
            isBotThinking = false;
            // No reiniciar reconocimiento aquí — lo hará utterance.onend
        }
    }

    // Función llamada cuando llega la respuesta del servidor
    function onRespuestaServidor(texto) {
        // Remover indicador de typing
        const msgs = DOM.area.querySelectorAll('.message.bot');
        const last = msgs[msgs.length - 1];
        if (last && last.querySelector('.typing-effect')) {
            last.remove();
        }

        // Mostrar respuesta y hablar
        agregarMensaje(texto, 'bot');

        isBotThinking = false;

        // NO reiniciar reconocimiento aquí.
        // Lo hará utterance.onend después de que el bot termine de hablar,
        // con la pausa anti-eco de 900ms.
    }

    // ==================== WEBSOCKET ====================
    function conectarWebSocket() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(protocol + '//' + location.host + '/ws-voice');

        ws.onopen = function() {
            console.log('WS conectado');
            setStatus('En línea');
        };

        ws.onmessage = function(event) {
            try {
                const data = JSON.parse(event.data);
                if (data.tipo === 'respuesta') {
                    onRespuestaServidor(data.texto);
                }
            } catch(e) {
                console.error('Error parseando WS:', e);
            }
        };

        ws.onclose = function() {
            console.log('WS desconectado, reconectando...');
            if (isCallActive) {
                setTimeout(conectarWebSocket, 3000);
            }
        };

        ws.onerror = function() {
            // La reconexión la maneja onclose
        };
    }

    // ==================== TIMER ====================
    function iniciarTimer() {
        callStartTime = Date.now();
        timerInterval = setInterval(function() {
            const s = Math.floor((Date.now() - callStartTime) / 1000);
            DOM.timer.textContent =
                String(Math.floor(s / 60)).padStart(2, '0') + ':' +
                String(s % 60).padStart(2, '0');
        }, 1000);
    }

    function detenerTimer() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    }

    // ==================== CONTROLES ====================
    DOM.micBtn.addEventListener('click', function() {
        isMicActive = !isMicActive;
        if (isMicActive) {
            DOM.micBtn.innerHTML = '<i class="fas fa-microphone"></i>';
            DOM.micBtn.classList.remove('muted');
            if (!isBotSpeaking && !isBotThinking) {
                iniciarReconocimiento();
                setStatus('En línea');
            }
        } else {
            DOM.micBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
            DOM.micBtn.classList.add('muted');
            detenerReconocimiento();
            setStatus('Micrófono apagado');
        }
    });

    DOM.endBtn.addEventListener('click', finalizarLlamada);

    function finalizarLlamada() {
        isCallActive = false;
        detenerTimer();
        detenerReconocimiento();
        if (synthesis) synthesis.cancel();
        if (ws) ws.close();
        setStatus('Llamada finalizada');
        setBadge(false);
        agregarMensaje('Llamada finalizada. Gracias por contactar Serenity Spa. ¡Hasta luego!', 'bot');
        setTimeout(function() { window.location.href = '/'; }, 3000);
    }

    // ==================== UTILIDADES ====================
    function esperar(ms) {
        return new Promise(function(resolve) { setTimeout(resolve, ms); });
    }

    // Sonido de llamada inicial
    function playRingTone() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            [440, 554, 659].forEach(function(freq, i) {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.frequency.value = freq;
                gain.gain.value = 0.08;
                osc.start(ctx.currentTime + i * 0.15);
                gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + i * 0.15 + 0.3);
                osc.stop(ctx.currentTime + i * 0.15 + 0.3);
            });
            setTimeout(function() { ctx.close(); }, 1000);
        } catch(e) {}
    }

    // ==================== INICIO ====================
    function iniciar() {
        iniciarTimer();
        conectarWebSocket();
        playRingTone();

        // Iniciar reconocimiento después de un momento
        setTimeout(function() {
            if (isCallActive && isMicActive && SpeechRecognition) {
                iniciarReconocimiento();
            }
        }, 1500);
    }

    iniciar();

})();
</script>
