<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistente de Voz | Serenity Spa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            max-width: 500px;
            width: 100%;
            background: linear-gradient(145deg, #1a1a2e, #16213e);
            border-radius: 2rem;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .header {
            background: rgba(0,0,0,0.3);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #C9A961, #A8883F);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
        }
        .avatar svg {
            width: 35px;
            height: 35px;
            color: white;
        }
        h1 {
            color: white;
            font-size: 1.3rem;
        }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255,255,255,0.1);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.7rem;
            color: #ccc;
            margin-top: 0.5rem;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
        }
        .dot.recording { background: #ef4444; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        
        .chat {
            height: 400px;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .message {
            display: flex;
            gap: 0.5rem;
            max-width: 85%;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .avatar-msg {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #C9A961;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            color: #1a1a2e;
        }
        .message.user .avatar-msg {
            background: #2a2a4a;
            color: #C9A961;
        }
        .bubble {
            background: rgba(255,255,255,0.1);
            padding: 0.6rem 1rem;
            border-radius: 18px;
            font-size: 0.85rem;
            color: white;
            line-height: 1.4;
        }
        .message.user .bubble {
            background: #C9A961;
            color: #1a1a2e;
        }
        .footer {
            padding: 1rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 0.5rem;
        }
        .mic-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #C9A961, #A8883F);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .mic-btn.recording {
            background: #ef4444;
            animation: pulse 1s infinite;
        }
        .mic-btn svg {
            width: 28px;
            height: 28px;
            color: white;
        }
        .input-area {
            flex: 1;
            display: flex;
            gap: 0.5rem;
        }
        .input-area input {
            flex: 1;
            padding: 0.8rem;
            border-radius: 30px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
        }
        .input-area input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        .input-area button {
            padding: 0.8rem 1.2rem;
            border-radius: 30px;
            border: none;
            background: #C9A961;
            color: #1a1a2e;
            font-weight: bold;
            cursor: pointer;
        }
        .hidden {
            display: none;
        }
        .typing {
            display: flex;
            gap: 0.2rem;
            padding: 0.5rem 1rem;
        }
        .typing span {
            width: 6px;
            height: 6px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="avatar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </div>
        <h1>Asistente de Voz</h1>
        <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Conectado</span>
        </div>
    </div>
    
    <div class="chat" id="chat"></div>
    
    <div class="footer">
        <button class="mic-btn" id="micBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
    </div>
    
    <div class="footer hidden" id="textModeFooter">
        <div class="input-area">
            <input type="text" id="textInput" placeholder="Escribe tu mensaje...">
            <button id="sendBtn">Enviar</button>
        </div>
    </div>
</div>

<script>
    let ws = null;
    let recognition = null;
    let isRecording = false;
    let isTyping = false;
    let textMode = false;
    
    const chat = document.getElementById('chat');
    const micBtn = document.getElementById('micBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const textModeFooter = document.getElementById('textModeFooter');
    const textInput = document.getElementById('textInput');
    const sendBtn = document.getElementById('sendBtn');
    
    function addMessage(text, isUser) {
        const div = document.createElement('div');
        div.className = 'message ' + (isUser ? 'user' : 'bot');
        div.innerHTML = `
            <div class="avatar-msg">${isUser ? 'T' : 'S'}</div>
            <div class="bubble">${text}</div>
        `;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
        
        // Leer en voz alta si es del bot
        if (!isUser && 'speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'es-ES';
            utterance.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
    }
    
    function showTyping() {
        if (isTyping) return;
        isTyping = true;
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message bot';
        typingDiv.id = 'typingIndicator';
        typingDiv.innerHTML = `
            <div class="avatar-msg">S</div>
            <div class="bubble typing"><span></span><span></span><span></span></div>
        `;
        chat.appendChild(typingDiv);
        chat.scrollTop = chat.scrollHeight;
    }
    
    function hideTyping() {
        isTyping = false;
        const typing = document.getElementById('typingIndicator');
        if (typing) typing.remove();
    }
    
    async function sendToAI(message) {
        showTyping();
        try {
            const response = await fetch('/api/chat-ia', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensaje: message })
            });
            const data = await response.json();
            hideTyping();
            addMessage(data.respuesta, false);
        } catch(e) {
            hideTyping();
            addMessage('Lo siento, hubo un error. ¿Podrías repetir?', false);
        }
    }
    
    function startRecording() {
        if (isRecording) return;
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            addMessage('Tu navegador no soporta reconocimiento de voz. Usa el modo texto.', false);
            return;
        }
        
        recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = false;
        recognition.interimResults = false;
        
        recognition.onstart = () => {
            isRecording = true;
            micBtn.classList.add('recording');
            statusDot.classList.add('recording');
            statusText.textContent = 'Grabando...';
        };
        
        recognition.onresult = (event) => {
            const text = event.results[0][0].transcript;
            addMessage(text, true);
            sendToAI(text);
        };
        
        recognition.onend = () => {
            isRecording = false;
            micBtn.classList.remove('recording');
            statusDot.classList.remove('recording');
            statusText.textContent = 'Escuchando...';
        };
        
        recognition.onerror = (event) => {
            console.error('Error:', event.error);
            if (event.error !== 'no-speech') {
                addMessage('No te entendí. ¿Podrías repetir?', false);
            }
            isRecording = false;
            micBtn.classList.remove('recording');
            statusDot.classList.remove('recording');
            statusText.textContent = 'Escuchando...';
        };
        
        recognition.start();
    }
    
    function stopRecording() {
        if (recognition) {
            recognition.stop();
        }
    }
    
    // Eventos del micrófono (presionar para grabar, soltar para enviar)
    micBtn.addEventListener('mousedown', startRecording);
    micBtn.addEventListener('mouseup', stopRecording);
    micBtn.addEventListener('mouseleave', stopRecording);
    
    micBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        startRecording();
    });
    micBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        stopRecording();
    });
    
    // Modo texto (opcional)
    let longPressTimer;
    micBtn.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        textMode = !textMode;
        if (textMode) {
            micBtn.classList.add('hidden');
            textModeFooter.classList.remove('hidden');
            textInput.focus();
            statusText.textContent = 'Modo texto';
        } else {
            micBtn.classList.remove('hidden');
            textModeFooter.classList.add('hidden');
            statusText.textContent = 'Escuchando...';
        }
    });
    
    sendBtn.addEventListener('click', () => {
        const text = textInput.value.trim();
        if (text) {
            addMessage(text, true);
            sendToAI(text);
            textInput.value = '';
        }
    });
    
    textInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            sendBtn.click();
        }
    });
    
    statusText.textContent = 'Listo';
</script>
</body>
</html>
