<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Llamada Asistente - Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a2332 0%, #2C3E50 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        
        .call-modal {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            max-width: 450px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            animation: slideUp 0.4s ease;
        }
        
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .call-header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .avatar-call {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #C9A961, #A8883F);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            box-shadow: 0 0 20px rgba(201,169,97,0.3);
        }
        
        .avatar-call i {
            font-size: 2.5rem;
            color: white;
        }
        
        .call-title {
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
        }
        
        .call-status {
            color: rgba(255,255,255,0.6);
            font-size: 0.75rem;
            margin-top: 0.3rem;
        }
        
        .timer {
            color: #C9A961;
            font-size: 0.8rem;
            margin-top: 0.5rem;
            font-family: monospace;
        }
        
        .conversation-area {
            height: 400px;
            padding: 1rem;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
        }
        
        .message {
            margin-bottom: 1rem;
            display: flex;
            gap: 0.75rem;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(201,169,97,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .message-avatar i {
            font-size: 0.8rem;
            color: #C9A961;
        }
        
        .message.user .message-avatar {
            background: rgba(201,169,97,0.3);
        }
        
        .message-bubble {
            max-width: 75%;
            padding: 0.75rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            line-height: 1.4;
        }
        
        .message.bot .message-bubble {
            background: rgba(255,255,255,0.1);
            color: white;
            border-top-left-radius: 4px;
        }
        
        .message.user .message-bubble {
            background: #C9A961;
            color: #1a1a2e;
            border-bottom-right-radius: 4px;
        }
        
        .typing-effect {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 0.75rem 1rem;
            border-radius: 20px;
            border-top-left-radius: 4px;
        }
        
        .typing-effect span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            margin: 0 2px;
            animation: typingDot 1.4s infinite ease-in-out;
        }
        
        .typing-effect span:nth-child(2) { animation-delay: 0.2s; }
        .typing-effect span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-6px); opacity: 1; }
        }
        
        .listening-indicator {
            text-align: center;
            padding: 0.5rem;
            color: rgba(255,255,255,0.5);
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .listening-indicator .pulse-dot {
            width: 8px;
            height: 8px;
            background: #10B981;
            border-radius: 50%;
            animation: pulseGreen 1.5s infinite;
        }
        
        @keyframes pulseGreen {
            0% { transform: scale(1); opacity: 1; }
            70% { transform: scale(2); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }
        
        .call-controls {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            padding: 1.5rem;
            background: rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        
        .call-btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .call-btn.end {
            background: #dc2626;
            color: white;
        }
        
        .call-btn.end:hover {
            background: #b91c1c;
            transform: scale(1.05);
        }
        
        .call-btn.mic {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        
        .call-btn.mic.muted {
            background: #f59e0b;
            color: #1a1a2e;
        }
        
        @media (max-width: 480px) {
            .call-modal { border-radius: 30px; }
            .conversation-area { height: 350px; }
            .call-btn { width: 48px; height: 48px; }
            .avatar-call { width: 65px; height: 65px; }
        }
    </style>
</head>
<body>
<div class="call-modal" id="callModal">
    <div class="call-header">
        <div class="avatar-call">
            <i class="fas fa-headset"></i>
        </div>
        <div class="call-title">Asistente Serenity Spa</div>
        <div class="call-status" id="callStatus">🟢 Conectando...</div>
        <div class="timer" id="callTimer">00:00</div>
    </div>
    
    <div class="conversation-area" id="conversationArea">
        <div class="message bot">
            <div class="message-avatar"><i class="fas fa-robot"></i></div>
            <div class="message-bubble">
                Hola, soy el asistente de Serenity Spa. ¿En qué puedo ayudarte?
            </div>
        </div>
    </div>
    
    <div class="listening-indicator" id="listeningIndicator" style="display: none;">
        <span class="pulse-dot"></span>
        <span>🎤 Escuchando...</span>
    </div>
    
    <div class="call-controls">
        <button class="call-btn mic" id="micToggleBtn">
            <i class="fas fa-microphone"></i>
        </button>
        <button class="call-btn end" id="endCallBtn">
            <i class="fas fa-phone-slash"></i>
        </button>
    </div>
</div>

<script>
    let ws = null;
    let recognition = null;
    let synthesis = null;
    let isMicActive = true;
    let isCallActive = true;
    let callStartTime = null;
    let timerInterval = null;
    let isBotThinking = false;
    
    const conversationArea = document.getElementById('conversationArea');
    const callStatus = document.getElementById('callStatus');
    const callTimer = document.getElementById('callTimer');
    const listeningIndicator = document.getElementById('listeningIndicator');
    const micToggleBtn = document.getElementById('micToggleBtn');
    const endCallBtn = document.getElementById('endCallBtn');
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    synthesis = window.speechSynthesis;
    
    if (!SpeechRecognition) {
        agregarMensajeBot("⚠️ Tu navegador no soporta llamadas de voz. Usa Chrome, Edge o Safari.");
        callStatus.textContent = "❌ No soportado";
    }
    
    function agregarMensajeBot(texto, isTyping = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message bot';
        messageDiv.innerHTML = `
            <div class="message-avatar"><i class="fas fa-robot"></i></div>
            <div class="message-bubble"></div>
        `;
        const bubble = messageDiv.querySelector('.message-bubble');
        
        if (isTyping) {
            bubble.innerHTML = '<div class="typing-effect"><span></span><span></span><span></span></div>';
        } else {
            bubble.innerHTML = texto.replace(/\n/g, '<br>');
        }
        
        conversationArea.appendChild(messageDiv);
        conversationArea.scrollTop = conversationArea.scrollHeight;
        
        if (!isTyping && texto) {
            hablar(texto);
        }
        
        return bubble;
    }
    
    function agregarMensajeUsuario(texto) {
        const messageDiv = document.createElement('div');
        messageDiv.className = 'message user';
        messageDiv.innerHTML = `
            <div class="message-avatar"><i class="fas fa-user"></i></div>
            <div class="message-bubble"></div>
        `;
        messageDiv.querySelector('.message-bubble').textContent = texto;
        conversationArea.appendChild(messageDiv);
        conversationArea.scrollTop = conversationArea.scrollHeight;
    }
    
    function actualizarIndicadorEscucha(activo) {
        if (activo && isMicActive && !isBotThinking) {
            listeningIndicator.style.display = 'flex';
            callStatus.innerHTML = '🎤 Escuchando...';
        } else {
            listeningIndicator.style.display = 'none';
            if (!isBotThinking) callStatus.innerHTML = '🟢 En línea';
        }
    }
    
    function iniciarTimer() {
        callStartTime = Date.now();
        timerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
            const minutos = Math.floor(elapsed / 60);
            const segundos = elapsed % 60;
            callTimer.textContent = `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
        }, 1000);
    }
    
    function detenerTimer() {
        if (timerInterval) clearInterval(timerInterval);
    }
    
    function hablar(texto) {
        if (!synthesis || !isCallActive) return;
        
        synthesis.cancel();
        
        let textoLimpio = texto
            .replace(/\*/g, '')
            .replace(/✅/g, '')
            .replace(/📍/g, '')
            .replace(/📅/g, '')
            .replace(/⏰/g, '');
        
        textoLimpio = textoLimpio.replace(/\b\d{8,12}\b/g, (match) => {
            const grupos = [];
            for (let i = 0; i < match.length; i += 2) {
                grupos.push(match.substr(i, 2));
            }
            return grupos.join(' ');
        });
        
        const utterance = new SpeechSynthesisUtterance(textoLimpio);
        utterance.lang = 'es-ES';
        utterance.rate = 0.9;
        utterance.pitch = 1;
        
        utterance.onstart = () => {
            callStatus.innerHTML = '🔊 Hablando...';
            if (recognition) try { recognition.stop(); } catch(e) {}
        };
        
        utterance.onend = () => {
            if (isCallActive && isMicActive && !isBotThinking) {
                actualizarIndicadorEscucha(true);
                if (recognition) {
                    try { recognition.start(); } catch(e) {}
                }
            } else {
                actualizarIndicadorEscucha(false);
            }
        };
        
        synthesis.speak(utterance);
    }
    
    function iniciarReconocimiento() {
        if (!SpeechRecognition || !isCallActive || !isMicActive || isBotThinking) return;
        
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
        
        recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        
        let finalTranscript = '';
        let interimTimeout = null;
        
        recognition.onstart = () => {
            actualizarIndicadorEscucha(true);
        };
        
        recognition.onresult = (event) => {
            if (interimTimeout) clearTimeout(interimTimeout);
            
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalTranscript += transcript;
                } else {
                    interim += transcript;
                }
            }
            
            if (interim) {
                callStatus.innerHTML = `🎤 "${interim.substring(0, 35)}..."`;
            }
            
            if (finalTranscript.trim()) {
                interimTimeout = setTimeout(() => {
                    const textoUsuario = finalTranscript.trim();
                    if (textoUsuario && !isBotThinking) {
                        finalTranscript = '';
                        procesarTextoUsuario(textoUsuario);
                    }
                }, 1200);
            }
        };
        
        recognition.onerror = (event) => {
            if (event.error === 'not-allowed') {
                agregarMensajeBot("❌ Permiso de micrófono denegado. Por favor permite el acceso.");
                callStatus.textContent = "❌ Sin micrófono";
            } else if (isCallActive && isMicActive && !isBotThinking) {
                setTimeout(() => {
                    try { recognition.start(); } catch(e) {}
                }, 1000);
            }
        };
        
        recognition.onend = () => {
            if (isCallActive && isMicActive && !isBotThinking) {
                setTimeout(() => {
                    try { recognition.start(); } catch(e) {}
                }, 500);
            }
        };
        
        recognition.start();
    }
    
    async function procesarTextoUsuario(texto) {
        if (!texto.trim() || isBotThinking) return;
        
        isBotThinking = true;
        actualizarIndicadorEscucha(false);
        
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
        
        agregarMensajeUsuario(texto);
        
        const typingBubble = agregarMensajeBot('', true);
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ tipo: 'transcripcion', texto: texto }));
        } else {
            await new Promise(resolve => setTimeout(resolve, 1500));
            typingBubble.innerHTML = "Lo siento, estoy teniendo problemas de conexión. Por favor intenta de nuevo.";
            hablar("Lo siento, estoy teniendo problemas de conexión. Por favor intenta de nuevo.");
        }
        
        isBotThinking = false;
        
        if (isCallActive && isMicActive) {
            setTimeout(() => {
                try { recognition.start(); } catch(e) {}
            }, 1000);
        }
    }
    
    function conectarWebSocket() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws-voice`);
        
        ws.onopen = () => {
            console.log('✅ Conectado al asistente');
            callStatus.innerHTML = '🟢 En línea';
        };
        
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            if (data.tipo === 'respuesta') {
                const messages = conversationArea.querySelectorAll('.message.bot');
                const lastMessage = messages[messages.length - 1];
                if (lastMessage && lastMessage.querySelector('.typing-effect')) {
                    lastMessage.querySelector('.message-bubble').innerHTML = data.texto.replace(/\n/g, '<br>');
                } else {
                    agregarMensajeBot(data.texto);
                }
                hablar(data.texto);
            }
        };
        
        ws.onclose = () => {
            console.log('WebSocket cerrado, reconectando...');
            setTimeout(conectarWebSocket, 3000);
        };
    }
    
    function iniciarLlamada() {
        iniciarTimer();
        conectarWebSocket();
        
        setTimeout(() => {
            iniciarReconocimiento();
        }, 1000);
        
        try {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gain = audioContext.createGain();
            oscillator.connect(gain);
            gain.connect(audioContext.destination);
            oscillator.frequency.value = 440;
            gain.gain.value = 0.08;
            oscillator.start();
            setTimeout(() => {
                oscillator.stop();
                audioContext.close();
            }, 400);
        } catch(e) { console.log('Audio no soportado'); }
    }
    
    function finalizarLlamada() {
        isCallActive = false;
        detenerTimer();
        
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
        if (synthesis) {
            synthesis.cancel();
        }
        if (ws) {
            ws.close();
        }
        
        agregarMensajeBot("👋 Llamada finalizada. Gracias por contactar Serenity Spa. ¡Hasta luego!");
        
        setTimeout(() => {
            window.location.href = '/';
        }, 3000);
    }
    
    micToggleBtn.addEventListener('click', () => {
        isMicActive = !isMicActive;
        if (isMicActive) {
            micToggleBtn.innerHTML = '<i class="fas fa-microphone"></i>';
            micToggleBtn.classList.remove('muted');
            iniciarReconocimiento();
            callStatus.innerHTML = '🟢 En línea';
        } else {
            micToggleBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
            micToggleBtn.classList.add('muted');
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
            actualizarIndicadorEscucha(false);
            callStatus.innerHTML = '🔇 Micrófono apagado';
        }
    });
    
    endCallBtn.addEventListener('click', finalizarLlamada);
    
    iniciarLlamada();
</script>
</body>
</html>
