<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Asistente de Voz | Serenity Spa</title>
  <meta name="description" content="Asistente de voz para reservar turnos en Serenity Spa. Masajes relajantes, corporales y faciales." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --gold:#C9A961;--gold-deep:#A8883F;--bg:#0E0F0D;--bg-card:rgba(22,24,20,.82);
      --text:#F5F2EB;--text-muted:rgba(245,242,235,.35);--border:rgba(255,255,255,.06);
      --radius:40px;--shadow:0 32px 64px -16px rgba(0,0,0,.7);
    }
    body{
      font-family:'DM Sans',sans-serif;background:var(--bg);
      min-height:100dvh;display:flex;align-items:center;justify-content:center;
      padding:1rem;
    }
    .card{
      width:100%;max-width:480px;background:var(--bg-card);
      backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
      border-radius:var(--radius);box-shadow:var(--shadow);
      border:1px solid var(--border);overflow:hidden;
    }
    .header{
      padding:2rem 1.75rem 1.5rem;border-bottom:1px solid var(--border);
      text-align:center;position:relative;
    }
    .avatar{
      width:80px;height:80px;border-radius:50%;
      background:linear-gradient(135deg,var(--gold),var(--gold-deep));
      display:flex;align-items:center;justify-content:center;
      margin:0 auto;box-shadow:0 8px 32px rgba(201,169,97,.35);
      transition:all .3s;
    }
    .avatar.speaking{
      animation:avatarPulse .5s ease-in-out infinite;
    }
    @keyframes avatarPulse{
      0%,100%{transform:scale(1)}
      50%{transform:scale(1.08)}
    }
    .avatar svg{width:32px;height:32px;color:white}
    .title{
      font-family:'Playfair Display',serif;font-size:1.35rem;
      color:var(--text);margin-top:.75rem;
    }
    .status{
      display:inline-flex;align-items:center;gap:.5rem;
      padding:.35rem .9rem;border-radius:40px;
      background:rgba(255,255,255,.05);font-size:.7rem;
      color:var(--text);margin-top:.75rem;
    }
    .status-dot{width:7px;height:7px;border-radius:50%;background:#6DB98C}
    .status-dot.recording{background:#E8A060;animation:blink .8s infinite alternate}
    .status-dot.speaking{background:#6BA3D6;animation:blink .5s infinite alternate}
    .status-dot.error{background:#E07070}
    @keyframes blink{from{opacity:1}to{opacity:.35}}
    
    .conversation{
      height:350px;overflow-y:auto;padding:1.25rem;
      display:flex;flex-direction:column;gap:.9rem;
      -webkit-overflow-scrolling:touch;scroll-behavior:smooth;
    }
    .message{display:flex;gap:.6rem;align-items:flex-end}
    .message.user{flex-direction:row-reverse}
    .msg-pip{
      width:28px;height:28px;border-radius:50%;
      background:linear-gradient(135deg,var(--gold),var(--gold-deep));
      display:flex;align-items:center;justify-content:center;
      font-size:.65rem;color:white;flex-shrink:0;
    }
    .message.user .msg-pip{background:rgba(255,255,255,.1);color:var(--gold)}
    .bubble{
      max-width:76%;padding:.65rem 1rem;border-radius:18px;
      font-size:.84rem;line-height:1.55;color:var(--text);
      word-wrap:break-word;overflow-wrap:break-word;
    }
    .message.bot .bubble{
      background:rgba(255,255,255,.07);border:1px solid var(--border);
      border-bottom-left-radius:4px;white-space:pre-line;
    }
    .message.user .bubble{
      background:linear-gradient(135deg,var(--gold),var(--gold-deep));
      color:#1A160A;font-weight:500;border-bottom-right-radius:4px;
    }
    .time{font-size:.6rem;color:var(--text-muted);margin-top:.3rem;text-align:right}
    .message.bot .time{text-align:left}
    
    .controls{
      padding:1.4rem 1.75rem 1.75rem;border-top:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
    }
    .btn-back{
      padding:.6rem 1.15rem;border-radius:40px;
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
      color:var(--text);text-decoration:none;font-size:.8rem;font-weight:500;
      display:inline-flex;align-items:center;gap:.3rem;
    }
    .btn-mic{
      width:72px;height:72px;border-radius:50%;
      background:linear-gradient(145deg,#E8C97A,#A8883F);
      border:none;color:white;font-size:1.5rem;cursor:pointer;
      box-shadow:0 8px 32px rgba(201,169,97,.4);
      display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;
      user-select:none;-webkit-user-select:none;
      touch-action:manipulation;
    }
    .btn-mic.recording{
      background:linear-gradient(145deg,#F0A060,#C06030);
      animation:pulse 1.5s infinite;
    }
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    
    .voice-toggle{
      position:absolute;top:1.1rem;left:1.25rem;
      width:36px;height:36px;border-radius:50%;
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
      color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;
      font-size:.8rem;z-index:2;transition:all .2s;
    }
    .voice-toggle.muted{color:#E07070;border-color:rgba(224,112,112,.3)}
    
    .toast-container{
      position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
      z-index:999;display:flex;flex-direction:column;align-items:center;
      gap:.5rem;pointer-events:none;width:min(90vw,380px);
    }
    .toast{
      background:rgba(22,24,20,.95);border:1px solid var(--border);
      border-radius:12px;padding:.65rem 1.1rem;font-size:.8rem;
      color:var(--text);display:flex;align-items:center;gap:.6rem;
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      box-shadow:0 8px 24px rgba(0,0,0,.4);
      pointer-events:auto;animation:toastIn .35s ease both;
    }
    @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    
    @media(max-width:520px){
      body{padding:.5rem}
      .card{border-radius:24px}
      .conversation{height:280px;padding:1rem}
      .header{padding:1.5rem 1.25rem 1.25rem}
      .controls{padding:1rem 1.25rem 1.5rem}
      .btn-mic{width:64px;height:64px}
    }
  </style>
</head>
<body>

<main class="card" role="main" aria-label="Asistente de Voz - Serenity Spa">
  <header class="header">
    <!-- Botón para silenciar/activar voz -->
    <button class="voice-toggle" id="voiceToggle" aria-label="Activar/desactivar voz" title="Activar/desactivar voz del asistente">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
      </svg>
    </button>

    <div class="avatar" id="avatarEl" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </div>
    <h1 class="title">Asistente de Voz</h1>
    <div class="status" id="statusBadge" role="status" aria-live="polite">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Conectando...</span>
    </div>
  </header>
  
  <section class="conversation" id="conversation" aria-live="polite" aria-label="Conversación"></section>
  
  <footer class="controls">
    <a href="/" class="btn-back" aria-label="Volver al inicio">← Volver</a>
    <button class="btn-mic" id="micBtn" aria-label="Mantener presionado para hablar">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <div style="width:85px" aria-hidden="true"></div>
  </footer>
</main>

<div class="toast-container" id="toastContainer" aria-live="assertive"></div>

<script>
// ============================================================
// ASISTENTE DE VOZ — AHORA HABLA COMO HUMANO (Text-to-Speech)
// ============================================================
(function() {
  'use strict';
  console.log('🎤 Iniciando asistente de voz con TTS...');
  
  // DOM
  const micBtn = document.getElementById('micBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const conversation = document.getElementById('conversation');
  const toastContainer = document.getElementById('toastContainer');
  const avatarEl = document.getElementById('avatarEl');
  const voiceToggle = document.getElementById('voiceToggle');
  
  // Estado
  let ws = null;
  let recognition = null;
  let isRecording = false;
  let isMuted = false;
  let isSpeaking = false;
  let reconnectAttempt = 0;
  let reconnectTimer = null;
  let speechQueue = [];
  
  // ============================================================
  // TOAST
  // ============================================================
  function showToast(msg, duration) {
    duration = duration || 3500;
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    toastContainer.appendChild(toast);
    setTimeout(function() {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity .3s';
      setTimeout(function() { toast.remove(); }, 300);
    }, duration);
  }
  
  // ============================================================
  // STATUS
  // ============================================================
  function setStatus(text, type) {
    statusText.textContent = text;
    statusDot.className = 'status-dot';
    if (type === 'recording') statusDot.classList.add('recording');
    if (type === 'speaking') statusDot.classList.add('speaking');
    if (type === 'error') statusDot.classList.add('error');
  }
  
  // ============================================================
  // TEXT-TO-SPEECH (HABLAR COMO HUMANO)
  // ============================================================
  function speakText(text) {
    if (isMuted) return;
    if (!window.speechSynthesis) return;
    
    // Limpiar el texto
    const cleanText = text
      .replace(/<[^>]*>/g, '')
      .replace(/\*/g, '')
      .replace(/[_~`]/g, '')
      .replace(/¿Te sirve esa opción\? Di sí o no\./, '¿Te sirve esa opción? Di sí o no.')
      .trim();
    
    if (!cleanText) return;
    
    // Cancelar cualquier voz previa
    window.speechSynthesis.cancel();
    
    // Crear utterance
    const utterance = new SpeechSynthesisUtterance(cleanText);
    utterance.lang = 'es-AR';
    utterance.rate = 0.95;     // Velocidad natural
    utterance.pitch = 1.05;    // Tono ligeramente más agradable
    utterance.volume = 1;
    
    // Buscar la mejor voz en español
    const voices = window.speechSynthesis.getVoices();
    const spanishVoice = voices.find(v => v.lang.startsWith('es') && v.name.includes('Google')) ||
                         voices.find(v => v.lang.startsWith('es') && v.name.includes('Natural')) ||
                         voices.find(v => v.lang.startsWith('es') && v.name.includes('Female')) ||
                         voices.find(v => v.lang.startsWith('es-AR')) ||
                         voices.find(v => v.lang.startsWith('es-MX')) ||
                         voices.find(v => v.lang.startsWith('es-ES')) ||
                         voices.find(v => v.lang.startsWith('es'));
    
    if (spanishVoice) {
      utterance.voice = spanishVoice;
      console.log('🗣️ Usando voz:', spanishVoice.name);
    }
    
    // Eventos de habla
    utterance.onstart = function() {
      isSpeaking = true;
      avatarEl.classList.add('speaking');
      setStatus('Hablando...', 'speaking');
    };
    
    utterance.onend = function() {
      isSpeaking = false;
      avatarEl.classList.remove('speaking');
      setStatus('Escuchando');
      
      // Procesar siguiente en cola
      if (speechQueue.length > 0) {
        const next = speechQueue.shift();
        setTimeout(function() { speakText(next); }, 300);
      }
    };
    
    utterance.onerror = function(e) {
      console.warn('Error TTS:', e);
      isSpeaking = false;
      avatarEl.classList.remove('speaking');
      setStatus('Escuchando');
    };
    
    window.speechSynthesis.speak(utterance);
  }
  
  // Cargar voces al inicio
  if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = function() {
      window.speechSynthesis.getVoices();
    };
  }
  
  // ============================================================
  // TOGGLE DE VOZ (SILENCIAR/ACTIVAR)
  // ============================================================
  const muteIcon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>`;
  const unmuteIcon = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>`;
  
  voiceToggle.addEventListener('click', function() {
    isMuted = !isMuted;
    voiceToggle.classList.toggle('muted', isMuted);
    voiceToggle.innerHTML = isMuted ? muteIcon : unmuteIcon;
    voiceToggle.setAttribute('aria-label', isMuted ? 'Activar voz' : 'Silenciar voz');
    
    if (isMuted && window.speechSynthesis) {
      window.speechSynthesis.cancel();
      isSpeaking = false;
      avatarEl.classList.remove('speaking');
      setStatus('Escuchando');
    }
    
    showToast(isMuted ? 'Voz silenciada' : 'Voz activada', 2000);
  });
  
  // ============================================================
  // MENSAJES
  // ============================================================
  function addMessage(text, who) {
    const row = document.createElement('div');
    row.className = 'message ' + (who === 'user' ? 'user' : 'bot');
    
    const pip = document.createElement('div');
    pip.className = 'msg-pip';
    pip.textContent = who === 'user' ? 'T' : 'S';
    pip.setAttribute('aria-hidden', 'true');
    
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    
    const time = document.createElement('div');
    time.className = 'time';
    time.textContent = new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
    bubble.appendChild(time);
    
    row.appendChild(pip);
    row.appendChild(bubble);
    conversation.appendChild(row);
    conversation.scrollTop = conversation.scrollHeight;
    
    // Si es mensaje del bot, leerlo en voz alta
    if (who === 'bot' && !isMuted) {
      if (isSpeaking) {
        // Si está hablando, encolar
        speechQueue.push(text);
      } else {
        // Hablar inmediatamente
        speakText(text);
      }
    }
  }
  
  function welcomeMessage() {
    const msg = '🌿 ¡Hola! Soy el asistente virtual de Serenity Spa. ' +
                'Podés decirme "reservar turno" para agendar una cita, ' +
                'o "cancelar turno" si necesitás cancelar. ' +
                'Atendemos de lunes a sábado, a las doce del mediodía, cuatro de la tarde y ocho de la noche. ' +
                '¿En qué puedo ayudarte?';
    addMessage(msg, 'bot');
  }
  
  // ============================================================
  // WEBSOCKET
  // ============================================================
  function connectWebSocket() {
    if (reconnectTimer) {
      clearTimeout(reconnectTimer);
      reconnectTimer = null;
    }
    
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
      ws.close(1000, 'Reconexión');
    }
    
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = protocol + '//' + location.host + '/ws-voice';
    
    console.log('🔌 Conectando a:', wsUrl);
    
    try {
      ws = new WebSocket(wsUrl);
    } catch(e) {
      console.error('Error WebSocket:', e);
      setStatus('Error de conexión', 'error');
      scheduleReconnect();
      return;
    }
    
    ws.onopen = function() {
      console.log('✅ WebSocket conectado');
      reconnectAttempt = 0;
      setStatus('Escuchando');
      welcomeMessage();
    };
    
    ws.onmessage = function(event) {
      try {
        const data = JSON.parse(event.data);
        console.log('📩 Respuesta:', data.texto ? data.texto.substring(0, 80) + '...' : data);
        if (data.tipo === 'respuesta') {
          addMessage(data.texto, 'bot');
        }
      } catch(e) {
        console.error('Error parseando mensaje:', e);
      }
    };
    
    ws.onerror = function() {
      console.error('❌ Error WebSocket');
      setStatus('Error', 'error');
    };
    
    ws.onclose = function(event) {
      console.log('🔌 WebSocket cerrado:', event.code);
      if (event.code !== 1000) {
        scheduleReconnect();
      }
    };
  }
  
  function scheduleReconnect() {
    reconnectAttempt++;
    const delay = Math.min(3000 + reconnectAttempt * 1000, 12000);
    setStatus('Reconectando...', 'error');
    console.log('⏳ Reintentando en ' + (delay/1000) + 's');
    reconnectTimer = setTimeout(connectWebSocket, delay);
  }
  
  // ============================================================
  // RECONOCIMIENTO DE VOZ
  // ============================================================
  function startRecording() {
    if (isRecording) return;
    
    // Detener TTS si está hablando
    if (window.speechSynthesis && isSpeaking) {
      window.speechSynthesis.cancel();
      isSpeaking = false;
      avatarEl.classList.remove('speaking');
      speechQueue = [];
    }
    
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
      showToast('Tu navegador no soporta reconocimiento de voz. Usá Chrome o Edge.');
      addMessage('❌ Este navegador no soporta reconocimiento de voz. Probá con Google Chrome.', 'bot');
      return;
    }
    
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      showToast('Reconectando con el servidor...');
      connectWebSocket();
      return;
    }
    
    try {
      recognition = new SpeechRecognition();
      recognition.lang = 'es-ES';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      
      recognition.onstart = function() {
        console.log('🎤 Grabando...');
        isRecording = true;
        micBtn.classList.add('recording');
        setStatus('Grabando...', 'recording');
        if (navigator.vibrate) navigator.vibrate(40);
      };
      
      recognition.onresult = function(event) {
        const text = event.results[0][0].transcript;
        console.log('📝 Reconocido:', text);
        addMessage(text, 'user');
        
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ tipo: 'transcripcion', texto: text }));
        } else {
          addMessage('⚠️ Sin conexión. Reintentando...', 'bot');
          connectWebSocket();
        }
      };
      
      recognition.onerror = function(event) {
        console.error('❌ Error voz:', event.error);
        
        const mensajes = {
          'no-speech': 'No detecté sonido. Hablá más cerca del micrófono.',
          'audio-capture': 'No se pudo acceder al micrófono. Verificá los permisos.',
          'not-allowed': 'Permiso de micrófono denegado. Permitilo en configuración.',
          'network': 'Error de red. Verificá tu conexión.',
          'aborted': null
        };
        
        const msg = mensajes[event.error];
        if (msg) {
          showToast(msg);
          if (event.error !== 'aborted') {
            addMessage('⚠️ ' + msg, 'bot');
          }
        }
      };
      
      recognition.onend = function() {
        console.log('🎤 Grabación finalizada');
        isRecording = false;
        recognition = null;
        micBtn.classList.remove('recording');
        setStatus('Escuchando');
      };
      
      recognition.start();
      console.log('✅ Reconocimiento iniciado');
      
    } catch(e) {
      console.error('Error iniciando reconocimiento:', e);
      showToast('Error al iniciar el micrófono');
      isRecording = false;
      recognition = null;
      micBtn.classList.remove('recording');
      setStatus('Escuchando');
    }
  }
  
  function stopRecording() {
    if (recognition) {
      try {
        recognition.stop();
      } catch(e) {}
    }
    micBtn.classList.remove('recording');
    setStatus('Procesando...');
  }
  
  // ============================================================
  // EVENTOS DEL BOTÓN
  // ============================================================
  micBtn.addEventListener('mousedown', function(e) {
    e.preventDefault();
    startRecording();
  });
  
  micBtn.addEventListener('mouseup', function(e) {
    e.preventDefault();
    stopRecording();
  });
  
  micBtn.addEventListener('mouseleave', function() {
    if (isRecording) stopRecording();
  });
  
  micBtn.addEventListener('touchstart', function(e) {
    e.preventDefault();
    startRecording();
  }, { passive: false });
  
  micBtn.addEventListener('touchend', function(e) {
    e.preventDefault();
    stopRecording();
  }, { passive: false });
  
  micBtn.addEventListener('touchcancel', function(e) {
    e.preventDefault();
    if (isRecording) stopRecording();
  }, { passive: false });
  
  micBtn.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (!isRecording) startRecording();
      else stopRecording();
    }
  });
  
  micBtn.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'm') {
      e.preventDefault();
      if (!isRecording) startRecording();
      else stopRecording();
    }
  });
  
  // ============================================================
  // INICIAR
  // ============================================================
  console.log('🌿 Serenity Spa Voice Assistant v3.0 - CON VOZ');
  console.log('🎤 Speech Recognition:', !!(window.SpeechRecognition || window.webkitSpeechRecognition) ? '✅' : '❌');
  console.log('🔊 Speech Synthesis:', !!window.speechSynthesis ? '✅' : '❌');
  
  // Verificar que TTS funcione
  if (window.speechSynthesis) {
    // Precargar voces
    window.speechSynthesis.getVoices();
    // Hacer un speak vacío para "despertar" el motor de voz en algunos navegadores
    const dummy = new SpeechSynthesisUtterance('');
    dummy.volume = 0;
    window.speechSynthesis.speak(dummy);
  }
  
  connectWebSocket();
  
})();
</script>
