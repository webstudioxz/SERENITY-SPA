<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Asistente de Voz | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --gold:#C9A961;--gold-deep:#A8883F;--bg:#0E0F0D;
            --bg-card:rgba(22,24,20,.82);--text:#F5F2EB;
            --text-muted:rgba(245,242,235,.35);--border:rgba(255,255,255,.06);
        }
        body{font-family:'DM Sans',sans-serif;background:var(--bg);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:1rem}
        .card{width:100%;max-width:480px;background:var(--bg-card);backdrop-filter:blur(28px);border-radius:40px;border:1px solid var(--border);overflow:hidden}
        .header{padding:2rem 1.75rem 1.5rem;border-bottom:1px solid var(--border);text-align:center}
        .avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-deep));display:flex;align-items:center;justify-content:center;margin:0 auto;box-shadow:0 8px 32px rgba(201,169,97,.35);transition:all .3s}
        .avatar.speaking{animation:avPulse .6s ease-in-out infinite}
        .avatar.thinking{animation:avThink 1.2s ease-in-out infinite}
        @keyframes avPulse{0%,100%{transform:scale(1);box-shadow:0 8px 32px rgba(201,169,97,.35)}50%{transform:scale(1.06);box-shadow:0 12px 40px rgba(201,169,97,.5)}}
        @keyframes avThink{0%,100%{opacity:1}50%{opacity:.55}}
        .avatar svg{width:32px;height:32px;color:#fff}
        .title{font-family:'Playfair Display',serif;font-size:1.35rem;color:var(--text);margin-top:.75rem}
        .subtitle{font-size:.7rem;color:var(--text-muted);margin-top:.25rem}
        .status{display:inline-flex;align-items:center;gap:.5rem;padding:.35rem .9rem;border-radius:40px;background:rgba(255,255,255,.05);font-size:.7rem;color:var(--text);margin-top:.75rem}
        .dot{width:7px;height:7px;border-radius:50%;background:#6DB98C;transition:background .3s}
        .dot.recording{background:#E8A060;animation:blink .8s infinite alternate}
        .dot.speaking{background:#6BA3D6;animation:blink .5s infinite alternate}
        .dot.thinking{background:#C9A961;animation:blink 1s infinite alternate}
        .dot.offline{background:#dc2626}
        @keyframes blink{from{opacity:1}to{opacity:.35}}
        .conversation{height:350px;overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:.9rem;scroll-behavior:smooth}
        .conversation::-webkit-scrollbar{width:4px}
        .conversation::-webkit-scrollbar-track{background:transparent}
        .conversation::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
        .message{display:flex;gap:.6rem;align-items:flex-end;animation:msgIn .3s ease-out}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .message.user{flex-direction:row-reverse}
        .msg-pip{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-deep));display:flex;align-items:center;justify-content:center;font-size:.65rem;color:#fff;flex-shrink:0}
        .message.user .msg-pip{background:rgba(255,255,255,.1);color:var(--gold)}
        .bubble{max-width:76%;padding:.65rem 1rem;border-radius:18px;font-size:.84rem;line-height:1.55;color:var(--text)}
        .message.bot .bubble{background:rgba(255,255,255,.07);border:1px solid var(--border);border-bottom-left-radius:4px;white-space:pre-line}
        .message.user .bubble{background:linear-gradient(135deg,var(--gold),var(--gold-deep));color:#1A160A;font-weight:500;border-bottom-right-radius:4px}
        .controls{padding:1.4rem 1.75rem 1.75rem;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .btn-back{padding:.6rem 1.15rem;border-radius:40px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:var(--text);text-decoration:none;font-size:.8rem;transition:all .2s}
        .btn-back:hover{background:rgba(255,255,255,.12)}
        .btn-mic{width:72px;height:72px;border-radius:50%;background:linear-gradient(145deg,#E8C97A,#A8883F);border:none;color:#fff;font-size:1.5rem;cursor:pointer;box-shadow:0 8px 32px rgba(201,169,97,.4);display:flex;align-items:center;justify-content:center;transition:all .3s;position:relative}
        .btn-mic.recording{background:linear-gradient(145deg,#F0A060,#C06030);animation:pulse 1.5s infinite;box-shadow:0 8px 32px rgba(240,160,96,.5)}
        .btn-mic:active{transform:scale(.95)}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .btn-mode{padding:.5rem 1rem;border-radius:40px;background:transparent;border:1px solid rgba(255,255,255,.15);color:var(--text);font-size:.7rem;cursor:pointer;transition:all .2s;font-family:inherit}
        .btn-mode:hover{border-color:var(--gold);color:var(--gold)}
        .btn-mode.active{background:rgba(201,169,97,.15);border-color:var(--gold);color:var(--gold)}
        .text-input-area{display:none;padding:0 1.75rem 1.75rem;border-top:1px solid var(--border)}
        .text-input-area.show{display:block}
        .text-input-row{display:flex;gap:.5rem}
        .text-input-row input{flex:1;padding:.75rem 1rem;border-radius:40px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--text);font-family:inherit;font-size:.85rem;outline:none;transition:border-color .2s}
        .text-input-row input:focus{border-color:rgba(201,169,97,.5)}
        .text-input-row input::placeholder{color:rgba(245,242,235,.25)}
        .btn-send{padding:.75rem 1.25rem;border-radius:40px;background:var(--gold);border:none;color:#1A160A;cursor:pointer;font-weight:600;font-family:inherit;font-size:.8rem;transition:all .2s}
        .btn-send:hover{filter:brightness(1.1)}
        @media(max-width:520px){.card{border-radius:24px}.conversation{height:280px}.btn-mic{width:64px;height:64px}}
    </style>
</head>
<body>
<main class="card">
    <header class="header">
        <div class="avatar" id="avatarEl">
            <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </div>
        <h1 class="title">Asistente de Voz</h1>
        <p class="subtitle">Mantené presionado el micrófono para hablar</p>
        <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Conectando...</span>
        </div>
    </header>
    <section class="conversation" id="conversation"></section>
    <footer class="controls" id="voiceControls">
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Volver</a>
        <button class="btn-mic" id="micBtn" title="Mantené presionado para hablar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        <button class="btn-mode" id="btnMode" title="Cambiar modo"><i class="fas fa-keyboard"></i></button>
    </footer>
    <div class="text-input-area" id="textInputArea">
        <div class="text-input-row">
            <input type="text" id="textInput" placeholder="Escribí tu mensaje..." autocomplete="off">
            <button class="btn-send" id="btnSendText"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</main>

<script>
(function() {
    'use strict';

    /* ====== DOM ====== */
    var micBtn = document.getElementById('micBtn');
    var statusDot = document.getElementById('statusDot');
    var statusText = document.getElementById('statusText');
    var conversation = document.getElementById('conversation');
    var avatarEl = document.getElementById('avatarEl');
    var btnMode = document.getElementById('btnMode');
    var textInputArea = document.getElementById('textInputArea');
    var textInput = document.getElementById('textInput');
    var btnSendText = document.getElementById('btnSendText');
    var voiceControls = document.getElementById('voiceControls');

    /* ====== ESTADO ====== */
    var ws = null;
    var recognition = null;
    var isRecording = false;
    var isSpeaking = false;
    var isThinking = false;
    var textMode = false;
    var reconnectAttempt = 0;

    /* ====== TTS: sistema de frases encadenadas ====== */
    var phraseQueue = [];
    var isSpeakingPhrase = false;
    var phraseSafetyTimer = null;
    var cachedVoice = null;

    /* Cargar voces */
    function cargarVoces() {
        if (!window.speechSynthesis) return;
        var v = window.speechSynthesis.getVoices();
        if (v.length > 0) seleccionarMejorVoz(v);
    }

    function seleccionarMejorVoz(voices) {
        cachedVoice =
            voices.find(function(x) { return x.lang === 'es-AR' && x.name.toLowerCase().indexOf('google') !== -1; }) ||
            voices.find(function(x) { return x.lang === 'es-MX' && x.name.toLowerCase().indexOf('google') !== -1; }) ||
            voices.find(function(x) { return x.lang === 'es-ES' && x.name.toLowerCase().indexOf('google') !== -1; }) ||
            voices.find(function(x) { return x.lang === 'es-419'; }) ||
            voices.find(function(x) { return x.lang === 'es-AR'; }) ||
            voices.find(function(x) { return x.lang === 'es-MX'; }) ||
            voices.find(function(x) { return x.lang === 'es-ES'; }) ||
            voices.find(function(x) { return x.lang.indexOf('es') === 0; }) ||
            null;
    }

    if (window.speechSynthesis) {
        cargarVoces();
        window.speechSynthesis.onvoiceschanged = function() {
            seleccionarMejorVoz(window.speechSynthesis.getVoices());
        };
    }

    /* Limpiar texto: quitar emojis y formato */
    function limpiarTexto(texto) {
        return texto
            .replace(/<[^>]*>/g, '')
            .replace(/\*+/g, '')
            .replace(/_+/g, '')
            .replace(/[#\[\]()]/g, '')
            .replace(/[\u2700-\u27BF\uE000-\uF8FF\uFE00-\uFEFF\u{1F300}-\u{1FFFF}]/gu, '')
            .replace(/\s{2,}/g, ' ')
            .trim();
    }

    /* Dividir texto en segmentos de ~100 chars (~10s de habla) */
    function dividirEnSegmentos(texto) {
        var partes = texto.split(/(?<=[.!?])\s+|\n+/);
        var segmentos = [];
        var buffer = '';

        for (var i = 0; i < partes.length; i++) {
            var parte = partes[i].trim();
            if (!parte) continue;

            if (buffer.length + parte.length + 2 > 100 && buffer.length > 0) {
                segmentos.push(buffer);
                buffer = parte;
            } else {
                buffer = buffer ? buffer + '. ' + parte : parte;
            }
        }

        if (buffer.trim()) segmentos.push(buffer.trim());
        return segmentos;
    }

    /* Hablar siguiente frase de la cola */
    function hablarSiguienteFrase() {
        if (phraseQueue.length === 0) {
            detenerHabla();
            return;
        }

        var texto = phraseQueue.shift();

        var u = new SpeechSynthesisUtterance(texto);
        u.lang = 'es-AR';
        u.rate = 0.92;
        u.pitch = 1.0;
        u.volume = 1;

        if (cachedVoice) u.voice = cachedVoice;

        isSpeakingPhrase = true;
        isSpeaking = true;
        avatarEl.classList.remove('thinking');
        avatarEl.classList.add('speaking');
        statusDot.className = 'dot speaking';
        statusText.textContent = 'Hablando...';

        /* SAFETY: si Chrome no dispara onend en 16s, forzar cancel */
        clearTimeout(phraseSafetyTimer);
        phraseSafetyTimer = setTimeout(function() {
            if (isSpeakingPhrase) {
                try { window.speechSynthesis.cancel(); } catch (e) {}
            }
        }, 16000);

        u.onend = function() {
            clearTimeout(phraseSafetyTimer);
            isSpeakingPhrase = false;

            if (phraseQueue.length > 0) {
                setTimeout(hablarSiguienteFrase, 350);
            } else {
                detenerHabla();
            }
        };

        u.onerror = function() {
            clearTimeout(phraseSafetyTimer);
            isSpeakingPhrase = false;

            if (phraseQueue.length > 0) {
                setTimeout(hablarSiguienteFrase, 250);
            } else {
                detenerHabla();
            }
        };

        window.speechSynthesis.speak(u);
    }

    /* Iniciar habla: entrada principal */
    function speakNatural(texto) {
        if (!window.speechSynthesis) return;

        var limpio = limpiarTexto(texto);
        if (!limpio) return;

        /* Cancelar estado anterior */
        window.speechSynthesis.cancel();
        clearTimeout(phraseSafetyTimer);

        phraseQueue = dividirEnSegmentos(limpio);
        isSpeakingPhrase = false;

        if (phraseQueue.length === 0) return;

        /* Delay corto para que cancel() surta efecto antes de hablar */
        setTimeout(hablarSiguienteFrase, 60);
    }

    /* Detener toda síntesis */
    function detenerHabla() {
        isSpeaking = false;
        isSpeakingPhrase = false;
        phraseQueue = [];
        clearTimeout(phraseSafetyTimer);
        try { window.speechSynthesis.cancel(); } catch (e) {}
        avatarEl.classList.remove('speaking');
        statusDot.className = 'dot';
        statusText.textContent = 'Escuchando...';
    }

    /* ====== MENSAJES EN PANTALLA ====== */
    function addMessage(texto, who) {
        var row = document.createElement('div');
        row.className = 'message ' + (who === 'user' ? 'user' : 'bot');

        var pip = document.createElement('div');
        pip.className = 'msg-pip';
        pip.textContent = who === 'user' ? 'T' : 'S';

        var bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = texto;

        row.appendChild(pip);
        row.appendChild(bubble);
        conversation.appendChild(row);
        conversation.scrollTop = conversation.scrollHeight;

        if (who === 'bot') speakNatural(texto);
    }

    function showThinking() {
        isThinking = true;
        avatarEl.classList.add('thinking');
        statusDot.className = 'dot thinking';
        statusText.textContent = 'Pensando...';
    }

    function hideThinking() {
        isThinking = false;
        avatarEl.classList.remove('thinking');
        if (!isSpeaking) {
            statusDot.className = 'dot';
            statusText.textContent = 'Escuchando...';
        }
    }

    /* ====== WEBSOCKET ====== */
    function connectWebSocket() {
        var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        try { ws = new WebSocket(protocol + '//' + location.host + '/ws-voice'); }
        catch (e) { setTimeout(connectWebSocket, 5000); return; }

        ws.onopen = function() {
            reconnectAttempt = 0;
            statusDot.className = 'dot';
            statusText.textContent = 'Escuchando...';
        };

        ws.onmessage = function(event) {
            hideThinking();
            try {
                var data = JSON.parse(event.data);
                if (data.tipo === 'respuesta') addMessage(data.texto, 'bot');
            } catch (e) { /* ignorar */ }
        };

        ws.onclose = function() {
            statusDot.className = 'dot offline';
            statusText.textContent = 'Reconectando...';
            reconnectAttempt++;
            setTimeout(connectWebSocket, Math.min(3000 + reconnectAttempt * 1000, 15000));
        };

        ws.onerror = function() {
            statusDot.className = 'dot offline';
            statusText.textContent = 'Sin conexión';
        };
    }

    /* ====== ENVIAR AL SERVIDOR ====== */
    function sendTextToServer(texto) {
        if (!texto.trim()) return;
        addMessage(texto, 'user');
        showThinking();
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ tipo: 'transcripcion', texto: texto }));
        } else {
            hideThinking();
            addMessage('No hay conexión. Intentá de nuevo.', 'bot');
        }
    }

    /* ====== RECONOCIMIENTO DE VOZ ====== */
    function startRecording() {
        if (isRecording || isSpeaking) return;
        if (isSpeaking) detenerHabla();

        var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
            addMessage('Este navegador no soporta reconocimiento de voz. Usá el modo texto o Google Chrome.', 'bot');
            return;
        }

        try {
            recognition = new SR();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                isRecording = true;
                micBtn.classList.add('recording');
                statusDot.className = 'dot recording';
                statusText.textContent = 'Escuchando... soltá para enviar';
            };

            recognition.onresult = function(event) {
                sendTextToServer(event.results[0][0].transcript);
            };

            recognition.onend = function() {
                isRecording = false;
                micBtn.classList.remove('recording');
                recognition = null;
                if (!isSpeaking && !isThinking) {
                    statusDot.className = 'dot';
                    statusText.textContent = 'Escuchando...';
                }
            };

            recognition.onerror = function(event) {
                isRecording = false;
                micBtn.classList.remove('recording');
                recognition = null;
                if (event.error === 'not-allowed') {
                    addMessage('Permiso de micrófono denegado. Permitilo en la configuración del navegador.', 'bot');
                }
            };

            recognition.start();
        } catch (e) {
            isRecording = false;
            micBtn.classList.remove('recording');
        }
    }

    function stopRecording() {
        if (recognition) { try { recognition.stop(); } catch (e) {} }
    }

    /* ====== MODO TEXTO ====== */
    function toggleTextMode() {
        textMode = !textMode;
        if (textMode) {
            textInputArea.classList.add('show');
            btnMode.classList.add('active');
            btnMode.innerHTML = '<i class="fas fa-microphone"></i>';
            voiceControls.style.visibility = 'hidden';
            textInput.focus();
        } else {
            textInputArea.classList.remove('show');
            btnMode.classList.remove('active');
            btnMode.innerHTML = '<i class="fas fa-keyboard"></i>';
            voiceControls.style.visibility = 'visible';
        }
    }

    /* ====== EVENTOS ====== */
    micBtn.addEventListener('mousedown', function(e) { e.preventDefault(); if (!textMode) startRecording(); });
    micBtn.addEventListener('mouseup', function(e) { e.preventDefault(); stopRecording(); });
    micBtn.addEventListener('mouseleave', function() { if (isRecording) stopRecording(); });
    micBtn.addEventListener('touchstart', function(e) { e.preventDefault(); if (!textMode) startRecording(); }, { passive: false });
    micBtn.addEventListener('touchend', function(e) { e.preventDefault(); stopRecording(); }, { passive: false });
    micBtn.addEventListener('touchcancel', function() { if (isRecording) stopRecording(); });

    btnMode.addEventListener('click', toggleTextMode);
    btnSendText.addEventListener('click', function() {
        var t = textInput.value; if (t.trim()) { sendTextToServer(t); textInput.value = ''; }
    });
    textInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') { var t = textInput.value; if (t.trim()) { sendTextToServer(t); textInput.value = ''; } }
    });

    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'm') { e.preventDefault(); if (!textMode) { if (!isRecording) startRecording(); else stopRecording(); } }
        if ((e.ctrlKey || e.metaKey) && e.key === 't') { e.preventDefault(); toggleTextMode(); }
        if (e.key === 'Escape') { if (isSpeaking) detenerHabla(); if (isRecording) stopRecording(); }
    });

    window.addEventListener('beforeunload', function() { detenerHabla(); if (ws) ws.close(); });

    /* ====== INICIAR ====== */
    connectWebSocket();
})();
</script>
</body>
</html>
