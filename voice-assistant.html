<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Asistente de Voz | Serenity Spa</title>
  <meta name="description" content="Reserva tu masaje por voz en Serenity Spa. Rápido, fácil y accesible.">
  <meta property="og:title" content="Asistente de Voz Serenity Spa">
  <meta property="og:description" content="Reserva tu masaje por voz.">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --gold:#C9A961;--gold-deep:#A8883F;--bg:#0E0F0D;--bg-card:rgba(22,24,20,.9);
      --text:#F5F2EB;--text-muted:#a09b8c;--border:rgba(255,255,255,.08);
    }
    body{
      font-family:'DM Sans',sans-serif;background:var(--bg);
      min-height:100dvh;display:flex;align-items:center;justify-content:center;
      padding:1rem;
    }
    .card{
      width:100%;max-width:420px;background:var(--bg-card);
      border-radius:32px;border:1px solid var(--border);
      overflow:hidden;display:flex;flex-direction:column;
      height:min(700px, 90dvh);
    }
    .header{
      padding:1.5rem 1.5rem 1rem;text-align:center;
      border-bottom:1px solid var(--border);
    }
    .avatar{
      width:64px;height:64px;border-radius:50%;
      background:linear-gradient(135deg,var(--gold),var(--gold-deep));
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 0.75rem;
    }
    .avatar svg{width:28px;height:28px;color:white}
    .title{font-family:'Playfair Display',serif;color:var(--text);font-size:1.2rem;}
    .status{display:inline-flex;align-items:center;gap:0.4rem;font-size:0.7rem;color:var(--text-muted);margin-top:0.4rem;}
    .status-dot{width:6px;height:6px;border-radius:50%;background:#6DB98C;}
    .status-dot.recording{background:#E8A060;}
    
    .conversation{
      flex:1;overflow-y:auto;padding:1rem;
      display:flex;flex-direction:column;gap:0.8rem;
      -webkit-overflow-scrolling:touch;
    }
    .message{display:flex;gap:0.5rem;align-items:flex-end}
    .message.user{flex-direction:row-reverse}
    .bubble{
      max-width:80%;padding:0.6rem 1rem;border-radius:18px;
      font-size:0.85rem;line-height:1.5;color:var(--text);
      background:rgba(255,255,255,0.06);
    }
    .message.user .bubble{
      background:linear-gradient(135deg,var(--gold),var(--gold-deep));
      color:#1A160A;font-weight:500;
    }
    
    .controls{
      padding:1rem 1.5rem 1.5rem;border-top:1px solid var(--border);
      display:flex;justify-content:center;
    }
    .btn-mic{
      width:72px;height:72px;border-radius:50%;
      background:linear-gradient(145deg,#E8C97A,#A8883F);
      border:none;color:white;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      touch-action:manipulation;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-mic svg{width:28px;height:28px;}
    .btn-mic.recording{background:#E07070;}
    
    @media (prefers-reduced-motion: reduce) {
      .btn-mic { animation: none !important; }
    }
  </style>
</head>
<body>
<main class="card">
  <header class="header">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
    </div>
    <h1 class="title">Asistente de Voz</h1>
    <div class="status"><span class="status-dot" id="statusDot"></span> <span id="statusText">Conectando</span></div>
  </header>
  
  <section class="conversation" id="conversation" aria-live="polite"></section>
  
  <footer class="controls">
    <button class="btn-mic" id="micBtn" aria-label="Mantener presionado para hablar">
      <svg viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/></svg>
    </button>
  </footer>
</main>

<script>
(function() {
  const micBtn = document.getElementById('micBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const conversation = document.getElementById('conversation');
  
  let ws, recognition, isRecording = false;

  function setStatus(text, rec) {
    statusText.textContent = text;
    statusDot.className = 'status-dot' + (rec ? ' recording' : '');
  }
  
  function addMessage(text, who) {
    const div = document.createElement('div');
    div.className = 'message ' + (who || 'bot');
    div.innerHTML = `<div class="bubble">${text}</div>`;
    conversation.appendChild(div);
    conversation.scrollTop = conversation.scrollHeight;
  }
  
  function connect() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${location.host}/ws-voice`);
    ws.onopen = () => {
      setStatus('Escuchando');
      addMessage('🌿 ¡Bienvenido! Soy tu asistente. Decí "reservar turno" para empezar o "cancelar" para anular.', 'bot');
    };
    ws.onmessage = (e) => {
      const data = JSON.parse(e.data);
      if (data.tipo === 'respuesta') {
        addMessage(data.texto, 'bot');
        if (window.speechSynthesis) {
          const u = new SpeechSynthesisUtterance(data.texto.replace(/<[^>]*>/g, ''));
          u.lang = 'es-AR'; u.rate = 0.9;
          speechSynthesis.cancel();
          speechSynthesis.speak(u);
        }
      }
    };
    ws.onclose = () => { setStatus('Reconectando...'); setTimeout(connect, 3000); };
    ws.onerror = () => ws.close();
  }
  
  function startRec() {
    if (isRecording) return;
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      addMessage('❌ Este navegador no soporta voz. Usá Google Chrome.', 'bot');
      return;
    }
    recognition = new SpeechRecognition();
    recognition.lang = 'es-ES';
    recognition.onstart = () => {
      isRecording = true;
      micBtn.classList.add('recording');
      setStatus('Grabando...', true);
    };
    recognition.onresult = (e) => {
      const text = e.results[0][0].transcript;
      addMessage(text, 'user');
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ tipo: 'transcripcion', texto: text }));
      }
    };
    recognition.onerror = () => stopRec();
    recognition.onend = () => stopRec();
    recognition.start();
  }
  
  function stopRec() {
    if (recognition) { recognition.abort(); recognition = null; }
    isRecording = false;
    micBtn.classList.remove('recording');
    setStatus('Escuchando');
  }
  
  // Eventos optimizados para móvil
  micBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); startRec(); });
  micBtn.addEventListener('pointerup', (e) => { e.preventDefault(); stopRec(); });
  micBtn.addEventListener('pointerleave', stopRec);
  
  connect();
})();
</script>
</body>
</html>
