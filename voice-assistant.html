<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Asistente de Voz IA | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --gold:#C9A961;--gold-deep:#A8883F;--bg:#0E0F0D;
            --bg-card:rgba(22,24,20,.82);--text:#F5F2EB;
            --text-muted:rgba(245,242,235,.35);--border:rgba(255,255,255,.06);
        }
        body{
            font-family:'DM Sans',sans-serif;background:var(--bg);
            min-height:100dvh;display:flex;align-items:center;justify-content:center;
            padding:1rem;
        }
        .card{
            width:100%;max-width:480px;background:var(--bg-card);
            backdrop-filter:blur(28px);border-radius:40px;
            border:1px solid var(--border);overflow:hidden;
        }
        .header{
            padding:2rem 1.75rem 1.5rem;border-bottom:1px solid var(--border);
            text-align:center;position:relative;
        }
        .avatar{
            width:80px;height:80px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            display:flex;align-items:center;justify-content:center;
            margin:0 auto;box-shadow:0 8px 32px rgba(201,169,97,.35);
            transition:all .3s;
        }
        .avatar.speaking{animation:avatarPulse .6s ease-in-out infinite}
        .avatar.thinking{animation:avatarPulse 1.2s ease-in-out infinite}
        @keyframes avatarPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
        .avatar svg{width:32px;height:32px;color:white}
        .title{
            font-family:'Playfair Display',serif;font-size:1.35rem;
            color:var(--text);margin-top:.75rem;
        }
        .subtitle{
            font-size:.7rem;color:var(--text-muted);margin-top:.25rem;
        }
        .status{
            display:inline-flex;align-items:center;gap:.5rem;
            padding:.35rem .9rem;border-radius:40px;
            background:rgba(255,255,255,.05);font-size:.7rem;
            color:var(--text);margin-top:.75rem;
        }
        .dot{width:7px;height:7px;border-radius:50%;background:#6DB98C}
        .dot.recording{background:#E8A060;animation:blink .8s infinite alternate}
        .dot.speaking{background:#6BA3D6;animation:blink .5s infinite alternate}
        .dot.thinking{background:#C9A961;animation:blink 1s infinite alternate}
        .dot.offline{background:#dc2626}
        @keyframes blink{from{opacity:1}to{opacity:.35}}
        
        .premium-badge{
            display:inline-flex;
            align-items:center;
            gap:0.4rem;
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            color:#1A160A;
            padding:0.2rem 0.8rem;
            border-radius:20px;
            font-size:0.65rem;
            font-weight:700;
            margin-left:0.5rem;
        }
        
        .conversation{
            height:350px;overflow-y:auto;padding:1.25rem;
            display:flex;flex-direction:column;gap:.9rem;
        }
        .message{display:flex;gap:.6rem;align-items:flex-end}
        .message.user{flex-direction:row-reverse}
        .msg-pip{
            width:28px;height:28px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            display:flex;align-items:center;justify-content:center;
            font-size:.65rem;color:white;flex-shrink:0;
        }
        .message.user .msg-pip{background:rgba(255,255,255,.1);color:var(--gold)}
        .bubble{
            max-width:76%;padding:.65rem 1rem;border-radius:18px;
            font-size:.84rem;line-height:1.55;color:var(--text);
        }
        .message.bot .bubble{
            background:rgba(255,255,255,.07);border:1px solid var(--border);
            border-bottom-left-radius:4px;white-space:pre-line;
        }
        .message.user .bubble{
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            color:#1A160A;font-weight:500;border-bottom-right-radius:4px;
        }
        .ia-badge{
            display:inline-flex;align-items:center;gap:.3rem;
            background:rgba(201,169,97,.15);color:var(--gold);
            padding:.15rem .5rem;border-radius:10px;font-size:.6rem;
            margin-left:.5rem;
        }
        .controls{
            padding:1.4rem 1.75rem 1.75rem;border-top:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-between;
        }
        .btn-back{
            padding:.6rem 1.15rem;border-radius:40px;
            background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
            color:var(--text);text-decoration:none;font-size:.8rem;
            transition:all .2s;
        }
        .btn-back:hover{background:rgba(255,255,255,.12)}
        .btn-mic{
            width:72px;height:72px;border-radius:50%;
            background:linear-gradient(145deg,#E8C97A,#A8883F);
            border:none;color:white;font-size:1.5rem;cursor:pointer;
            box-shadow:0 8px 32px rgba(201,169,97,.4);
            display:flex;align-items:center;justify-content:center;
            transition:all .3s;
        }
        .btn-mic.recording{
            background:linear-gradient(145deg,#F0A060,#C06030);
            animation:pulse 1.5s infinite;
        }
        .btn-mic:active{transform:scale(.95)}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        
        .btn-mode{
            padding:.5rem 1rem;border-radius:40px;
            background:transparent;border:1px solid rgba(255,255,255,.15);
            color:var(--text);font-size:.7rem;cursor:pointer;
            transition:all .2s;font-family:inherit;
        }
        .btn-mode:hover{border-color:var(--gold);color:var(--gold)}
        .btn-mode.active{background:rgba(201,169,97,.15);border-color:var(--gold);color:var(--gold)}
        
        .codigo-info{
            background:rgba(201,169,97,.1);
            border:1px solid rgba(201,169,97,.2);
            border-radius:12px;
            padding:.75rem;
            margin:.5rem 1rem;
            font-size:.7rem;
            color:var(--gold);
            display:flex;
            align-items:center;
            gap:.5rem;
        }
        .codigo-info i{font-size:.9rem}
        
        .discount-info{
            background:rgba(201,169,97,.15);
            border:1px solid var(--gold);
            border-radius:12px;
            padding:.6rem;
            margin:.5rem 1rem;
            font-size:.7rem;
            color:var(--gold);
            display:flex;
            align-items:center;
            justify-content:center;
            gap:.5rem;
        }
        
        @media(max-width:520px){
            .card{border-radius:24px}
            .conversation{height:280px}
            .btn-mic{width:64px;height:64px}
        }
    </style>
</head>
<body>

<main class="card">
    <header class="header">
        <div class="avatar" id="avatarEl">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </div>
        <h1 class="title">Asistente de Voz IA</h1>
        <p class="subtitle">Mantené presionado el micrófono para hablar</p>
        <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Conectando...</span>
            <span class="ia-badge" id="iaBadge" style="display:none">
                <i class="fas fa-robot" style="font-size:.5rem"></i> IA
            </span>
            <span class="premium-badge" id="premiumBadge" style="display:none">
                <i class="fas fa-crown"></i> PREMIUM
            </span>
        </div>
    </header>
    
    <div class="codigo-info" id="codigoInfo" style="display:none">
        <i class="fas fa-key"></i>
        <span>Para cancelar tu reserva, solo necesitas tu código de 6 dígitos</span>
    </div>
    
    <div class="discount-info" id="discountInfo" style="display:none">
        <i class="fas fa-tag"></i>
        <span>Premium: <strong id="discountPercent">0%</strong> de descuento en todos los servicios</span>
    </div>
    
    <section class="conversation" id="conversation"></section>
    
    <footer class="controls">
        <a href="/" class="btn-back">← Volver</a>
        
        <button class="btn-mic" id="micBtn" title="Mantené presionado para hablar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        
        <button class="btn-mode" id="btnMode" title="Cambiar modo">
            <i class="fas fa-keyboard"></i>
        </button>
    </footer>
    
    <div id="textInputArea" style="display:none;padding:0 1.75rem 1.75rem;border-top:1px solid var(--border)">
        <div style="display:flex;gap:.5rem">
            <input type="text" id="textInput" placeholder="Escribe tu mensaje..." style="flex:1;padding:.75rem 1rem;border-radius:40px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--text);font-family:inherit;font-size:.85rem;outline:none">
            <button id="btnSendText" style="padding:.75rem 1.25rem;border-radius:40px;background:var(--gold);border:none;color:#1A160A;cursor:pointer;font-weight:600;font-family:inherit;font-size:.8rem">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</main>

<script>
(function() {
    'use strict';
    
    // ==================== SUPABASE CONFIGURACIÓN DINÁMICA ====================
    let supabase = null;

    async function inicializarSupabase() {
        try {
            const response = await fetch('/api/config-frontend');
            const config = await response.json();
            if (!config.supabaseUrl || !config.supabaseAnonKey) {
                console.error('❌ Supabase no configurado en el servidor');
                return null;
            }
            supabase = window.supabase.createClient(config.supabaseUrl, config.supabaseAnonKey);
            console.log('✅ Supabase inicializado correctamente');
            return supabase;
        } catch (error) {
            console.error('❌ Error cargando configuración de Supabase:', error);
            return null;
        }
    }
    
    const micBtn = document.getElementById('micBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const conversation = document.getElementById('conversation');
    const avatarEl = document.getElementById('avatarEl');
    const iaBadge = document.getElementById('iaBadge');
    const premiumBadge = document.getElementById('premiumBadge');
    const discountInfo = document.getElementById('discountInfo');
    const discountPercentSpan = document.getElementById('discountPercent');
    const btnMode = document.getElementById('btnMode');
    const textInputArea = document.getElementById('textInputArea');
    const textInput = document.getElementById('textInput');
    const btnSendText = document.getElementById('btnSendText');
    const codigoInfo = document.getElementById('codigoInfo');
    
    let ws = null;
    let recognition = null;
    let isRecording = false;
    let isSpeaking = false;
    let isThinking = false;
    let reconnectAttempt = 0;
    let speechQueue = [];
    let textMode = false;
    let useIA = false;
    let isPremiumUser = false;
    let premiumUserName = null;
    let premiumDiscount = 0;
    
    // Estado de reserva
    let bookingState = null;
    let pendingBooking = { nombre: '', telefono: '', dia: '', hora: null, massageType: '', codigoPais: '53' };
    let userName = null;
    let userCountry = '53';
    let userPhone = null;
    
    // ============================================================
    // DETECTAR USUARIO PREMIUM
    // ============================================================
    async function checkPremiumUser() {
        if (!supabase) {
            await inicializarSupabase();
        }
        if (!supabase) return;
        
        try {
            const { data: { session } } = await supabase.auth.getSession();
            if (session && session.user && session.user.email) {
                const response = await fetch(`/api/premium/usuario?email=${encodeURIComponent(session.user.email)}`);
                if (response.ok) {
                    const userData = await response.json();
                    if (userData && userData.nombre) {
                        isPremiumUser = true;
                        premiumUserName = userData.nombre;
                        userName = userData.nombre;
                        premiumBadge.style.display = 'inline-flex';
                    }
                }
                const configRes = await fetch('/api/premium/config');
                const config = await configRes.json();
                premiumDiscount = config.descuento_premium || 15;
                if (isPremiumUser && premiumDiscount > 0) {
                    discountPercentSpan.textContent = `${premiumDiscount}%`;
                    discountInfo.style.display = 'flex';
                }
            }
        } catch(e) {
            console.warn('Error verificando premium:', e);
        }
    }
    
    // ============================================================
    // DETECTAR IA DISPONIBLE
    // ============================================================
    async function checkIAStatus() {
        try {
            const resp = await fetch('/health');
            const data = await resp.json();
            useIA = true;
            iaBadge.style.display = 'inline-flex';
            statusText.textContent = 'IA conectada';
        } catch(e) {
            useIA = false;
        }
    }
    
    // ============================================================
    // VOZ NATURAL (Text-to-Speech)
    // ============================================================
    function speakNatural(texto) {
        if (!window.speechSynthesis) return;
        
        let limpio = texto
            .replace(/[\u{1F600}-\u{1F6FF}]/gu, '')
            .replace(/[\u2600-\u26FF]/gu, '')
            .replace(/<[^>]*>/g, '')
            .replace(/\*/g, '')
            .replace(/_/g, '')
            .replace(/[#\[\]()]/g, '')
            .replace(/[^\w\sáéíóúñü.,;:!?¿¡]/gi, '')
            .trim();
        
        if (!limpio) return;
        
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(limpio);
        utterance.lang = 'es-AR';
        utterance.rate = 0.9;
        utterance.pitch = 1.0;
        utterance.volume = 1;
        
        const voices = window.speechSynthesis.getVoices();
        const bestVoice = 
            voices.find(v => v.lang === 'es-AR' && v.name.includes('Google')) ||
            voices.find(v => v.lang === 'es-MX' && v.name.includes('Google')) ||
            voices.find(v => v.lang === 'es-ES' && v.name.includes('Google')) ||
            voices.find(v => v.lang.startsWith('es-AR')) ||
            voices.find(v => v.lang.startsWith('es-MX')) ||
            voices.find(v => v.lang.startsWith('es-ES')) ||
            voices.find(v => v.lang.startsWith('es'));
        
        if (bestVoice) utterance.voice = bestVoice;
        
        utterance.onstart = () => {
            isSpeaking = true;
            avatarEl.classList.add('speaking');
            statusDot.className = 'dot speaking';
            statusText.textContent = 'Hablando...';
        };
        
        utterance.onend = () => {
            isSpeaking = false;
            avatarEl.classList.remove('speaking');
            statusDot.className = 'dot';
            statusText.textContent = 'Escuchando...';
            
            if (speechQueue.length > 0) {
                setTimeout(() => speakNatural(speechQueue.shift()), 400);
            }
        };
        
        utterance.onerror = () => {
            isSpeaking = false;
            avatarEl.classList.remove('speaking');
            statusDot.className = 'dot';
            statusText.textContent = 'Escuchando...';
        };
        
        window.speechSynthesis.speak(utterance);
    }
    
    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
    
    // ============================================================
    // MENSAJES
    // ============================================================
    function addMessage(texto, who) {
        let textoLimpio = texto
            .replace(/[\u{1F300}-\u{1F6FF}]/gu, '')
            .replace(/[\u2600-\u26FF]/gu, '')
            .trim();
        
        if (!textoLimpio) textoLimpio = texto;
        
        const row = document.createElement('div');
        row.className = 'message ' + (who === 'user' ? 'user' : 'bot');
        
        const pip = document.createElement('div');
        pip.className = 'msg-pip';
        pip.textContent = who === 'user' ? (userName ? userName.charAt(0).toUpperCase() : 'T') : 'S';
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = textoLimpio;
        
        row.appendChild(pip);
        row.appendChild(bubble);
        conversation.appendChild(row);
        conversation.scrollTop = conversation.scrollHeight;
        
        if (who === 'bot') {
            if (isSpeaking) {
                speechQueue.push(textoLimpio);
            } else {
                speakNatural(textoLimpio);
            }
        }
    }
    
    function showThinking() {
        isThinking = true;
        avatarEl.classList.add('thinking');
        statusDot.className = 'dot thinking';
        statusText.textContent = 'Pensando...';
    }
    
    function hideThinking() {
        isThinking = false;
        avatarEl.classList.remove('thinking');
        statusDot.className = 'dot';
        statusText.textContent = 'Escuchando...';
    }
    
    // ============================================================
    // RESERVAR TURNO DESDE EL CHAT DE VOZ
    // ============================================================
    async function realizarReserva() {
        try {
            if (!pendingBooking.nombre || !pendingBooking.telefono || !pendingBooking.dia || pendingBooking.hora === null) {
                addMessage('❌ Faltan datos para completar la reserva. Por favor, proporciona todos los datos solicitados.', 'bot');
                return;
            }
            
            const response = await fetch('/turnos', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nombre: pendingBooking.nombre,
                    telefono: pendingBooking.telefono,
                    massageType: pendingBooking.massageType || 'Masaje',
                    dia: pendingBooking.dia,
                    hora: pendingBooking.hora,
                    codigoPais: pendingBooking.codigoPais || '53',
                    email: isPremiumUser ? (await supabase.auth.getSession()).data.session?.user?.email : null
                })
            });
            
            const data = await response.json();
            
            if (response.ok) {
                addMessage(`✅ ¡TURNO CONFIRMADO!\n\n📛 Nombre: ${pendingBooking.nombre}\n📆 Día: ${pendingBooking.dia}\n⏰ Hora: ${pendingBooking.hora}:00\n💆 Masaje: ${pendingBooking.massageType || 'Masaje'}\n📞 Teléfono: +${pendingBooking.codigoPais} ${pendingBooking.telefono}\n🔑 Código de cancelación: ${data.codigoCancelacion || 'No disponible'}\n\nTe esperamos en Serenity Spa. ¡Gracias por tu reserva!`, 'bot');
                
                // Resetear estado
                bookingState = null;
                pendingBooking = { nombre: '', telefono: '', dia: '', hora: null, massageType: '', codigoPais: '53' };
            } else {
                addMessage(`❌ Error: ${data.error || 'No se pudo completar la reserva. Intenta nuevamente.'}`, 'bot');
            }
        } catch(e) {
            console.error('Error reservando turno:', e);
            addMessage('❌ Error de conexión. Intenta nuevamente.', 'bot');
        }
    }
    
    // ============================================================
    // PROCESAR MENSAJE DE VOZ (RESERVAS)
    // ============================================================
    function procesarMensajeVoz(texto) {
        const msg = texto.toLowerCase().trim();
        
        // Verificar palabras prohibidas
        const palabrasProhibidas = ['puta', 'puto', 'mierda', 'coño', 'carajo', 'verga', 'chinga', 'fuck', 'shit', 'bitch', 'idiota', 'estupido', 'imbecil', 'tarado', 'pendejo', 'cabron', 'culo', 'cojones', 'pelotudo', 'boludo', 'maricon'];
        for (const palabra of palabrasProhibidas) {
            if (msg.includes(palabra)) {
                addMessage('🚫 Por favor, utiliza un lenguaje respetuoso. No puedo continuar con esta conversación.', 'bot');
                return;
            }
        }
        
        // Si no hay estado de reserva, iniciar
        if (!bookingState) {
            // Detectar intención de reservar
            if (msg.includes('reservar') || msg.includes('turno') || msg.includes('cita') || msg.includes('agendar')) {
                bookingState = 'awaiting_name';
                addMessage('📅 ¡Perfecto! Voy a ayudarte a reservar un turno.\n\n📛 ¿Cuál es tu nombre completo?', 'bot');
                return;
            }
            
            // Detectar intención de cancelar
            if (msg.includes('cancelar') || msg.includes('anular') || msg.includes('eliminar')) {
                bookingState = 'awaiting_cancel_code';
                addMessage('🔑 Para cancelar tu reserva, necesito tu código de cancelación de 6 dígitos.\n\n📝 Por favor, ingresa tu código (ejemplo: A3B7X9).', 'bot');
                return;
            }
            
            // Ver horarios
            if (msg.includes('horario') || msg.includes('disponible')) {
                addMessage(`🕐 Nuestros horarios disponibles son:\n\n${horariosConfig?.horarios?.join(' hs\n') || '12:00, 16:00, 20:00'} hs\n\n📅 Días de atención: ${horariosConfig?.dias?.map(d => d.charAt(0).toUpperCase() + d.slice(1)).join(', ') || 'Lunes a Sábado'}.\n\n¿Te gustaría reservar un turno?`, 'bot');
                return;
            }
            
            // Ver precios
            if (msg.includes('precio') || msg.includes('cuesta') || msg.includes('costo')) {
                addMessage(`💰 Nuestros servicios:\n\n• Masaje Relajante: $45\n• Masaje Corporal: $65\n• Masaje Facial: $40\n\n${isPremiumUser ? `✨ Como miembro premium, tienes ${premiumDiscount}% de descuento.` : '💎 Hazte premium y obtén descuentos exclusivos.'}`, 'bot');
                return;
            }
            
            // Saludo
            if (msg.includes('hola') || msg.includes('buenas') || msg.includes('saludos')) {
                if (userName) {
                    addMessage(`👋 ¡Hola ${userName}! Soy el asistente de Serenity Spa.\n\n¿En qué puedo ayudarte hoy?\n• Reservar un turno\n• Ver horarios\n• Consultar precios\n• Cancelar una reserva`, 'bot');
                } else {
                    addMessage(`👋 ¡Hola! Soy el asistente de Serenity Spa.\n\n¿Cuál es tu nombre para comenzar? Así puedo conocerte mejor.\n\nTambién puedo ayudarte a:\n• Reservar un turno\n• Ver horarios disponibles\n• Consultar precios`, 'bot');
                }
                return;
            }
            
            // Si el usuario dice su nombre directamente
            const nombreDetectado = detectarNombre(msg);
            if (nombreDetectado && !userName) {
                userName = nombreDetectado;
                addMessage(`👋 ¡Hola ${userName}! ¿En qué puedo ayudarte hoy?\n\nPuedo ayudarte a:\n• Reservar un turno\n• Ver horarios disponibles\n• Consultar precios\n• Cancelar una reserva`, 'bot');
                return;
            }
            
            // Mensaje por defecto
            addMessage(`👋 ¡Hola! Soy el asistente de Serenity Spa.\n\n¿En qué puedo ayudarte?\n• Reservar un turno\n• Ver horarios disponibles\n• Consultar precios\n• Cancelar una reserva\n\n¿Qué necesitas?`, 'bot');
            return;
        }
        
        // ==================== FLUJO DE RESERVA ====================
        switch(bookingState) {
            case 'awaiting_name':
                const nombre = detectarNombre(msg) || msg.trim();
                if (nombre && nombre.length >= 2) {
                    pendingBooking.nombre = nombre;
                    userName = nombre;
                    bookingState = 'awaiting_country';
                    addMessage(`📛 Gracias ${nombre}. ¿De qué país eres? (Ejemplo: Cuba, Argentina, México, España)`, 'bot');
                } else {
                    addMessage('❌ Por favor, ingresa un nombre válido (mínimo 2 caracteres).', 'bot');
                }
                break;
                
            case 'awaiting_country':
                const paisDetectado = detectarPais(msg);
                if (paisDetectado) {
                    pendingBooking.codigoPais = paisDetectado.codigo;
                    userCountry = paisDetectado.codigo;
                    bookingState = 'awaiting_phone';
                    addMessage(`✅ ${paisDetectado.nombre} (+${paisDetectado.codigo}) registrado.\n\n📞 Ahora, ¿cuál es tu número de teléfono? (Solo dígitos)`, 'bot');
                } else {
                    addMessage('❌ No reconocí el país. Por favor, dilo de nuevo.\nEjemplos: Cuba, Argentina, México, España, Colombia...', 'bot');
                }
                break;
                
            case 'awaiting_phone':
                const telefono = msg.replace(/\D/g, '');
                if (telefono.length >= 7) {
                    pendingBooking.telefono = telefono;
                    userPhone = telefono;
                    bookingState = 'awaiting_day';
                    const diasStr = horariosConfig?.dias?.map(d => d.charAt(0).toUpperCase() + d.slice(1)).join(', ') || 'Lunes, Martes, Miércoles, Jueves, Viernes, Sábado';
                    addMessage(`📞 Teléfono registrado.\n\n📆 ¿Qué día prefieres? (${diasStr})`, 'bot');
                } else {
                    addMessage('❌ Número inválido. Ingresa al menos 7 dígitos.', 'bot');
                }
                break;
                
            case 'awaiting_day':
                const diasMap = {
                    'lunes': 'lunes', 'martes': 'martes', 'miercoles': 'miercoles',
                    'miércoles': 'miercoles', 'jueves': 'jueves', 'viernes': 'viernes',
                    'sabado': 'sabado', 'sábado': 'sabado'
                };
                let diaSeleccionado = msg.toLowerCase().trim();
                for (let key in diasMap) {
                    if (diaSeleccionado.includes(key)) {
                        diaSeleccionado = diasMap[key];
                        break;
                    }
                }
                const diasValidos = horariosConfig?.dias || ['lunes', 'martes', 'miercoles', 'jueves', 'viernes', 'sabado'];
                if (diasValidos.includes(diaSeleccionado)) {
                    pendingBooking.dia = diaSeleccionado;
                    bookingState = 'awaiting_time';
                    const horasStr = horariosConfig?.horarios?.join(', ') || '12:00, 16:00, 20:00';
                    addMessage(`📆 Día ${diaSeleccionado} seleccionado.\n\n⏰ Horarios disponibles: ${horasStr} hs\n\n¿A qué hora prefieres? (Responde con el número, ejemplo: 12, 16 o 20)`, 'bot');
                } else {
                    const diasStr = diasValidos.map(d => d.charAt(0).toUpperCase() + d.slice(1)).join(', ');
                    addMessage(`❌ Día no reconocido. Días disponibles: ${diasStr}`, 'bot');
                }
                break;
                
            case 'awaiting_time':
                const horaNum = parseInt(msg);
                const horasValidas = horariosConfig?.horarios?.map(h => parseInt(h.split(':')[0])) || [12, 16, 20];
                if (horasValidas.includes(horaNum)) {
                    pendingBooking.hora = horaNum;
                    bookingState = 'awaiting_massage';
                    addMessage(`⏰ Hora ${horaNum}:00 seleccionada.\n\n💆 ¿Qué tipo de masaje deseas?\n• Relajante\n• Corporal\n• Facial\n\nResponde con el nombre del masaje.`, 'bot');
                } else {
                    const horasStr = horasValidas.join(', ');
                    addMessage(`❌ Hora no válida. Horarios disponibles: ${horasStr} hs.`, 'bot');
                }
                break;
                
            case 'awaiting_massage':
                const masajes = ['relajante', 'corporal', 'facial'];
                let masajeSeleccionado = msg.toLowerCase().trim();
                let masajeEncontrado = null;
                for (const m of masajes) {
                    if (masajeSeleccionado.includes(m)) {
                        masajeEncontrado = m.charAt(0).toUpperCase() + m.slice(1);
                        break;
                    }
                }
                if (masajeEncontrado) {
                    pendingBooking.massageType = masajeEncontrado;
                    addMessage(`💆 Masaje ${masajeEncontrado} seleccionado.\n\n✅ Confirmando tu reserva...`, 'bot');
                    await realizarReserva();
                } else {
                    addMessage(`❌ Tipo de masaje no reconocido. Opciones: Relajante, Corporal, Facial.`, 'bot');
                }
                break;
                
            case 'awaiting_cancel_code':
                const codigo = msg.toUpperCase().replace(/\s/g, '');
                if (codigo.length === 6 && /^[A-Z0-9]{6}$/.test(codigo)) {
                    try {
                        const response = await fetch('/api/cancelar-por-codigo', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ codigo: codigo })
                        });
                        const data = await response.json();
                        if (data.success) {
                            addMessage(`✅ ${data.mensaje}`, 'bot');
                        } else {
                            addMessage(`❌ ${data.error || 'Código incorrecto. Verifica tu código de cancelación.'}`, 'bot');
                        }
                    } catch(e) {
                        addMessage('❌ Error al cancelar. Intenta nuevamente.', 'bot');
                    }
                    bookingState = null;
                } else {
                    addMessage('❌ Código inválido. Debe ser de 6 caracteres alfanuméricos (ejemplo: A3B7X9).', 'bot');
                }
                break;
        }
    }
    
    // ============================================================
    // FUNCIONES AUXILIARES
    // ============================================================
    function detectarNombre(texto) {
        const patrones = [
            /(?:me\s+llamo|mi\s+nombre\s+es|soy)\s+([A-ZÁÉÍÓÚÑ][a-záéíóúñ]*(?:\s+[A-ZÁÉÍÓÚÑ][a-záéíóúñ]*){0,2})/i,
            /^([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+)(?:\s+(?:quisiera|quiero|reservar|para|un|masaje))?$/i,
        ];
        for (const patron of patrones) {
            const match = texto.match(patron);
            if (match && match[1]) {
                return match[1].trim();
            }
        }
        const palabras = texto.split(/\s+/);
        if (palabras.length === 1 && palabras[0].length >= 2 && /^[a-záéíóúñ]{2,15}$/.test(palabras[0])) {
            return palabras[0].charAt(0).toUpperCase() + palabras[0].slice(1);
        }
        return null;
    }
    
    function detectarPais(texto) {
        const t = texto.toLowerCase().trim();
        const paises = [
            { nombre: 'Cuba', codigo: '53', claves: ['cuba'] },
            { nombre: 'Argentina', codigo: '54', claves: ['argentina','arg'] },
            { nombre: 'México', codigo: '52', claves: ['méxico','mexico','mex'] },
            { nombre: 'Colombia', codigo: '57', claves: ['colombia','colom'] },
            { nombre: 'Chile', codigo: '56', claves: ['chile','chil'] },
            { nombre: 'Perú', codigo: '51', claves: ['perú','peru'] },
            { nombre: 'España', codigo: '34', claves: ['españa','espania','es'] },
            { nombre: 'Venezuela', codigo: '58', claves: ['venezuela','vene'] },
            { nombre: 'Ecuador', codigo: '593', claves: ['ecuador','ecua'] },
            { nombre: 'Uruguay', codigo: '598', claves: ['uruguay','uru'] },
            { nombre: 'Paraguay', codigo: '595', claves: ['paraguay','para'] },
            { nombre: 'Bolivia', codigo: '591', claves: ['bolivia','bol'] },
            { nombre: 'Brasil', codigo: '55', claves: ['brasil','brazil'] },
            { nombre: 'Estados Unidos', codigo: '1', claves: ['estados unidos','usa','eeuu','america'] },
        ];
        for (const pais of paises) {
            for (const clave of pais.claves) {
                if (t.includes(clave)) return pais;
            }
        }
        return null;
    }
    
    // ============================================================
    // WEBSOCKET (Voz)
    // ============================================================
    function connectWebSocket() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = protocol + '//' + location.host + '/ws-voice';
        
        try {
            ws = new WebSocket(wsUrl);
        } catch(e) {
            setTimeout(connectWebSocket, 5000);
            return;
        }
        
        ws.onopen = () => {
            reconnectAttempt = 0;
            statusDot.className = 'dot';
            statusText.textContent = 'Escuchando...';
            addMessage('🎤 Conectado al asistente de voz. ¿En qué puedo ayudarte?', 'bot');
        };
        
        ws.onmessage = (event) => {
            hideThinking();
            try {
                const data = JSON.parse(event.data);
                if (data.tipo === 'respuesta') {
                    addMessage(data.texto, 'bot');
                }
            } catch(e) {
                console.error('Error mensaje:', e);
            }
        };
        
        ws.onclose = () => {
            statusDot.className = 'dot offline';
            statusText.textContent = 'Reconectando...';
            reconnectAttempt++;
            const delay = Math.min(3000 + reconnectAttempt * 1000, 12000);
            setTimeout(connectWebSocket, delay);
        };
        
        ws.onerror = () => {
            statusDot.className = 'dot offline';
            statusText.textContent = 'Error de conexión';
        };
    }
    
    // ============================================================
    // ENVIAR TEXTO AL SERVIDOR (Voz)
    // ============================================================
    function sendTextToServer(texto) {
        if (!texto.trim()) return;
        
        addMessage(texto, 'user');
        showThinking();
        
        const mensajeConContexto = isPremiumUser && premiumUserName 
            ? `[Usuario Premium: ${premiumUserName} con ${premiumDiscount}% descuento] ${texto}`
            : texto;
        
        // Procesar localmente para reservas
        if (texto.toLowerCase().includes('reservar') || texto.toLowerCase().includes('turno') || 
            texto.toLowerCase().includes('cita') || texto.toLowerCase().includes('agendar') ||
            texto.toLowerCase().includes('cancelar') || texto.toLowerCase().includes('anular')) {
            hideThinking();
            procesarMensajeVoz(texto);
            return;
        }
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ tipo: 'transcripcion', texto: mensajeConContexto }));
        } else {
            hideThinking();
            procesarMensajeVoz(texto);
        }
    }
    
    // ============================================================
    // ENVIAR MENSAJE (Texto o Voz)
    // ============================================================
    function enviarMensaje(texto) {
        if (!texto.trim()) return;
        sendTextToServer(texto);
    }
    
    // ============================================================
    // RECONOCIMIENTO DE VOZ
    // ============================================================
    function startRecording() {
        if (isRecording || isSpeaking) return;
        
        if (window.speechSynthesis && isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            avatarEl.classList.remove('speaking');
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            addMessage('Este navegador no soporta reconocimiento de voz. Usá el modo texto o Google Chrome.', 'bot');
            return;
        }
        
        try {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('recording');
                statusDot.className = 'dot recording';
                statusText.textContent = 'Grabando... Soltá para enviar';
            };
            
            recognition.onresult = (event) => {
                const texto = event.results[0][0].transcript;
                enviarMensaje(texto);
            };
            
            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove('recording');
                recognition = null;
                if (!isSpeaking && !isThinking) {
                    statusDot.className = 'dot';
                    statusText.textContent = 'Escuchando...';
                }
            };
            
            recognition.onerror = (event) => {
                console.log('Error reconocimiento:', event.error);
                if (event.error === 'no-speech') {
                    addMessage('No detecté ningún sonido. Intentá de nuevo.', 'bot');
                } else if (event.error === 'not-allowed') {
                    addMessage('Permiso de micrófono denegado. Usá el modo texto.', 'bot');
                }
            };
            
            recognition.start();
        } catch(e) {
            isRecording = false;
            micBtn.classList.remove('recording');
            addMessage('Error al iniciar el micrófono. Usá el modo texto.', 'bot');
        }
    }
    
    function stopRecording() {
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
    }
    
    // ============================================================
    // MODO TEXTO
    // ============================================================
    function toggleTextMode() {
        textMode = !textMode;
        
        if (textMode) {
            textInputArea.style.display = 'block';
            btnMode.classList.add('active');
            btnMode.innerHTML = '<i class="fas fa-microphone"></i>';
            micBtn.style.display = 'none';
            textInput.focus();
        } else {
            textInputArea.style.display = 'none';
            btnMode.classList.remove('active');
            btnMode.innerHTML = '<i class="fas fa-keyboard"></i>';
            micBtn.style.display = 'flex';
        }
    }
    
    // ============================================================
    // EVENTOS
    // ============================================================
    micBtn.addEventListener('mousedown', (e) => { 
        e.preventDefault(); 
        if (!textMode) startRecording(); 
    });
    micBtn.addEventListener('mouseup', (e) => { 
        e.preventDefault(); 
        stopRecording(); 
    });
    micBtn.addEventListener('mouseleave', () => { 
        if (isRecording) stopRecording(); 
    });
    
    micBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!textMode) startRecording();
    }, { passive: false });
    
    micBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        stopRecording();
    }, { passive: false });
    
    btnMode.addEventListener('click', toggleTextMode);
    
    btnSendText.addEventListener('click', () => {
        const texto = textInput.value;
        if (texto.trim()) {
            enviarMensaje(texto);
            textInput.value = '';
        }
    });
    
    textInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const texto = textInput.value;
            if (texto.trim()) {
                enviarMensaje(texto);
                textInput.value = '';
            }
        }
    });
    
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'm') {
            e.preventDefault();
            if (!textMode) {
                if (!isRecording) startRecording();
                else stopRecording();
            }
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 't') {
            e.preventDefault();
            toggleTextMode();
        }
    });
    
    // ============================================================
    // INICIAR
    // ============================================================
    let horariosConfig = { dias: [], horarios: [] };
    
    async function cargarHorarios() {
        try {
            const response = await fetch('/api/config/horarios');
            horariosConfig = await response.json();
        } catch(e) {
            console.warn('Error cargando horarios:', e);
        }
    }
    
    async function init() {
        await cargarHorarios();
        await inicializarSupabase();
        await checkPremiumUser();
        await checkIAStatus();
        connectWebSocket();
    }
    
    init();
})();
</script>
