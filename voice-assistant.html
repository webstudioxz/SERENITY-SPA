<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Asistente de Voz IA | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --gold:#C9A961;--gold-deep:#A8883F;--bg:#0E0F0D;
            --bg-card:rgba(22,24,20,.82);--text:#F5F2EB;
            --text-muted:rgba(245,242,235,.35);--border:rgba(255,255,255,.06);
        }
        body{
            font-family:'DM Sans',sans-serif;background:var(--bg);
            min-height:100dvh;display:flex;align-items:center;justify-content:center;
            padding:1rem;
        }
        .card{
            width:100%;max-width:480px;background:var(--bg-card);
            backdrop-filter:blur(28px);border-radius:40px;
            border:1px solid var(--border);overflow:hidden;
        }
        .header{
            padding:2rem 1.75rem 1.5rem;border-bottom:1px solid var(--border);
            text-align:center;position:relative;
        }
        .avatar{
            width:80px;height:80px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            display:flex;align-items:center;justify-content:center;
            margin:0 auto;box-shadow:0 8px 32px rgba(201,169,97,.35);
            transition:all .3s;
        }
        .avatar.speaking{animation:avatarPulse .6s ease-in-out infinite}
        .avatar.thinking{animation:avatarThink 1.2s ease-in-out infinite}
        @keyframes avatarPulse{0%,100%{transform:scale(1);box-shadow:0 8px 32px rgba(201,169,97,.35)}50%{transform:scale(1.06);box-shadow:0 12px 40px rgba(201,169,97,.5)}}
        @keyframes avatarThink{0%,100%{opacity:1}50%{opacity:.6}}
        .avatar svg{width:32px;height:32px;color:white}
        .title{
            font-family:'Playfair Display',serif;font-size:1.35rem;
            color:var(--text);margin-top:.75rem;
        }
        .subtitle{
            font-size:.7rem;color:var(--text-muted);margin-top:.25rem;
        }
        .status{
            display:inline-flex;align-items:center;gap:.5rem;
            padding:.35rem .9rem;border-radius:40px;
            background:rgba(255,255,255,.05);font-size:.7rem;
            color:var(--text);margin-top:.75rem;
        }
        .dot{width:7px;height:7px;border-radius:50%;background:#6DB98C;transition:background .3s}
        .dot.recording{background:#E8A060;animation:blink .8s infinite alternate}
        .dot.speaking{background:#6BA3D6;animation:blink .5s infinite alternate}
        .dot.thinking{background:#C9A961;animation:blink 1s infinite alternate}
        .dot.offline{background:#dc2626}
        @keyframes blink{from{opacity:1}to{opacity:.35}}

        .conversation{
            height:350px;overflow-y:auto;padding:1.25rem;
            display:flex;flex-direction:column;gap:.9rem;
            scroll-behavior:smooth;
        }
        .conversation::-webkit-scrollbar{width:4px}
        .conversation::-webkit-scrollbar-track{background:transparent}
        .conversation::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px}
        .message{display:flex;gap:.6rem;align-items:flex-end;animation:msgIn .3s ease-out}
        @keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
        .message.user{flex-direction:row-reverse}
        .msg-pip{
            width:28px;height:28px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            display:flex;align-items:center;justify-content:center;
            font-size:.65rem;color:white;flex-shrink:0;
        }
        .message.user .msg-pip{background:rgba(255,255,255,.1);color:var(--gold)}
        .bubble{
            max-width:76%;padding:.65rem 1rem;border-radius:18px;
            font-size:.84rem;line-height:1.55;color:var(--text);
        }
        .message.bot .bubble{
            background:rgba(255,255,255,.07);border:1px solid var(--border);
            border-bottom-left-radius:4px;white-space:pre-line;
        }
        .message.user .bubble{
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            color:#1A160A;font-weight:500;border-bottom-right-radius:4px;
        }
        .controls{
            padding:1.4rem 1.75rem 1.75rem;border-top:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-between;
        }
        .btn-back{
            padding:.6rem 1.15rem;border-radius:40px;
            background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
            color:var(--text);text-decoration:none;font-size:.8rem;
            transition:all .2s;
        }
        .btn-back:hover{background:rgba(255,255,255,.12)}
        .btn-mic{
            width:72px;height:72px;border-radius:50%;
            background:linear-gradient(145deg,#E8C97A,#A8883F);
            border:none;color:white;font-size:1.5rem;cursor:pointer;
            box-shadow:0 8px 32px rgba(201,169,97,.4);
            display:flex;align-items:center;justify-content:center;
            transition:all .3s;position:relative;
        }
        .btn-mic.recording{
            background:linear-gradient(145deg,#F0A060,#C06030);
            animation:pulse 1.5s infinite;
            box-shadow:0 8px 32px rgba(240,160,96,.5);
        }
        .btn-mic:active{transform:scale(.95)}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        .btn-mic::after{
            content:'';position:absolute;inset:-4px;border-radius:50%;
            border:2px solid transparent;transition:border-color .3s;
        }
        .btn-mic.recording::after{border-color:rgba(240,160,96,.3)}

        .btn-mode{
            padding:.5rem 1rem;border-radius:40px;
            background:transparent;border:1px solid rgba(255,255,255,.15);
            color:var(--text);font-size:.7rem;cursor:pointer;
            transition:all .2s;font-family:inherit;
        }
        .btn-mode:hover{border-color:var(--gold);color:var(--gold)}
        .btn-mode.active{background:rgba(201,169,97,.15);border-color:var(--gold);color:var(--gold)}

        .text-input-area{
            display:none;padding:0 1.75rem 1.75rem;
            border-top:1px solid var(--border);
        }
        .text-input-area.show{display:block}
        .text-input-row{display:flex;gap:.5rem}
        .text-input-row input{
            flex:1;padding:.75rem 1rem;border-radius:40px;
            border:1px solid rgba(255,255,255,.1);
            background:rgba(255,255,255,.05);color:var(--text);
            font-family:inherit;font-size:.85rem;outline:none;
            transition:border-color .2s;
        }
        .text-input-row input:focus{border-color:rgba(201,169,97,.5)}
        .text-input-row input::placeholder{color:rgba(245,242,235,.25)}
        .btn-send{
            padding:.75rem 1.25rem;border-radius:40px;
            background:var(--gold);border:none;color:#1A160A;
            cursor:pointer;font-weight:600;font-family:inherit;font-size:.8rem;
            transition:all .2s;
        }
        .btn-send:hover{filter:brightness(1.1)}

        @media(max-width:520px){
            .card{border-radius:24px}
            .conversation{height:280px}
            .btn-mic{width:64px;height:64px}
        }
    </style>
</head>
<body>

<main class="card">
    <header class="header">
        <div class="avatar" id="avatarEl">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </div>
        <h1 class="title">Asistente de Voz</h1>
        <p class="subtitle">Mantené presionado el micrófono para hablar</p>
        <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Conectando...</span>
        </div>
    </header>

    <section class="conversation" id="conversation"></section>

    <footer class="controls" id="voiceControls">
        <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> Volver</a>
        <button class="btn-mic" id="micBtn" title="Mantené presionado para hablar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        <button class="btn-mode" id="btnMode" title="Cambiar modo">
            <i class="fas fa-keyboard"></i>
        </button>
    </footer>

    <div class="text-input-area" id="textInputArea">
        <div class="text-input-row">
            <input type="text" id="textInput" placeholder="Escribí tu mensaje..." autocomplete="off">
            <button class="btn-send" id="btnSendText"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>
</main>

<script>
(function() {
    'use strict';

    const micBtn = document.getElementById('micBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const conversation = document.getElementById('conversation');
    const avatarEl = document.getElementById('avatarEl');
    const btnMode = document.getElementById('btnMode');
    const textInputArea = document.getElementById('textInputArea');
    const textInput = document.getElementById('textInput');
    const btnSendText = document.getElementById('btnSendText');
    const voiceControls = document.getElementById('voiceControls');

    let ws = null;
    let recognition = null;
    let isRecording = false;
    let isSpeaking = false;
    let isThinking = false;
    let reconnectAttempt = 0;
    let textMode = false;
    let sentenceQueue = [];
    let keepAliveTimer = null;
    let voicesReady = false;

    // ============================================================
    // VOZ NATURAL - Síntesis por frases con pausas
    // ============================================================
    function cargarVoces() {
        if (!window.speechSynthesis) return;
        const v = window.speechSynthesis.getVoices();
        if (v.length > 0) voicesReady = true;
    }

    if (window.speechSynthesis) {
        cargarVoces();
        window.speechSynthesis.onvoiceschanged = function() {
            cargarVoces();
        };
    }

    function seleccionarVoz() {
        if (!window.speechSynthesis) return null;
        const v = window.speechSynthesis.getVoices();
        return v.find(x => x.lang === 'es-AR' && x.name.toLowerCase().includes('google')) ||
               v.find(x => x.lang === 'es-MX' && x.name.toLowerCase().includes('google')) ||
               v.find(x => x.lang === 'es-ES' && x.name.toLowerCase().includes('google')) ||
               v.find(x => x.lang === 'es-419') ||
               v.find(x => x.lang === 'es-AR') ||
               v.find(x => x.lang === 'es-MX') ||
               v.find(x => x.lang === 'es-ES') ||
               v.find(x => x.lang.startsWith('es')) ||
               null;
    }

    function limpiarTexto(texto) {
        return texto
            .replace(/<[^>]*>/g, '')
            .replace(/\*+/g, '')
            .replace(/_+/g, '')
            .replace(/[#\[\]()]/g, '')
            .replace(/[✅📅⏰💆📍📞🌍🌿🌸✨❌⚠️📋💡🔔🚗🌟🕐📆薪酬]/g, '')
            .replace(/\s{2,}/g, ' ')
            .trim();
    }

    function hablarFrase(texto, esUltima) {
        if (!texto || !window.speechSynthesis) return;

        const u = new SpeechSynthesisUtterance(texto);
        u.lang = 'es-AR';
        u.rate = 0.92;
        u.pitch = 1.0;
        u.volume = 1;

        const voz = seleccionarVoz();
        if (voz) u.voice = voz;

        u.onstart = function() {
            isSpeaking = true;
            avatarEl.classList.remove('thinking');
            avatarEl.classList.add('speaking');
            statusDot.className = 'dot speaking';
            statusText.textContent = 'Hablando...';
        };

        u.onend = function() {
            if (esUltima) {
                detenerHabla();
            } else {
                setTimeout(hablarSiguienteFrase, 280);
            }
        };

        u.onerror = function() {
            detenerHabla();
        };

        window.speechSynthesis.speak(u);
    }

    function hablarSiguienteFrase() {
        if (sentenceQueue.length === 0) {
            detenerHabla();
            return;
        }
        const frase = sentenceQueue.shift();
        hablarFrase(frase, sentenceQueue.length === 0);
    }

    function detenerHabla() {
        isSpeaking = false;
        sentenceQueue = [];
        clearInterval(keepAliveTimer);
        keepAliveTimer = null;
        avatarEl.classList.remove('speaking');
        statusDot.className = 'dot';
        statusText.textContent = 'Escuchando...';
    }

    // Workaround bug Chrome: corta audio a los ~15s
    function iniciarKeepAlive() {
        clearInterval(keepAliveTimer);
        keepAliveTimer = setInterval(function() {
            if (window.speechSynthesis && window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
                window.speechSynthesis.pause();
                window.speechSynthesis.resume();
            }
        }, 9000);
    }

    function speakNatural(texto) {
        if (!window.speechSynthesis) return;

        const limpio = limpiarTexto(texto);
        if (!limpio) return;

        window.speechSynthesis.cancel();
        sentenceQueue = [];

        // Dividir en frases por puntos, signos de exclamación/interrogación o saltos de línea
        var partes = limpio.split(/(?<=[.!?])\s+|\n+/).filter(function(s) { return s.trim().length > 0; });

        if (partes.length === 0) return;

        // Si es muy corto, hablar directamente
        if (partes.length === 1 && partes[0].length < 200) {
            sentenceQueue = partes;
        } else {
            // Agrupar frases muy cortas
            var agrupadas = [];
            var buffer = '';
            for (var i = 0; i < partes.length; i++) {
                var p = partes[i].trim();
                if (buffer.length + p.length < 180) {
                    buffer = buffer ? buffer + ' ' + p : p;
                } else {
                    if (buffer) agrupadas.push(buffer);
                    buffer = p;
                }
            }
            if (buffer) agrupadas.push(buffer);
            sentenceQueue = agrupadas;
        }

        iniciarKeepAlive();
        hablarSiguienteFrase();
    }

    function detenerVoz() {
        if (window.speechSynthesis) {
            window.speechSynthesis.cancel();
        }
        detenerHabla();
    }

    // ============================================================
    // MENSAJES EN PANTALLA
    // ============================================================
    function addMessage(texto, who) {
        var row = document.createElement('div');
        row.className = 'message ' + (who === 'user' ? 'user' : 'bot');

        var pip = document.createElement('div');
        pip.className = 'msg-pip';
        pip.textContent = who === 'user' ? 'T' : 'S';

        var bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = texto;

        row.appendChild(pip);
        row.appendChild(bubble);
        conversation.appendChild(row);
        conversation.scrollTop = conversation.scrollHeight;

        if (who === 'bot') {
            speakNatural(texto);
        }
    }

    function showThinking() {
        isThinking = true;
        avatarEl.classList.add('thinking');
        statusDot.className = 'dot thinking';
        statusText.textContent = 'Pensando...';
    }

    function hideThinking() {
        isThinking = false;
        avatarEl.classList.remove('thinking');
        if (!isSpeaking) {
            statusDot.className = 'dot';
            statusText.textContent = 'Escuchando...';
        }
    }

    // ============================================================
    // WEBSOCKET
    // ============================================================
    function connectWebSocket() {
        var protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        var wsUrl = protocol + '//' + location.host + '/ws-voice';

        try {
            ws = new WebSocket(wsUrl);
        } catch(e) {
            setTimeout(connectWebSocket, 5000);
            return;
        }

        ws.onopen = function() {
            reconnectAttempt = 0;
            statusDot.className = 'dot';
            statusText.textContent = 'Escuchando...';
        };

        ws.onmessage = function(event) {
            hideThinking();
            try {
                var data = JSON.parse(event.data);
                if (data.tipo === 'respuesta') {
                    addMessage(data.texto, 'bot');
                }
            } catch(e) {
                console.error('Error parseando mensaje:', e);
            }
        };

        ws.onclose = function() {
            statusDot.className = 'dot offline';
            statusText.textContent = 'Reconectando...';
            reconnectAttempt++;
            var delay = Math.min(3000 + reconnectAttempt * 1000, 15000);
            setTimeout(connectWebSocket, delay);
        };

        ws.onerror = function() {
            statusDot.className = 'dot offline';
            statusText.textContent = 'Sin conexión';
        };
    }

    // ============================================================
    // ENVIAR TEXTO AL SERVIDOR
    // ============================================================
    function sendTextToServer(texto) {
        if (!texto.trim()) return;

        addMessage(texto, 'user');
        showThinking();

        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ tipo: 'transcripcion', texto: texto }));
        } else {
            hideThinking();
            addMessage('No hay conexión con el servidor. Intentá de nuevo en un momento.', 'bot');
        }
    }

    // ============================================================
    // RECONOCIMIENTO DE VOZ
    // ============================================================
    function startRecording() {
        if (isRecording || isSpeaking) return;

        // Si está hablando, detener
        if (isSpeaking) {
            detenerVoz();
        }

        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            addMessage('Este navegador no soporta reconocimiento de voz. Usá el modo texto o probá con Google Chrome.', 'bot');
            return;
        }

        try {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                isRecording = true;
                micBtn.classList.add('recording');
                statusDot.className = 'dot recording';
                statusText.textContent = 'Escuchando... soltá para enviar';
            };

            recognition.onresult = function(event) {
                var texto = event.results[0][0].transcript;
                sendTextToServer(texto);
            };

            recognition.onend = function() {
                isRecording = false;
                micBtn.classList.remove('recording');
                recognition = null;
                if (!isSpeaking && !isThinking) {
                    statusDot.className = 'dot';
                    statusText.textContent = 'Escuchando...';
                }
            };

            recognition.onerror = function(event) {
                console.log('Error reconocimiento:', event.error);
                isRecording = false;
                micBtn.classList.remove('recording');
                recognition = null;

                if (event.error === 'no-speech') {
                    // No mostrar mensaje para no interrumpir, solo volver a estado listo
                    statusDot.className = 'dot';
                    statusText.textContent = 'Escuchando...';
                } else if (event.error === 'not-allowed') {
                    addMessage('Permiso de micrófono denegado. Permitilo en la configuración del navegador o usá el modo texto.', 'bot');
                } else if (event.error === 'aborted') {
                    // El usuario soltó el botón, es normal
                } else {
                    addMessage('Error al reconocer voz. Intentá de nuevo o usá el modo texto.', 'bot');
                }
            };

            recognition.start();
        } catch(e) {
            isRecording = false;
            micBtn.classList.remove('recording');
            addMessage('Error al iniciar el micrófono. Usá el modo texto.', 'bot');
        }
    }

    function stopRecording() {
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
    }

    // ============================================================
    // MODO TEXTO
    // ============================================================
    function toggleTextMode() {
        textMode = !textMode;

        if (textMode) {
            textInputArea.classList.add('show');
            btnMode.classList.add('active');
            btnMode.innerHTML = '<i class="fas fa-microphone"></i>';
            voiceControls.style.visibility = 'hidden';
            textInput.focus();
        } else {
            textInputArea.classList.remove('show');
            btnMode.classList.remove('active');
            btnMode.innerHTML = '<i class="fas fa-keyboard"></i>';
            voiceControls.style.visibility = 'visible';
        }
    }

    // ============================================================
    // EVENTOS
    // ============================================================

    // Mouse
    micBtn.addEventListener('mousedown', function(e) {
        e.preventDefault();
        if (!textMode) startRecording();
    });
    micBtn.addEventListener('mouseup', function(e) {
        e.preventDefault();
        stopRecording();
    });
    micBtn.addEventListener('mouseleave', function() {
        if (isRecording) stopRecording();
    });

    // Touch
    micBtn.addEventListener('touchstart', function(e) {
        e.preventDefault();
        if (!textMode) startRecording();
    }, { passive: false });
    micBtn.addEventListener('touchend', function(e) {
        e.preventDefault();
        stopRecording();
    }, { passive: false });
    micBtn.addEventListener('touchcancel', function() {
        if (isRecording) stopRecording();
    });

    // Modo texto
    btnMode.addEventListener('click', toggleTextMode);

    btnSendText.addEventListener('click', function() {
        var texto = textInput.value;
        if (texto.trim()) {
            sendTextToServer(texto);
            textInput.value = '';
        }
    });

    textInput.addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            var texto = textInput.value;
            if (texto.trim()) {
                sendTextToServer(texto);
                textInput.value = '';
            }
        }
    });

    // Atajos de teclado
    document.addEventListener('keydown', function(e) {
        // Ctrl+M: alternar micrófono
        if ((e.ctrlKey || e.metaKey) && e.key === 'm') {
            e.preventDefault();
            if (!textMode) {
                if (!isRecording) startRecording();
                else stopRecording();
            }
        }
        // Ctrl+T: alternar modo texto
        if ((e.ctrlKey || e.metaKey) && e.key === 't') {
            e.preventDefault();
            toggleTextMode();
        }
        // Escape: detener voz
        if (e.key === 'Escape') {
            if (isSpeaking) detenerVoz();
            if (isRecording) stopRecording();
        }
    });

    // Al cerrar la página, detener síntesis
    window.addEventListener('beforeunload', function() {
        detenerVoz();
        if (ws) ws.close();
    });

    // ============================================================
    // INICIAR
    // ============================================================
    connectWebSocket();

})();
</script>
</body>
</html>
