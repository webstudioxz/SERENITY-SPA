<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Asistente de Voz IA | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --gold:#C9A961;--gold-deep:#A8883F;--bg:#0E0F0D;
            --bg-card:rgba(22,24,20,.82);--text:#F5F2EB;
            --text-muted:rgba(245,242,235,.35);--border:rgba(255,255,255,.06);
        }
        body{
            font-family:'DM Sans',sans-serif;background:var(--bg);
            min-height:100dvh;display:flex;align-items:center;justify-content:center;
            padding:1rem;
        }
        .card{
            width:100%;max-width:480px;background:var(--bg-card);
            backdrop-filter:blur(28px);border-radius:40px;
            border:1px solid var(--border);overflow:hidden;
        }
        .header{
            padding:2rem 1.75rem 1.5rem;border-bottom:1px solid var(--border);
            text-align:center;position:relative;
        }
        .avatar{
            width:80px;height:80px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            display:flex;align-items:center;justify-content:center;
            margin:0 auto;box-shadow:0 8px 32px rgba(201,169,97,.35);
            transition:all .3s;
        }
        .avatar.speaking{animation:avatarPulse .6s ease-in-out infinite}
        .avatar.thinking{animation:avatarPulse 1.2s ease-in-out infinite}
        @keyframes avatarPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
        .avatar svg{width:32px;height:32px;color:white}
        .title{
            font-family:'Playfair Display',serif;font-size:1.35rem;
            color:var(--text);margin-top:.75rem;
        }
        .subtitle{
            font-size:.7rem;color:var(--text-muted);margin-top:.25rem;
        }
        .status{
            display:inline-flex;align-items:center;gap:.5rem;
            padding:.35rem .9rem;border-radius:40px;
            background:rgba(255,255,255,.05);font-size:.7rem;
            color:var(--text);margin-top:.75rem;
        }
        .dot{width:7px;height:7px;border-radius:50%;background:#6DB98C}
        .dot.recording{background:#E8A060;animation:blink .8s infinite alternate}
        .dot.speaking{background:#6BA3D6;animation:blink .5s infinite alternate}
        .dot.thinking{background:#C9A961;animation:blink 1s infinite alternate}
        .dot.offline{background:#dc2626}
        @keyframes blink{from{opacity:1}to{opacity:.35}}
        
        .conversation{
            height:350px;overflow-y:auto;padding:1.25rem;
            display:flex;flex-direction:column;gap:.9rem;
        }
        .message{display:flex;gap:.6rem;align-items:flex-end}
        .message.user{flex-direction:row-reverse}
        .msg-pip{
            width:28px;height:28px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            display:flex;align-items:center;justify-content:center;
            font-size:.65rem;color:white;flex-shrink:0;
        }
        .message.user .msg-pip{background:rgba(255,255,255,.1);color:var(--gold)}
        .bubble{
            max-width:76%;padding:.65rem 1rem;border-radius:18px;
            font-size:.84rem;line-height:1.55;color:var(--text);
        }
        .message.bot .bubble{
            background:rgba(255,255,255,.07);border:1px solid var(--border);
            border-bottom-left-radius:4px;white-space:pre-line;
        }
        .message.user .bubble{
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            color:#1A160A;font-weight:500;border-bottom-right-radius:4px;
        }
        .ia-badge{
            display:inline-flex;align-items:center;gap:.3rem;
            background:rgba(201,169,97,.15);color:var(--gold);
            padding:.15rem .5rem;border-radius:10px;font-size:.6rem;
            margin-left:.5rem;
        }
        .controls{
            padding:1.4rem 1.75rem 1.75rem;border-top:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-between;
        }
        .btn-back{
            padding:.6rem 1.15rem;border-radius:40px;
            background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
            color:var(--text);text-decoration:none;font-size:.8rem;
            transition:all .2s;
        }
        .btn-back:hover{background:rgba(255,255,255,.12)}
        .btn-mic{
            width:72px;height:72px;border-radius:50%;
            background:linear-gradient(145deg,#E8C97A,#A8883F);
            border:none;color:white;font-size:1.5rem;cursor:pointer;
            box-shadow:0 8px 32px rgba(201,169,97,.4);
            display:flex;align-items:center;justify-content:center;
            transition:all .3s;
        }
        .btn-mic.recording{
            background:linear-gradient(145deg,#F0A060,#C06030);
            animation:pulse 1.5s infinite;
        }
        .btn-mic:active{transform:scale(.95)}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        
        .btn-mode{
            padding:.5rem 1rem;border-radius:40px;
            background:transparent;border:1px solid rgba(255,255,255,.15);
            color:var(--text);font-size:.7rem;cursor:pointer;
            transition:all .2s;font-family:inherit;
        }
        .btn-mode:hover{border-color:var(--gold);color:var(--gold)}
        .btn-mode.active{background:rgba(201,169,97,.15);border-color:var(--gold);color:var(--gold)}
        
        @media(max-width:520px){
            .card{border-radius:24px}
            .conversation{height:280px}
            .btn-mic{width:64px;height:64px}
        }
    </style>
</head>
<body>

<main class="card">
    <header class="header">
        <div class="avatar" id="avatarEl">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </div>
        <h1 class="title">Asistente de Voz IA</h1>
        <p class="subtitle">Mantené presionado el micrófono para hablar</p>
        <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Conectando...</span>
            <span class="ia-badge" id="iaBadge" style="display:none">
                <i class="fas fa-robot" style="font-size:.5rem"></i> IA
            </span>
        </div>
    </header>
    
    <section class="conversation" id="conversation"></section>
    
    <footer class="controls">
        <a href="/" class="btn-back">← Volver</a>
        
        <button class="btn-mic" id="micBtn" title="Mantené presionado para hablar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        
        <button class="btn-mode" id="btnMode" title="Cambiar modo">
            <i class="fas fa-keyboard"></i>
        </button>
    </footer>
    
    <!-- Input de texto oculto (modo texto) -->
    <div id="textInputArea" style="display:none;padding:0 1.75rem 1.75rem;border-top:1px solid var(--border)">
        <div style="display:flex;gap:.5rem">
            <input type="text" id="textInput" placeholder="Escribe tu mensaje..." style="flex:1;padding:.75rem 1rem;border-radius:40px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--text);font-family:inherit;font-size:.85rem;outline:none">
            <button id="btnSendText" style="padding:.75rem 1.25rem;border-radius:40px;background:var(--gold);border:none;color:#1A160A;cursor:pointer;font-weight:600;font-family:inherit;font-size:.8rem">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>
</main>

<script>
(function() {
    'use strict';
    
    const micBtn = document.getElementById('micBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const conversation = document.getElementById('conversation');
    const avatarEl = document.getElementById('avatarEl');
    const iaBadge = document.getElementById('iaBadge');
    const btnMode = document.getElementById('btnMode');
    const textInputArea = document.getElementById('textInputArea');
    const textInput = document.getElementById('textInput');
    const btnSendText = document.getElementById('btnSendText');
    
    let recognition = null;
    let isRecording = false;
    let isSpeaking = false;
    let isThinking = false;
    let textMode = false;
    let sessionId = null;
    let historialConversacion = [];
    let nombreCliente = null;
    
    // ============================================================
    // LIMPIAR TEXTO PARA VOZ
    // ============================================================
    function limpiarTextoParaVoz(texto) {
        if (!texto) return '';
        
        let limpio = texto
            .replace(/[\u{1F600}-\u{1F64F}]/gu, '')
            .replace(/[\u{1F300}-\u{1F5FF}]/gu, '')
            .replace(/[\u{1F680}-\u{1F6FF}]/gu, '')
            .replace(/[\u{2600}-\u{26FF}]/gu, '')
            .replace(/[\u{2700}-\u{27BF}]/gu, '')
            .replace(/[⚠️✅❌❓❗‼️🔔📍📅📞💆‍♂️💆‍♀️🌸🌿✨🌟💫⭐️⚡️]/g, '')
            .replace(/\*/g, '')
            .replace(/_/g, '')
            .replace(/[#\[\]()]/g, '')
            .replace(/[<>]/g, '')
            .replace(/\s+/g, ' ')
            .trim();
        
        return limpio;
    }
    
    // ============================================================
    // VOZ NATURAL
    // ============================================================
    function speakNatural(texto) {
        if (!window.speechSynthesis) return;
        
        const limpio = limpiarTextoParaVoz(texto);
        if (!limpio) return;
        
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(limpio);
        utterance.lang = 'es-AR';
        utterance.rate = 0.9;
        utterance.pitch = 1.0;
        utterance.volume = 1;
        
        const voices = window.speechSynthesis.getVoices();
        const bestVoice = 
            voices.find(v => v.lang === 'es-AR' && v.name.includes('Google')) ||
            voices.find(v => v.lang === 'es-MX' && v.name.includes('Google')) ||
            voices.find(v => v.lang === 'es-ES' && v.name.includes('Google')) ||
            voices.find(v => v.lang.startsWith('es-AR')) ||
            voices.find(v => v.lang.startsWith('es-MX')) ||
            voices.find(v => v.lang.startsWith('es-ES')) ||
            voices.find(v => v.lang.startsWith('es'));
        
        if (bestVoice) utterance.voice = bestVoice;
        
        utterance.onstart = () => {
            isSpeaking = true;
            avatarEl.classList.add('speaking');
            statusDot.className = 'dot speaking';
            statusText.textContent = 'Hablando...';
        };
        
        utterance.onend = () => {
            isSpeaking = false;
            avatarEl.classList.remove('speaking');
            if (!isThinking) {
                statusDot.className = 'dot';
                statusText.textContent = 'Escuchando...';
            }
        };
        
        utterance.onerror = () => {
            isSpeaking = false;
            avatarEl.classList.remove('speaking');
            if (!isThinking) {
                statusDot.className = 'dot';
                statusText.textContent = 'Escuchando...';
            }
        };
        
        setTimeout(() => {
            window.speechSynthesis.speak(utterance);
        }, 50);
    }
    
    // Cargar voces
    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }
    
    // ============================================================
    // MENSAJES
    // ============================================================
    function addMessage(texto, who) {
        const row = document.createElement('div');
        row.className = 'message ' + (who === 'user' ? 'user' : 'bot');
        
        const pip = document.createElement('div');
        pip.className = 'msg-pip';
        pip.textContent = who === 'user' ? (nombreCliente ? nombreCliente.charAt(0).toUpperCase() : 'T') : 'S';
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = texto;
        
        row.appendChild(pip);
        row.appendChild(bubble);
        conversation.appendChild(row);
        conversation.scrollTop = conversation.scrollHeight;
        
        if (who === 'bot') {
            speakNatural(texto);
        }
    }
    
    function showThinking() {
        isThinking = true;
        avatarEl.classList.add('thinking');
        statusDot.className = 'dot thinking';
        statusText.textContent = 'Pensando...';
    }
    
    function hideThinking() {
        isThinking = false;
        avatarEl.classList.remove('thinking');
        if (!isSpeaking) {
            statusDot.className = 'dot';
            statusText.textContent = 'Escuchando...';
        }
    }
    
    // ============================================================
    // ENVIAR TEXTO AL SERVIDOR CON OPENROUTER
    // ============================================================
    async function enviarMensajeAI(texto) {
        showThinking();
        
        try {
            const response = await fetch('/api/chat-ia', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    mensaje: texto,
                    nombre: nombreCliente,
                    codigoPais: '53',
                    historial: historialConversacion.slice(-6)
                })
            });
            
            if (!response.ok) {
                throw new Error('Error del servidor');
            }
            
            const data = await response.json();
            
            if (data.respuesta) {
                // Verificar si la respuesta contiene un nombre para extraerlo
                const nombreMatch = data.respuesta.match(/(?:gracias|hola)\s+([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+)/i);
                if (nombreMatch && !nombreCliente) {
                    nombreCliente = nombreMatch[1];
                }
                
                // Guardar en historial
                historialConversacion.push({ role: 'user', content: texto });
                historialConversacion.push({ role: 'assistant', content: data.respuesta });
                
                // Limitar historial a los últimos 10 mensajes
                if (historialConversacion.length > 10) {
                    historialConversacion = historialConversacion.slice(-10);
                }
                
                addMessage(data.respuesta, 'bot');
                
                // Mostrar badge de IA
                if (data.modo === 'openrouter') {
                    iaBadge.style.display = 'inline-flex';
                }
            } else {
                addMessage('Lo siento, hubo un error al procesar tu mensaje. Por favor, intenta de nuevo.', 'bot');
            }
        } catch (error) {
            console.error('Error al enviar mensaje:', error);
            addMessage('Lo siento, no puedo conectar con el servidor. Por favor, verifica tu conexión.', 'bot');
        } finally {
            hideThinking();
        }
    }
    
    // ============================================================
    // PROCESAR MENSAJE LOCAL (para respuestas rápidas sin IA)
    // ============================================================
    async function procesarMensajeLocal(texto) {
        const tl = texto.toLowerCase().trim();
        
        if (tl.includes('hola') || tl.includes('buenas')) {
            addMessage('Hola, soy el asistente de Serenity Spa. ¿En qué puedo ayudarte?', 'bot');
            return;
        }
        
        // Si no hay nombre, preguntar
        if (!nombreCliente && (tl.includes('reservar') || tl.includes('turno'))) {
            addMessage('Claro, puedo ayudarte a reservar. ¿Cuál es tu nombre?', 'bot');
            return;
        }
        
        // Usar IA para todo lo demás
        await enviarMensajeAI(texto);
    }
    
    // ============================================================
    // RECONOCIMIENTO DE VOZ
    // ============================================================
    function startRecording() {
        if (isRecording || isSpeaking) return;
        
        if (window.speechSynthesis && isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            avatarEl.classList.remove('speaking');
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            addMessage('Tu navegador no soporta reconocimiento de voz. Usa el modo texto.', 'bot');
            return;
        }
        
        try {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            
            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('recording');
                statusDot.className = 'dot recording';
                statusText.textContent = 'Grabando... Suelta para enviar';
            };
            
            recognition.onresult = (event) => {
                const texto = event.results[0][0].transcript;
                addMessage(texto, 'user');
                procesarMensajeLocal(texto);
            };
            
            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove('recording');
                recognition = null;
                if (!isSpeaking && !isThinking) {
                    statusDot.className = 'dot';
                    statusText.textContent = 'Escuchando...';
                }
            };
            
            recognition.onerror = (event) => {
                console.log('Error:', event.error);
                if (event.error === 'no-speech') {
                    addMessage('No te escuché. Por favor, intenta de nuevo.', 'bot');
                } else if (event.error === 'not-allowed') {
                    addMessage('Permiso de micrófono denegado. Usa el modo texto.', 'bot');
                }
                isRecording = false;
                micBtn.classList.remove('recording');
                recognition = null;
            };
            
            recognition.start();
        } catch(e) {
            console.error('Error:', e);
            isRecording = false;
            micBtn.classList.remove('recording');
            addMessage('Error al iniciar el micrófono. Usa el modo texto.', 'bot');
        }
    }
    
    function stopRecording() {
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
    }
    
    // ============================================================
    // MODO TEXTO
    // ============================================================
    function toggleTextMode() {
        textMode = !textMode;
        
        if (textMode) {
            textInputArea.style.display = 'block';
            btnMode.classList.add('active');
            btnMode.innerHTML = '<i class="fas fa-microphone"></i>';
            micBtn.style.display = 'none';
            textInput.focus();
            statusText.textContent = 'Modo texto';
        } else {
            textInputArea.style.display = 'none';
            btnMode.classList.remove('active');
            btnMode.innerHTML = '<i class="fas fa-keyboard"></i>';
            micBtn.style.display = 'flex';
            statusText.textContent = 'Escuchando...';
        }
    }
    
    // ============================================================
    // INICIALIZACIÓN
    // ============================================================
    async function init() {
        statusDot.className = 'dot';
        statusText.textContent = 'Listo';
        
        // Verificar IA disponible
        try {
            const resp = await fetch('/health');
            const data = await resp.json();
            if (data.ia === 'openrouter') {
                iaBadge.style.display = 'inline-flex';
                console.log('✅ OpenRouter disponible');
            }
        } catch(e) {
            console.log('⚠️ Usando modo local');
        }
        
        // Mensaje de bienvenida
        setTimeout(() => {
            addMessage('Hola, soy el asistente de Serenity Spa. ¿En qué puedo ayudarte? Puedo ayudarte a reservar un turno.', 'bot');
        }, 500);
    }
    
    // ============================================================
    // EVENTOS
    // ============================================================
    micBtn.addEventListener('mousedown', (e) => { 
        e.preventDefault(); 
        if (!textMode) startRecording(); 
    });
    micBtn.addEventListener('mouseup', (e) => { 
        e.preventDefault(); 
        stopRecording(); 
    });
    micBtn.addEventListener('mouseleave', () => { 
        if (isRecording) stopRecording(); 
    });
    
    micBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!textMode) startRecording();
    }, { passive: false });
    
    micBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        stopRecording();
    }, { passive: false });
    
    btnMode.addEventListener('click', toggleTextMode);
    
    btnSendText.addEventListener('click', () => {
        const texto = textInput.value.trim();
        if (texto) {
            addMessage(texto, 'user');
            procesarMensajeLocal(texto);
            textInput.value = '';
        }
    });
    
    textInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const texto = textInput.value.trim();
            if (texto) {
                addMessage(texto, 'user');
                procesarMensajeLocal(texto);
                textInput.value = '';
            }
        }
    });
    
    // Iniciar
    init();
    
})();
</script>
</body>
</html>
