<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Asistente de Voz IA | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --gold:#C9A961;--gold-deep:#A8883F;--bg:#0E0F0D;
            --bg-card:rgba(22,24,20,.92);--text:#F5F2EB;
            --text-muted:rgba(245,242,235,.45);--border:rgba(255,255,255,.06);
        }
        body{
            font-family:'DM Sans',sans-serif;background:var(--bg);
            min-height:100dvh;display:flex;align-items:center;justify-content:center;
            padding:1rem;
        }
        .card{
            width:100%;max-width:480px;background:var(--bg-card);
            backdrop-filter:blur(28px);border-radius:40px;
            border:1px solid var(--border);overflow:hidden;
            box-shadow:0 25px 50px -12px rgba(0,0,0,.5);
        }
        .header{
            padding:2rem 1.75rem 1.5rem;border-bottom:1px solid var(--border);
            text-align:center;position:relative;
        }
        .avatar{
            width:80px;height:80px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            display:flex;align-items:center;justify-content:center;
            margin:0 auto;box-shadow:0 8px 32px rgba(201,169,97,.45);
            transition:all .3s;
        }
        .avatar.speaking{animation:avatarPulse .6s ease-in-out infinite}
        .avatar.thinking{animation:avatarPulse 1.2s ease-in-out infinite}
        .avatar.processing{animation:avatarPulse 0.8s ease-in-out infinite}
        @keyframes avatarPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
        .avatar svg{width:34px;height:34px;color:white}
        .title{
            font-family:'Playfair Display',serif;font-size:1.35rem;
            color:var(--text);margin-top:.75rem;
        }
        .subtitle{
            font-size:.7rem;color:var(--text-muted);margin-top:.25rem;
        }
        .status{
            display:inline-flex;align-items:center;gap:.5rem;
            padding:.35rem .9rem;border-radius:40px;
            background:rgba(255,255,255,.05);font-size:.7rem;
            color:var(--text);margin-top:.75rem;
        }
        .dot{width:7px;height:7px;border-radius:50%;background:#6DB98C}
        .dot.recording{background:#E8A060;animation:blink .8s infinite alternate}
        .dot.speaking{background:#6BA3D6;animation:blink .5s infinite alternate}
        .dot.thinking{background:#C9A961;animation:blink 1s infinite alternate}
        .dot.offline{background:#dc2626}
        @keyframes blink{from{opacity:1}to{opacity:.35}}
        
        .conversation{
            height:380px;overflow-y:auto;padding:1.25rem;
            display:flex;flex-direction:column;gap:.9rem;
        }
        .message{display:flex;gap:.6rem;align-items:flex-end}
        .message.user{flex-direction:row-reverse}
        .msg-pip{
            width:28px;height:28px;border-radius:50%;
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            display:flex;align-items:center;justify-content:center;
            font-size:.65rem;color:#1A160A;font-weight:700;flex-shrink:0;
        }
        .message.user .msg-pip{background:rgba(255,255,255,.12);color:var(--gold)}
        .bubble{
            max-width:78%;padding:.7rem 1rem;border-radius:18px;
            font-size:.84rem;line-height:1.55;color:var(--text);
        }
        .message.bot .bubble{
            background:rgba(255,255,255,.07);border:1px solid var(--border);
            border-bottom-left-radius:4px;white-space:pre-line;
        }
        .message.user .bubble{
            background:linear-gradient(135deg,var(--gold),var(--gold-deep));
            color:#1A160A;font-weight:500;border-bottom-right-radius:4px;
        }
        .ia-badge{
            display:inline-flex;align-items:center;gap:.3rem;
            background:rgba(201,169,97,.15);color:var(--gold);
            padding:.15rem .5rem;border-radius:10px;font-size:.6rem;
            margin-left:.5rem;
        }
        .controls{
            padding:1.2rem 1.75rem 1.75rem;border-top:1px solid var(--border);
            display:flex;align-items:center;justify-content:space-between;
        }
        .btn-back{
            padding:.6rem 1.15rem;border-radius:40px;
            background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
            color:var(--text);text-decoration:none;font-size:.8rem;
            transition:all .2s;
        }
        .btn-back:hover{background:rgba(255,255,255,.12)}
        .btn-mic{
            width:72px;height:72px;border-radius:50%;
            background:linear-gradient(145deg,#E8C97A,#A8883F);
            border:none;color:white;font-size:1.5rem;cursor:pointer;
            box-shadow:0 8px 32px rgba(201,169,97,.4);
            display:flex;align-items:center;justify-content:center;
            transition:all .3s;
        }
        .btn-mic.recording{
            background:linear-gradient(145deg,#F0A060,#C06030);
            animation:pulse 1.5s infinite;
        }
        .btn-mic:active{transform:scale(.95)}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        
        .btn-mode{
            padding:.5rem 1rem;border-radius:40px;
            background:transparent;border:1px solid rgba(255,255,255,.15);
            color:var(--text);font-size:.7rem;cursor:pointer;
            transition:all .2s;font-family:inherit;
        }
        .btn-mode:hover{border-color:var(--gold);color:var(--gold)}
        .btn-mode.active{background:rgba(201,169,97,.15);border-color:var(--gold);color:var(--gold)}
        
        .quick-actions{
            display:flex;gap:.5rem;padding:0 1.75rem 1rem;
            flex-wrap:wrap;justify-content:center;
        }
        .quick-btn{
            background:rgba(255,255,255,.05);border:1px solid var(--border);
            border-radius:40px;padding:.4rem .9rem;
            font-size:.7rem;color:var(--text-muted);cursor:pointer;
            transition:all .2s;
        }
        .quick-btn:hover{background:rgba(201,169,97,.1);color:var(--gold);border-color:rgba(201,169,97,.3)}
        
        @media(max-width:520px){
            .card{border-radius:24px}
            .conversation{height:280px}
            .btn-mic{width:64px;height:64px}
        }
    </style>
</head>
<body>

<main class="card">
    <header class="header">
        <div class="avatar" id="avatarEl">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </div>
        <h1 class="title">Asistente de Voz IA</h1>
        <p class="subtitle">Mantené presionado para hablar. Reservá en segundos.</p>
        <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText">Conectando...</span>
            <span class="ia-badge" id="iaBadge" style="display:none">
                🤖 IA Activa
            </span>
        </div>
    </header>
    
    <div class="quick-actions">
        <button class="quick-btn" data-comando="Quiero reservar un turno">📅 Reservar</button>
        <button class="quick-btn" data-comando="Ver horarios disponibles">⏰ Horarios</button>
        <button class="quick-btn" data-comando="Tipos de masaje">💆 Masajes</button>
        <button class="quick-btn" data-comando="Precios">💰 Precios</button>
    </div>
    
    <section class="conversation" id="conversation"></section>
    
    <footer class="controls">
        <a href="/" class="btn-back">← Volver</a>
        
        <button class="btn-mic" id="micBtn" title="Mantené presionado para hablar">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
        </button>
        
        <button class="btn-mode" id="btnMode" title="Modo texto">
            ⌨️
        </button>
    </footer>
    
    <div id="textInputArea" style="display:none;padding:0 1.75rem 1.75rem;border-top:1px solid var(--border)">
        <div style="display:flex;gap:.5rem">
            <input type="text" id="textInput" placeholder="Escribe tu mensaje..." style="flex:1;padding:.75rem 1rem;border-radius:40px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:var(--text);font-family:inherit;font-size:.85rem;outline:none">
            <button id="btnSendText" style="padding:.75rem 1.25rem;border-radius:40px;background:var(--gold);border:none;color:#1A160A;cursor:pointer;font-weight:600;font-family:inherit;font-size:.8rem">
                📤
            </button>
        </div>
    </div>
</main>

<script>
(function() {
    'use strict';
    
    const micBtn = document.getElementById('micBtn');
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const conversation = document.getElementById('conversation');
    const avatarEl = document.getElementById('avatarEl');
    const iaBadge = document.getElementById('iaBadge');
    const btnMode = document.getElementById('btnMode');
    const textInputArea = document.getElementById('textInputArea');
    const textInput = document.getElementById('textInput');
    const btnSendText = document.getElementById('btnSendText');
    const quickBtns = document.querySelectorAll('.quick-btn');
    
    let ws = null;
    let recognition = null;
    let isRecording = false;
    let isSpeaking = false;
    let isThinking = false;
    let reconnectAttempt = 0;
    let speechQueue = [];
    let textMode = false;
    let synthesisReady = false;
    
    // Mensaje de bienvenida inicial
    let bienvenidaEnviada = false;
    
    // ============================================================
    // VOZ NATURAL (Text-to-Speech)
    // ============================================================
    function speakNatural(texto) {
        if (!window.speechSynthesis) return;
        
        const limpio = texto
            .replace(/<[^>]*>/g, '')
            .replace(/\*/g, '')
            .replace(/_/g, '')
            .replace(/[#\[\]()]/g, '')
            .trim();
        
        if (!limpio) return;
        
        window.speechSynthesis.cancel();
        
        const utterance = new SpeechSynthesisUtterance(limpio);
        utterance.lang = 'es-ES';
        utterance.rate = 0.88;
        utterance.pitch = 1.0;
        utterance.volume = 0.95;
        
        const voices = window.speechSynthesis.getVoices();
        const bestVoice = 
            voices.find(v => v.lang === 'es-ES' && v.name.includes('Google')) ||
            voices.find(v => v.lang === 'es-ES' && v.name.includes('Mónica')) ||
            voices.find(v => v.lang === 'es-AR') ||
            voices.find(v => v.lang === 'es-MX') ||
            voices.find(v => v.lang === 'es-ES') ||
            voices.find(v => v.lang.startsWith('es'));
        
        if (bestVoice) utterance.voice = bestVoice;
        
        utterance.onstart = () => {
            isSpeaking = true;
            avatarEl.classList.add('speaking');
            statusDot.className = 'dot speaking';
            statusText.textContent = 'Hablando...';
        };
        
        utterance.onend = () => {
            isSpeaking = false;
            avatarEl.classList.remove('speaking');
            statusDot.className = 'dot';
            statusText.textContent = 'Escuchando...';
            
            if (speechQueue.length > 0) {
                setTimeout(() => speakNatural(speechQueue.shift()), 350);
            }
        };
        
        utterance.onerror = () => {
            isSpeaking = false;
            avatarEl.classList.remove('speaking');
            statusDot.className = 'dot';
            statusText.textContent = 'Escuchando...';
        };
        
        window.speechSynthesis.speak(utterance);
    }
    
    // Cargar voces
    if (window.speechSynthesis) {
        window.speechSynthesis.getVoices();
        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => {
                synthesisReady = true;
            };
        }
        setTimeout(() => { synthesisReady = true; }, 500);
    }
    
    // ============================================================
    // MENSAJES
    // ============================================================
    function addMessage(texto, who) {
        const row = document.createElement('div');
        row.className = 'message ' + (who === 'user' ? 'user' : 'bot');
        
        const pip = document.createElement('div');
        pip.className = 'msg-pip';
        pip.textContent = who === 'user' ? 'T' : 'S';
        
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = texto;
        
        row.appendChild(pip);
        row.appendChild(bubble);
        conversation.appendChild(row);
        conversation.scrollTop = conversation.scrollHeight;
        
        if (who === 'bot') {
            if (isSpeaking) {
                speechQueue.push(texto);
            } else {
                speakNatural(texto);
            }
        }
    }
    
    function showThinking() {
        isThinking = true;
        avatarEl.classList.add('thinking');
        statusDot.className = 'dot thinking';
        statusText.textContent = 'Pensando...';
    }
    
    function hideThinking() {
        isThinking = false;
        avatarEl.classList.remove('thinking');
        statusDot.className = 'dot';
        statusText.textContent = 'Escuchando...';
    }
    
    function mensajeBienvenida() {
        if (bienvenidaEnviada) return;
        bienvenidaEnviada = true;
        const bienvenida = `🌿 Hola, bienvenido al asistente de voz de Serenity Spa.

Soy tu asistente virtual. Puedo ayudarte a reservar un turno de manera rápida y sencilla.

Para comenzar, solo dime "quiero reservar" y te guiaré paso a paso.

También puedo mostrarte los horarios, los tipos de masaje o los precios.

¿Qué te gustaría hacer hoy?`;
        addMessage(bienvenida, 'bot');
    }
    
    // ============================================================
    // WEBSOCKET
    // ============================================================
    function connectWebSocket() {
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = protocol + '//' + location.host + '/ws-voice';
        
        try {
            ws = new WebSocket(wsUrl);
        } catch(e) {
            setTimeout(connectWebSocket, 5000);
            return;
        }
        
        ws.onopen = () => {
            reconnectAttempt = 0;
            statusDot.className = 'dot';
            statusText.textContent = 'Escuchando...';
            mensajeBienvenida();
        };
        
        ws.onmessage = (event) => {
            hideThinking();
            try {
                const data = JSON.parse(event.data);
                if (data.tipo === 'respuesta') {
                    addMessage(data.texto, 'bot');
                }
            } catch(e) {
                console.error('Error mensaje:', e);
            }
        };
        
        ws.onclose = () => {
            statusDot.className = 'dot offline';
            statusText.textContent = 'Reconectando...';
            reconnectAttempt++;
            const delay = Math.min(3000 + reconnectAttempt * 1000, 12000);
            setTimeout(connectWebSocket, delay);
        };
        
        ws.onerror = () => {
            statusDot.className = 'dot offline';
            statusText.textContent = 'Error de conexión';
        };
    }
    
    // ============================================================
    // ENVIAR TEXTO AL SERVIDOR
    // ============================================================
    function sendTextToServer(texto) {
        if (!texto.trim()) return;
        
        addMessage(texto, 'user');
        showThinking();
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ tipo: 'transcripcion', texto: texto }));
        } else {
            hideThinking();
            addMessage('No hay conexión con el servidor. Intentá de nuevo.', 'bot');
        }
    }
    
    // ============================================================
    // RECONOCIMIENTO DE VOZ
    // ============================================================
    function startRecording() {
        if (isRecording || isSpeaking) return;
        
        if (window.speechSynthesis && isSpeaking) {
            window.speechSynthesis.cancel();
            isSpeaking = false;
            avatarEl.classList.remove('speaking');
        }
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            addMessage('Este navegador no soporta reconocimiento de voz. Usá el modo texto.', 'bot');
            return;
        }
        
        try {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES';
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            
            recognition.onstart = () => {
                isRecording = true;
                micBtn.classList.add('recording');
                statusDot.className = 'dot recording';
                statusText.textContent = '🎤 Grabando... Soltá para enviar';
            };
            
            recognition.onresult = (event) => {
                const texto = event.results[0][0].transcript;
                sendTextToServer(texto);
            };
            
            recognition.onend = () => {
                isRecording = false;
                micBtn.classList.remove('recording');
                recognition = null;
                if (!isSpeaking && !isThinking) {
                    statusDot.className = 'dot';
                    statusText.textContent = 'Escuchando...';
                }
            };
            
            recognition.onerror = (event) => {
                console.log('Error reconocimiento:', event.error);
                if (event.error === 'no-speech') {
                    // Silencio, no mostrar error
                } else if (event.error === 'not-allowed') {
                    addMessage('Permiso de micrófono denegado. Usá el modo texto.', 'bot');
                }
                isRecording = false;
                micBtn.classList.remove('recording');
                if (!isSpeaking && !isThinking) {
                    statusDot.className = 'dot';
                    statusText.textContent = 'Escuchando...';
                }
            };
            
            recognition.start();
        } catch(e) {
            isRecording = false;
            micBtn.classList.remove('recording');
            addMessage('Error al iniciar el micrófono. Usá el modo texto.', 'bot');
        }
    }
    
    function stopRecording() {
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
    }
    
    // ============================================================
    // MODO TEXTO
    // ============================================================
    function toggleTextMode() {
        textMode = !textMode;
        
        if (textMode) {
            textInputArea.style.display = 'block';
            btnMode.classList.add('active');
            btnMode.innerHTML = '🎤';
            micBtn.style.display = 'none';
            textInput.focus();
        } else {
            textInputArea.style.display = 'none';
            btnMode.classList.remove('active');
            btnMode.innerHTML = '⌨️';
            micBtn.style.display = 'flex';
        }
    }
    
    // ============================================================
    // EVENTOS
    // ============================================================
    micBtn.addEventListener('mousedown', (e) => { 
        e.preventDefault(); 
        if (!textMode) startRecording(); 
    });
    micBtn.addEventListener('mouseup', (e) => { 
        e.preventDefault(); 
        stopRecording(); 
    });
    micBtn.addEventListener('mouseleave', () => { 
        if (isRecording) stopRecording(); 
    });
    
    micBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!textMode) startRecording();
    }, { passive: false });
    
    micBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        stopRecording();
    }, { passive: false });
    
    // Modo texto
    btnMode.addEventListener('click', toggleTextMode);
    
    btnSendText.addEventListener('click', () => {
        const texto = textInput.value;
        if (texto.trim()) {
            sendTextToServer(texto);
            textInput.value = '';
        }
    });
    
    textInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            const texto = textInput.value;
            if (texto.trim()) {
                sendTextToServer(texto);
                textInput.value = '';
            }
        }
    });
    
    // Botones rápidos
    quickBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const comando = btn.dataset.comando;
            if (comando) {
                sendTextToServer(comando);
            }
        });
    });
    
    // Atajo de teclado
    document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 'm') {
            e.preventDefault();
            if (!textMode) {
                if (!isRecording) startRecording();
                else stopRecording();
            }
        }
        if ((e.ctrlKey || e.metaKey) && e.key === 't') {
            e.preventDefault();
            toggleTextMode();
        }
    });
    
    // ============================================================
    // INICIAR
    // ============================================================
    connectWebSocket();
    
})();
</script>
</body>
</html>
