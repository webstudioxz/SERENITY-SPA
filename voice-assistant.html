<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#C9A961">
    <title>Asistente Virtual | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#0f172a 0%,#1e293b 50%,#0f172a 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;-webkit-user-select:none;user-select:none}
        .call-container{max-width:500px;width:100%;background:rgba(15,23,42,.85);backdrop-filter:blur(20px);border-radius:48px;box-shadow:0 25px 50px -12px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);overflow:hidden;animation:slideUp .4s ease-out}
        @keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
        .call-header{background:linear-gradient(135deg,rgba(201,169,97,.12),rgba(168,136,63,.03));padding:1.75rem 1.5rem;text-align:center;border-bottom:1px solid rgba(255,255,255,.05)}
        .avatar-wrapper{position:relative;display:inline-block}
        .avatar{width:85px;height:85px;background:linear-gradient(135deg,#C9A961,#A8883F);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(201,169,97,.3);transition:all .3s}
        .avatar i{font-size:2.5rem;color:white}
        .pulse-ring{position:absolute;top:-5px;left:-5px;right:-5px;bottom:-5px;border-radius:50%;border:2px solid rgba(201,169,97,.4);animation:pulse-ring 2s cubic-bezier(.215,.61,.355,1) infinite}
        @keyframes pulse-ring{0%{transform:scale(.8);opacity:1}100%{transform:scale(1.4);opacity:0}}
        .call-title{font-size:1.3rem;font-weight:600;color:white;margin-top:.75rem}
        .call-subtitle{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:.25rem}
        .call-status{display:inline-flex;align-items:center;gap:.5rem;background:rgba(16,185,129,.15);padding:.35rem .9rem;border-radius:40px;margin-top:.75rem;font-size:.7rem;font-weight:500;transition:all .3s}
        .status-dot{width:8px;height:8px;background:#10B981;border-radius:50%;animation:pg 1.5s infinite}
        @keyframes pg{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.2)}}
        .call-status.listening{background:rgba(245,158,11,.15)}.call-status.listening .status-dot{background:#F59E0B;animation:pa .6s infinite}
        @keyframes pa{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.5}}
        .call-status.speaking{background:rgba(59,130,246,.15)}.call-status.speaking .status-dot{background:#3B82F6;animation:ps .5s infinite}
        @keyframes ps{0%,100%{transform:scale(1)}50%{transform:scale(1.8);opacity:.6}}
        .call-status.error{background:rgba(239,68,68,.15)}.call-status.error .status-dot{background:#EF4444;animation:none}
        .timer{font-family:'Inter',monospace;font-size:.75rem;color:rgba(255,255,255,.4);margin-top:.5rem;letter-spacing:1px}
        .conversation-area{height:380px;padding:1.25rem;overflow-y:auto;display:flex;flex-direction:column;gap:1rem}
        .conversation-area::-webkit-scrollbar{width:4px}.conversation-area::-webkit-scrollbar-track{background:rgba(255,255,255,.05);border-radius:10px}.conversation-area::-webkit-scrollbar-thumb{background:rgba(201,169,97,.4);border-radius:10px}
        .message{display:flex;gap:.75rem;animation:msgIn .3s cubic-bezier(.2,.9,.4,1.1)}
        @keyframes msgIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .message.user{justify-content:flex-end}
        .msg-avatar{width:32px;height:32px;border-radius:50%;background:rgba(201,169,97,.15);display:flex;align-items:center;justify-content:center;flex-shrink:0}
        .msg-avatar i{font-size:.8rem;color:#C9A961}
        .msg-bubble{max-width:75%;padding:.7rem 1rem;border-radius:20px;font-size:.85rem;line-height:1.45}
        .message.bot .msg-bubble{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9);border-top-left-radius:4px;border:1px solid rgba(255,255,255,.03)}
        .message.user .msg-bubble{background:linear-gradient(135deg,#C9A961,#A8883F);color:#0f172a;border-bottom-right-radius:4px;font-weight:500}
        .typing-effect{display:flex;align-items:center;gap:4px;padding:.7rem 1rem;background:rgba(255,255,255,.08);border-radius:20px;border-top-left-radius:4px}
        .typing-dot{width:7px;height:7px;background:rgba(255,255,255,.5);border-radius:50%;animation:td 1.2s infinite ease-in-out}
        .typing-dot:nth-child(2){animation-delay:.15s}.typing-dot:nth-child(3){animation-delay:.3s}
        @keyframes td{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-5px);opacity:1}}
        .listening-bar{display:none;align-items:center;justify-content:center;gap:.75rem;padding:.75rem;font-size:.75rem;color:#F59E0B;border-top:1px solid rgba(245,158,11,.2);background:rgba(245,158,11,.05)}
        .listening-bar.active{display:flex}
        .waveform{display:flex;align-items:center;gap:3px}
        .waveform span{width:3px;background:#F59E0B;border-radius:3px;animation:wv .8s ease-in-out infinite}
        .waveform span:nth-child(1){animation-delay:0s;height:8px}.waveform span:nth-child(2){animation-delay:.1s;height:16px}.waveform span:nth-child(3){animation-delay:.2s;height:10px}.waveform span:nth-child(4){animation-delay:.3s;height:20px}.waveform span:nth-child(5){animation-delay:.15s;height:12px}.waveform span:nth-child(6){animation-delay:.25s;height:16px}
        @keyframes wv{0%,100%{height:6px;opacity:.4}50%{height:20px;opacity:1}}
        .call-controls{display:flex;justify-content:center;align-items:center;gap:2rem;padding:1.5rem;background:rgba(0,0,0,.3);border-top:1px solid rgba(255,255,255,.05)}
        .call-btn{border-radius:50%;border:none;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center}
        .call-btn.mic{width:80px;height:80px;background:linear-gradient(135deg,#C9A961,#A8883F);color:white;font-size:1.8rem;box-shadow:0 8px 24px rgba(201,169,97,.4);position:relative}
        .call-btn.mic:active,.call-btn.mic.pressed{transform:scale(.92);background:linear-gradient(135deg,#F59E0B,#D97706);box-shadow:0 4px 16px rgba(245,158,11,.5)}
        .call-btn.mic:disabled{opacity:.4;cursor:not-allowed;transform:none!important;box-shadow:none}
        .mic-label{position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);font-size:.6rem;color:rgba(255,255,255,.5);white-space:nowrap;font-weight:500;letter-spacing:.5px}
        .call-btn.end{width:52px;height:52px;background:linear-gradient(135deg,#dc2626,#b91c1c);color:white;font-size:1.2rem;box-shadow:0 4px 12px rgba(220,38,38,.3)}
        .call-btn.end:hover{transform:scale(1.05)}
        .call-btn.speed{width:44px;height:44px;background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.1);font-size:.65rem;font-weight:700}
        .call-btn.speed:hover{background:rgba(255,255,255,.15);color:white}
        @media(max-width:480px){.call-container{border-radius:32px}.conversation-area{height:300px}.call-btn.mic{width:70px;height:70px;font-size:1.5rem}.call-controls{gap:1.5rem;padding:1.25rem}.avatar{width:70px;height:70px}.avatar i{font-size:2rem}}
    </style>
</head>
<body>
<div class="call-container">
    <div class="call-header">
        <div class="avatar-wrapper"><div class="pulse-ring"></div><div class="avatar"><i class="fas fa-headset"></i></div></div>
        <div class="call-title">Asistente Virtual</div>
        <div class="call-subtitle">Serenity Spa</div>
        <div class="call-status" id="callStatus"><span class="status-dot"></span><span>Conectando...</span></div>
        <div class="timer" id="callTimer">00:00</div>
    </div>
    <div class="conversation-area" id="convArea"></div>
    <div class="listening-bar" id="listenBar"><div class="waveform"><span></span><span></span><span></span><span></span><span></span><span></span></div><span>Escuchando... suelta para enviar</span></div>
    <div class="call-controls">
        <button class="call-btn speed" id="speedBtn" title="Velocidad">1x</button>
        <button class="call-btn mic" id="micBtn" disabled title="Mantené presionado para hablar"><i class="fas fa-microphone"></i><span class="mic-label">MANTÉN PARA HABLAR</span></button>
        <button class="call-btn end" id="endBtn" title="Finalizar"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<script>
    let ws=null, synthesis=window.speechSynthesis;
    let isCallActive=true, isBotSpeaking=false, isListening=false;
    let callStart=null, timerInt=null, recognition=null, finalTranscript='';

    const speeds=[0.8,0.95,1.1,1.25], speedNames=['Lento','Normal','Rápido','Muy rápido'];
    let speedIdx=1, voiceSpeed=0.95;

    const $=id=>document.getElementById(id);
    const DOM={area:$('convArea'),status:$('callStatus'),timer:$('callTimer'),listen:$('listenBar'),mic:$('micBtn'),end:$('endBtn'),speed:$('speedBtn')};
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

    function setStatus(t,c){DOM.status.innerHTML=`<span class="status-dot"></span><span>${t}</span>`;DOM.status.className='call-status'+(c?' '+c:'');}

    function addMsg(text,who,typing){
        const d=document.createElement('div');d.className=`message ${who}`;
        const ic=who==='bot'?'fas fa-robot':'fas fa-user
