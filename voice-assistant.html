<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Asistente de Voz | Serenity Spa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --gold:#C9A961;--gold-deep:#A8883F;--bg:#0E0F0D;--bg-card:rgba(22,24,20,.82);
      --text:#F5F2EB;--text-muted:rgba(245,242,235,.35);--border:rgba(255,255,255,.06);
      --radius:40px;--shadow:0 32px 64px -16px rgba(0,0,0,.7);
    }
    body{
      font-family:'DM Sans',sans-serif;background:var(--bg);
      min-height:100dvh;display:flex;align-items:center;justify-content:center;
      padding:1rem;transition:background .3s;
    }
    .card{
      width:100%;max-width:480px;background:var(--bg-card);
      backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
      border-radius:var(--radius);box-shadow:var(--shadow);
      border:1px solid var(--border);overflow:hidden;
    }
    .header{
      padding:2rem 1.75rem 1.5rem;border-bottom:1px solid var(--border);
      text-align:center;position:relative;
    }
    .avatar{
      width:80px;height:80px;border-radius:50%;
      background:linear-gradient(135deg,var(--gold),var(--gold-deep));
      display:flex;align-items:center;justify-content:center;
      margin:0 auto;box-shadow:0 8px 32px rgba(201,169,97,.35);
    }
    .avatar svg{width:32px;height:32px;color:white}
    .title{
      font-family:'Playfair Display',serif;font-size:1.35rem;
      color:var(--text);margin-top:.75rem;
    }
    .status{
      display:inline-flex;align-items:center;gap:.5rem;
      padding:.35rem .9rem;border-radius:40px;
      background:rgba(255,255,255,.05);font-size:.7rem;
      color:var(--text);margin-top:.75rem;
    }
    .status-dot{width:7px;height:7px;border-radius:50%;background:#6DB98C}
    .status-dot.recording{background:#E8A060;animation:blink .8s infinite alternate}
    .status-dot.error{background:#E07070}
    @keyframes blink{from{opacity:1}to{opacity:.35}}
    
    .conversation{
      height:350px;overflow-y:auto;padding:1.25rem;
      display:flex;flex-direction:column;gap:.9rem;
    }
    .message{display:flex;gap:.6rem;align-items:flex-end}
    .message.user{flex-direction:row-reverse}
    .msg-pip{
      width:28px;height:28px;border-radius:50%;
      background:linear-gradient(135deg,var(--gold),var(--gold-deep));
      display:flex;align-items:center;justify-content:center;
      font-size:.65rem;color:white;flex-shrink:0;
    }
    .message.user .msg-pip{background:rgba(255,255,255,.1);color:var(--gold)}
    .bubble{
      max-width:76%;padding:.65rem 1rem;border-radius:18px;
      font-size:.84rem;line-height:1.55;color:var(--text);
    }
    .message.bot .bubble{
      background:rgba(255,255,255,.07);border:1px solid var(--border);
      border-bottom-left-radius:4px;
    }
    .message.user .bubble{
      background:linear-gradient(135deg,var(--gold),var(--gold-deep));
      color:#1A160A;font-weight:500;border-bottom-right-radius:4px;
    }
    .time{font-size:.6rem;color:var(--text-muted);margin-top:.3rem;text-align:right}
    .message.bot .time{text-align:left}
    
    .controls{
      padding:1.4rem 1.75rem 1.75rem;border-top:1px solid var(--border);
      display:flex;align-items:center;justify-content:space-between;
    }
    .btn-back{
      padding:.6rem 1.15rem;border-radius:40px;
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
      color:var(--text);text-decoration:none;font-size:.8rem;font-weight:500;
    }
    .btn-mic{
      width:72px;height:72px;border-radius:50%;
      background:linear-gradient(145deg,#E8C97A,#A8883F);
      border:none;color:white;font-size:1.5rem;cursor:pointer;
      box-shadow:0 8px 32px rgba(201,169,97,.4);
      display:flex;align-items:center;justify-content:center;
      -webkit-tap-highlight-color:transparent;
      user-select:none;-webkit-user-select:none;
    }
    .btn-mic.recording{
      background:linear-gradient(145deg,#F0A060,#C06030);
      animation:pulse 1.5s infinite;
    }
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
    
    .toast-container{
      position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);
      z-index:999;display:flex;flex-direction:column;align-items:center;
      gap:.5rem;pointer-events:none;width:min(90vw,380px);
    }
    .toast{
      background:rgba(22,24,20,.95);border:1px solid var(--border);
      border-radius:12px;padding:.65rem 1.1rem;font-size:.8rem;
      color:var(--text);display:flex;align-items:center;gap:.6rem;
      backdrop-filter:blur(16px);box-shadow:0 8px 24px rgba(0,0,0,.4);
      pointer-events:auto;animation:toastIn .35s ease both;
    }
    @keyframes toastIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    
    @media(max-width:520px){
      .card{border-radius:28px}.conversation{height:300px}
    }
  </style>
</head>
<body>

<main class="card" role="main" aria-label="Asistente de Voz - Serenity Spa">
  <header class="header">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.8">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </div>
    <h1 class="title">Asistente de Voz</h1>
    <div class="status" id="statusBadge">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Conectando...</span>
    </div>
  </header>
  
  <section class="conversation" id="conversation" aria-live="polite"></section>
  
  <footer class="controls">
    <a href="/" class="btn-back">← Volver</a>
    <button class="btn-mic" id="micBtn" aria-label="Presioná para hablar">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
    <div style="width:85px"></div>
  </footer>
</main>

<div class="toast-container" id="toastContainer"></div>

<script>
// ============================================================
// ASISTENTE DE VOZ - CORREGIDO
// ============================================================
(function() {
  console.log('🎤 Iniciando asistente de voz...');
  
  // DOM
  const micBtn = document.getElementById('micBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const conversation = document.getElementById('conversation');
  const toastContainer = document.getElementById('toastContainer');
  
  // Estado
  let ws = null;
  let recognition = null;
  let isRecording = false;
  let reconnectAttempt = 0;
  let reconnectTimer = null;
  
  // ============================================================
  // TOAST
  // ============================================================
  function showToast(msg, duration = 3000) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    toastContainer.appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transition = 'opacity .3s';
      setTimeout(() => toast.remove(), 300);
    }, duration);
  }
  
  // ============================================================
  // STATUS
  // ============================================================
  function setStatus(text, type) {
    statusText.textContent = text;
    statusDot.className = 'status-dot';
    if (type === 'recording') statusDot.classList.add('recording');
    if (type === 'error') statusDot.classList.add('error');
  }
  
  // ============================================================
  // MENSAJES
  // ============================================================
  function addMessage(text, who) {
    const row = document.createElement('div');
    row.className = 'message ' + (who === 'user' ? 'user' : 'bot');
    
    const pip = document.createElement('div');
    pip.className = 'msg-pip';
    pip.textContent = who === 'user' ? 'T' : 'S';
    
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    
    const time = document.createElement('div');
    time.className = 'time';
    time.textContent = new Date().toLocaleTimeString('es-AR', { hour:'2-digit', minute:'2-digit' });
    bubble.appendChild(time);
    
    row.appendChild(pip);
    row.appendChild(bubble);
    conversation.appendChild(row);
    conversation.scrollTop = conversation.scrollHeight;
  }
  
  function welcomeMessage() {
    addMessage('🌿 ¡Hola! Soy el asistente de Serenity Spa.\n\nDecí "reservar turno" para agendar o "cancelar turno" para cancelar.\n\nHorarios: 12:00, 16:00 y 20:00 hs.\nLunes a Sábado.', 'bot');
  }
  
  // ============================================================
  // WEBSOCKET
  // ============================================================
  function connectWebSocket() {
    if (reconnectTimer) {
      clearTimeout(reconnectTimer);
      reconnectTimer = null;
    }
    
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
      ws.close(1000, 'Reconexión');
    }
    
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${location.host}/ws-voice`;
    
    console.log('🔌 Conectando a:', wsUrl);
    
    try {
      ws = new WebSocket(wsUrl);
    } catch(e) {
      console.error('Error WebSocket:', e);
      setStatus('Error de conexión', 'error');
      scheduleReconnect();
      return;
    }
    
    ws.onopen = () => {
      console.log('✅ WebSocket conectado');
      reconnectAttempt = 0;
      setStatus('Escuchando');
      welcomeMessage();
    };
    
    ws.onmessage = (event) => {
      try {
        const data = JSON.parse(event.data);
        console.log('📩 Respuesta:', data);
        if (data.tipo === 'respuesta') {
          addMessage(data.texto, 'bot');
          // Leer en voz alta
          if (window.speechSynthesis) {
            const clean = data.texto.replace(/<[^>]*>/g, '').replace(/\*/g, '');
            const utter = new SpeechSynthesisUtterance(clean);
            utter.lang = 'es-AR';
            utter.rate = 0.95;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utter);
          }
        }
      } catch(e) {
        console.error('Error parseando mensaje:', e);
      }
    };
    
    ws.onerror = () => {
      console.error('❌ Error WebSocket');
      setStatus('Error', 'error');
    };
    
    ws.onclose = (event) => {
      console.log('🔌 WebSocket cerrado:', event.code);
      if (event.code !== 1000) {
        scheduleReconnect();
      }
    };
  }
  
  function scheduleReconnect() {
    reconnectAttempt++;
    const delay = Math.min(3000 + reconnectAttempt * 1000, 12000);
    setStatus('Reconectando...', 'error');
    console.log(`⏳ Reintentando en ${delay/1000}s`);
    reconnectTimer = setTimeout(connectWebSocket, delay);
  }
  
  // ============================================================
  // RECONOCIMIENTO DE VOZ - CORREGIDO
  // ============================================================
  function startRecording() {
    if (isRecording) return;
    
    // Verificar si el navegador soporta reconocimiento de voz
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SpeechRecognition) {
      showToast('❌ Tu navegador no soporta reconocimiento de voz. Usá Chrome o Edge.');
      addMessage('❌ Este navegador no soporta reconocimiento de voz. Probá con Google Chrome.', 'bot');
      return;
    }
    
    // Verificar conexión WebSocket
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      showToast('Reconectando con el servidor...');
      connectWebSocket();
    }
    
    try {
      recognition = new SpeechRecognition();
      recognition.lang = 'es-ES';
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      
      recognition.onstart = () => {
        console.log('🎤 Grabando...');
        isRecording = true;
        micBtn.classList.add('recording');
        setStatus('Grabando...', 'recording');
        if (navigator.vibrate) navigator.vibrate(40);
      };
      
      recognition.onresult = (event) => {
        const text = event.results[0][0].transcript;
        console.log('📝 Reconocido:', text);
        addMessage(text, 'user');
        
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ tipo: 'transcripcion', texto: text }));
        } else {
          addMessage('❌ Sin conexión. Reintentando...', 'bot');
          connectWebSocket();
        }
      };
      
      recognition.onerror = (event) => {
        console.error('❌ Error voz:', event.error);
        
        const mensajes = {
          'no-speech': 'No detecté ningún sonido. ¿Probaste hablar más fuerte?',
          'audio-capture': 'No se pudo acceder al micrófono. Verificá los permisos.',
          'not-allowed': 'Permiso de micrófono denegado. Permitilo en configuración.',
          'network': 'Error de red. Verificá tu conexión.',
          'aborted': null
        };
        
        const msg = mensajes[event.error];
        if (msg) {
          showToast(msg);
          addMessage('⚠️ ' + msg, 'bot');
        }
        
        stopRecording();
      };
      
      recognition.onend = () => {
        console.log('🎤 Grabación finalizada');
        stopRecording();
      };
      
      recognition.start();
      console.log('✅ Reconocimiento iniciado');
      
    } catch(e) {
      console.error('Error iniciando reconocimiento:', e);
      showToast('Error al iniciar el micrófono');
      stopRecording();
    }
  }
  
  function stopRecording() {
    if (recognition) {
      try {
        recognition.abort();
      } catch(e) {}
      recognition = null;
    }
    isRecording = false;
    micBtn.classList.remove('recording');
    setStatus('Escuchando');
  }
  
  // ============================================================
  // EVENTOS DEL BOTÓN
  // ============================================================
  // Mouse
  micBtn.addEventListener('mousedown', (e) => {
    e.preventDefault();
    startRecording();
  });
  
  micBtn.addEventListener('mouseup', (e) => {
    e.preventDefault();
    stopRecording();
  });
  
  micBtn.addEventListener('mouseleave', () => {
    if (isRecording) stopRecording();
  });
  
  // Touch (mobile)
  micBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    startRecording();
  }, { passive: false });
  
  micBtn.addEventListener('touchend', (e) => {
    e.preventDefault();
    stopRecording();
  }, { passive: false });
  
  micBtn.addEventListener('touchcancel', (e) => {
    e.preventDefault();
    stopRecording();
  }, { passive: false });
  
  // Teclado (accesibilidad)
  micBtn.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (!isRecording) startRecording();
      else stopRecording();
    }
  });
  
  // Prevenir menú contextual
  micBtn.addEventListener('contextmenu', (e) => e.preventDefault());
  
  // Atajo global Ctrl+M
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'm') {
      e.preventDefault();
      if (!isRecording) startRecording();
      else stopRecording();
    }
  });
  
  // ============================================================
  // INICIAR
  // ============================================================
  console.log('🌿 Serenity Spa Voice Assistant v2.0');
  console.log('🎤 Speech Recognition:', !!(window.SpeechRecognition || window.webkitSpeechRecognition) ? 'Soportado ✅' : 'NO soportado ❌');
  connectWebSocket();
  
})();
</script>
</body>
</html>
