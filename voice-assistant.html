<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="Asistente de voz profesional para reservas en Serenity Spa">
    <meta name="theme-color" content="#C9A961">
    <title>Asistente Virtual | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .call-container {
            max-width: 500px;
            width: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            overflow: hidden;
            transition: all 0.3s ease;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .call-header {
            background: linear-gradient(135deg, rgba(201, 169, 97, 0.12), rgba(168, 136, 63, 0.03));
            padding: 1.75rem 1.5rem;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .avatar-wrapper { position: relative; display: inline-block; }

        .avatar {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, #C9A961, #A8883F);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(201, 169, 97, 0.3);
            transition: all 0.3s ease;
        }

        .avatar i { font-size: 2.5rem; color: white; }

        .pulse-ring {
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 2px solid rgba(201, 169, 97, 0.4);
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .call-title { font-size: 1.3rem; font-weight: 600; color: white; margin-top: 0.75rem; }
        .call-subtitle { font-size: 0.75rem; color: rgba(255, 255, 255, 0.5); margin-top: 0.25rem; }

        .call-status {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(16, 185, 129, 0.15);
            padding: 0.35rem 0.9rem;
            border-radius: 40px;
            margin-top: 0.75rem;
            font-size: 0.7rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .status-dot {
            width: 8px; height: 8px;
            background: #10B981;
            border-radius: 50%;
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        .call-status.listening { background: rgba(245, 158, 11, 0.15); }
        .call-status.listening .status-dot { background: #F59E0B; }
        
        .call-status.speaking { background: rgba(59, 130, 246, 0.15); }
        .call-status.speaking .status-dot { 
            background: #3B82F6; 
            animation: speakingPulse 0.5s infinite;
        }
        
        .call-status.error { background: rgba(239, 68, 68, 0.15); }
        .call-status.error .status-dot { background: #EF4444; animation: none; }

        @keyframes speakingPulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.8); opacity: 0.6; }
        }

        .timer {
            font-family: 'Inter', monospace;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 0.5rem;
            letter-spacing: 1px;
        }

        .conversation-area {
            height: 380px;
            padding: 1.25rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .conversation-area::-webkit-scrollbar { width: 4px; }
        .conversation-area::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        .conversation-area::-webkit-scrollbar-thumb { background: rgba(201, 169, 97, 0.4); border-radius: 10px; }

        .message {
            display: flex;
            gap: 0.75rem;
            animation: messageIn 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        @keyframes messageIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { justify-content: flex-end; }

        .message-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: rgba(201, 169, 97, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .message-avatar i { font-size: 0.8rem; color: #C9A961; }
        .message.user .message-avatar { background: rgba(201, 169, 97, 0.25); }

        .message-bubble {
            max-width: 75%;
            padding: 0.7rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            line-height: 1.45;
        }

        .message.bot .message-bubble {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.9);
            border-top-left-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .message.user .message-bubble {
            background: linear-gradient(135deg, #C9A961, #A8883F);
            color: #0f172a;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        .typing-effect {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 0.7rem 1rem;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            border-top-left-radius: 4px;
        }

        .typing-dot {
            width: 7px; height: 7px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: typingDot 1.2s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.15s; }
        .typing-dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes typingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        .listening-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.5rem;
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(0, 0, 0, 0.2);
        }

        .waveform {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .waveform span {
            width: 2px;
            background: #C9A961;
            border-radius: 2px;
            animation: wave 0.8s ease-in-out infinite;
        }

        .waveform span:nth-child(1) { animation-delay: 0s; height: 8px; }
        .waveform span:nth-child(2) { animation-delay: 0.1s; height: 14px; }
        .waveform span:nth-child(3) { animation-delay: 0.2s; height: 10px; }
        .waveform span:nth-child(4) { animation-delay: 0.3s; height: 16px; }
        .waveform span:nth-child(5) { animation-delay: 0.4s; height: 8px; }

        @keyframes wave {
            0%, 100% { height: 6px; opacity: 0.4; }
            50% { height: 16px; opacity: 1; }
        }

        .call-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            padding: 1.25rem 1.5rem;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .call-btn {
            width: 52px; height: 52px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .call-btn.end {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: white;
            box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }

        .call-btn.end:hover { transform: scale(1.05); }

        .call-btn.mic {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .call-btn.mic:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.05); }
        .call-btn.mic.muted { background: rgba(245, 158, 11, 0.2); color: #F59E0B; }

        .speed-btn {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.7rem;
            font-weight: 600;
        }

        .speed-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: scale(1.05);
        }

        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }

        @media (max-width: 480px) {
            .call-container { border-radius: 32px; }
            .conversation-area { height: 320px; }
            .call-btn { width: 48px; height: 48px; }
            .avatar { width: 70px; height: 70px; }
            .avatar i { font-size: 2rem; }
            .call-controls { gap: 1rem; }
        }
    </style>
</head>
<body>
<div class="call-container">
    <div class="call-header">
        <div class="avatar-wrapper">
            <div class="pulse-ring"></div>
            <div class="avatar"><i class="fas fa-headset"></i></div>
        </div>
        <div class="call-title">Asistente Virtual</div>
        <div class="call-subtitle">Serenity Spa</div>
        <div class="call-status" id="callStatus">
            <span class="status-dot"></span>
            <span>Conectando...</span>
        </div>
        <div class="timer" id="callTimer">00:00</div>
    </div>

    <div class="conversation-area" id="conversationArea">
        <div class="message bot">
            <div class="message-avatar"><i class="fas fa-robot"></i></div>
            <div class="message-bubble">
                🌿 Bienvenido a Serenity Spa. Soy tu asistente virtual. ¿En qué puedo ayudarte?
            </div>
        </div>
    </div>

    <div class="listening-badge" id="listeningBadge" style="display: none;">
        <div class="waveform"><span></span><span></span><span></span><span></span><span></span></div>
        <span>Escuchando...</span>
    </div>

    <div class="call-controls">
        <button class="call-btn speed-btn" id="speedBtn" title="Velocidad de voz">1x</button>
        <button class="call-btn mic" id="micToggleBtn" title="Silenciar micrófono"><i class="fas fa-microphone"></i></button>
        <button class="call-btn end" id="endCallBtn" title="Finalizar llamada"><i class="fas fa-phone-slash"></i></button>
    </div>
</div>

<script>
    // ==================== VARIABLES GLOBALES ====================
    let ws = null;
    let recognition = null;
    let synthesis = null;
    let isMicActive = true;
    let isCallActive = true;
    let isBotThinking = false;
    let callStartTime = null;
    let timerInterval = null;
    let reconnectAttempts = 0;
    const MAX_RECONNECT_ATTEMPTS = 10;
    
    // Control de velocidad de voz
    let voiceSpeed = 0.95;
    const voiceSpeeds = [0.8, 0.95, 1.1, 1.25];
    const speedNames = ['Lento', 'Normal', 'Rápido', 'Muy rápido'];
    let currentSpeedIndex = 1; // "Normal" por defecto

    // ==================== ELEMENTOS DOM ====================
    const DOM = {
        conversationArea: document.getElementById('conversationArea'),
        callStatus: document.getElementById('callStatus'),
        callTimer: document.getElementById('callTimer'),
        listeningBadge: document.getElementById('listeningBadge'),
        micToggleBtn: document.getElementById('micToggleBtn'),
        endCallBtn: document.getElementById('endCallBtn'),
        speedBtn: document.getElementById('speedBtn')
    };

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    synthesis = window.speechSynthesis;

    // ==================== FUNCIONES DE UI ====================
    function actualizarStatus(texto, tipo = 'conectando') {
        DOM.callStatus.innerHTML = `<span class="status-dot"></span><span>${texto}</span>`;
        DOM.callStatus.classList.remove('listening', 'speaking', 'error');
        if (tipo === 'listening') DOM.callStatus.classList.add('listening');
        if (tipo === 'speaking') DOM.callStatus.classList.add('speaking');
        if (tipo === 'error') DOM.callStatus.classList.add('error');
    }

    function actualizarBadge(visible) {
        DOM.listeningBadge.style.display = visible ? 'flex' : 'none';
        if (visible) actualizarStatus('Escuchando...', 'listening');
        else if (!isBotThinking) actualizarStatus('En línea');
    }

    function mostrarToast(mensaje) {
        const toast = document.createElement('div');
        toast.style.cssText = `
            position: fixed;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(201, 169, 97, 0.9);
            color: white;
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            z-index: 3000;
            animation: fadeInOut 2s ease forwards;
            pointer-events: none;
            white-space: nowrap;
        `;
        toast.textContent = mensaje;
        document.body.appendChild(toast);
        setTimeout(() => {
            if (toast.parentNode) toast.remove();
        }, 2000);
    }

    function agregarMensaje(texto, tipo, isTyping = false) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${tipo}`;
        const icon = tipo === 'bot' ? 'fas fa-robot' : 'fas fa-user';

        if (isTyping && tipo === 'bot') {
            messageDiv.innerHTML = `<div class="message-avatar"><i class="${icon}"></i></div><div class="typing-effect"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>`;
            DOM.conversationArea.appendChild(messageDiv);
            DOM.conversationArea.scrollTop = DOM.conversationArea.scrollHeight;
            return messageDiv;
        }

        messageDiv.innerHTML = `<div class="message-avatar"><i class="${icon}"></i></div><div class="message-bubble">${texto.replace(/\n/g, '<br>')}</div>`;
        DOM.conversationArea.appendChild(messageDiv);
        DOM.conversationArea.scrollTop = DOM.conversationArea.scrollHeight;
        
        if (tipo === 'bot' && texto && isCallActive) {
            hablar(texto);
        }
        
        return messageDiv;
    }

    // ==================== TIMER ====================
    function iniciarTimer() {
        callStartTime = Date.now();
        timerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
            const minutos = Math.floor(elapsed / 60);
            const segundos = elapsed % 60;
            DOM.callTimer.textContent = `${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}`;
        }, 1000);
    }

    function detenerTimer() {
        if (timerInterval) clearInterval(timerInterval);
    }

    // ==================== SÍNTESIS DE VOZ NATURAL ====================
    function seleccionarMejorVoz() {
        const voices = synthesis.getVoices();
        if (voices.length === 0) return null;
        
        // Lista de voces por orden de naturalidad
        const vocesPreferidas = [
            'Google español',
            'Google es-es',
            'Microsoft Helena',
            'Microsoft Laura', 
            'Microsoft Pablo',
            'Monica',
            'Jorge',
            'Paulina',
            'Samantha',
            'Diego',
            'es-ES',
            'es-MX',
            'es-US'
        ];
        
        // Buscar por nombre preferido
        for (const nombrePref of vocesPreferidas) {
            const vozEncontrada = voices.find(v => 
                v.name.toLowerCase().includes(nombrePref.toLowerCase())
            );
            if (vozEncontrada) {
                console.log('🎙️ Voz seleccionada:', vozEncontrada.name, '-', vozEncontrada.lang);
                return vozEncontrada;
            }
        }
        
        // Buscar cualquier voz en español
        const vozEspanol = voices.find(v => 
            v.lang.startsWith('es-') || v.lang === 'es'
        );
        if (vozEspanol) {
            console.log('🎙️ Voz español genérica:', vozEspanol.name);
            return vozEspanol;
        }
        
        // Usar la primera disponible
        console.log('🎙️ Voz por defecto:', voices[0].name);
        return voices[0];
    }

    function hablar(texto) {
        if (!synthesis || !isCallActive) return;
        
        // Cancelar cualquier síntesis en curso
        synthesis.cancel();
        
        // Limpiar texto para mejor pronunciación
        let textoLimpio = texto
            .replace(/\*/g, '')
            .replace(/[_~`#\[\]]/g, '')
            .replace(/\n{2,}/g, '. ')
            .replace(/\n/g, ', ')
            .replace(/\s+/g, ' ')
            .replace(/📅|⏰|💆‍♂️|📍|📞|✅|❌|🌸|🖼️|🌿|✨|💆‍♀️|🌟|👋|🎤|⚠️/g, '')
            .trim();
        
        // Formatear números de teléfono para lectura natural
        textoLimpio = textoLimpio.replace(/\b(\d{2})(\d{2})(\d{2})(\d{2,4})\b/g, '$1 $2 $3 $4');
        
        // Reemplazar abreviaturas
        textoLimpio = textoLimpio
            .replace(/\bhs\b/gi, 'horas')
            .replace(/\b12:00\b/g, '12 del mediodía')
            .replace(/\b16:00\b/g, '4 de la tarde')
            .replace(/\b20:00\b/g, '8 de la noche');
        
        const utterance = new SpeechSynthesisUtterance(textoLimpio);
        
        // Configuración para voz natural
        utterance.lang = 'es-ES';
        utterance.rate = voiceSpeed;
        utterance.pitch = 1.0;
        utterance.volume = 1.0;
        
        // Seleccionar la mejor voz disponible
        const mejorVoz = seleccionarMejorVoz();
        if (mejorVoz) {
            utterance.voice = mejorVoz;
        }
        
        // Eventos
        utterance.onstart = () => {
            actualizarStatus('Hablando...', 'speaking');
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
        };
        
        utterance.onend = () => {
            if (isCallActive && isMicActive && !isBotThinking) {
                actualizarBadge(true);
                setTimeout(() => iniciarReconocimiento(), 300);
            } else {
                actualizarBadge(false);
            }
        };
        
        utterance.onerror = (event) => {
            console.log('Error de síntesis:', event.error);
            if (event.error === 'interrupted' || event.error === 'canceled') {
                return;
            }
            if (isCallActive && isMicActive && !isBotThinking) {
                actualizarBadge(true);
                setTimeout(() => iniciarReconocimiento(), 500);
            }
        };
        
        // Pequeña pausa antes de hablar (más natural)
        setTimeout(() => {
            if (isCallActive) {
                synthesis.speak(utterance);
            }
        }, 150);
    }

    // ==================== RECONOCIMIENTO DE VOZ MEJORADO ====================
    function iniciarReconocimiento() {
        if (!SpeechRecognition || !isCallActive || !isMicActive || isBotThinking) return;
        
        // Detener reconocimiento anterior
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
        
        recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = true;
        recognition.interimResults = true;
        recognition.maxAlternatives = 1;
        
        let finalTranscript = '';
        let interimTimeout = null;
        let silenceTimer = null;

        recognition.onstart = () => {
            actualizarBadge(true);
            reconnectAttempts = 0;
        };
        
        recognition.onresult = (event) => {
            if (interimTimeout) clearTimeout(interimTimeout);
            if (silenceTimer) clearTimeout(silenceTimer);
            
            let interim = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalTranscript += transcript + ' ';
                } else {
                    interim += transcript;
                }
            }
            
            if (interim) {
                actualizarStatus(`🎤 "${interim.substring(0, 40)}${interim.length > 40 ? '...' : ''}"`, 'listening');
            }
            
            // Silencio de 1.5 segundos = fin de frase
            silenceTimer = setTimeout(async () => {
                const textoUsuario = finalTranscript.trim();
                if (textoUsuario && !isBotThinking) {
                    finalTranscript = '';
                    await procesarTextoUsuario(textoUsuario);
                }
            }, 1500);
        };
        
        recognition.onerror = (event) => {
            console.log('Error de reconocimiento:', event.error);
            
            if (event.error === 'not-allowed') {
                agregarMensaje("Por favor, permite el acceso al micrófono para usar el asistente de voz.", 'bot');
                actualizarStatus('Micrófono bloqueado', 'error');
                isMicActive = false;
                DOM.micToggleBtn.classList.add('muted');
                DOM.micToggleBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
                return;
            }
            
            if (event.error === 'no-speech' || event.error === 'audio-capture') {
                if (isCallActive && isMicActive && !isBotThinking) {
                    setTimeout(() => {
                        try { recognition.start(); } catch(e) {}
                    }, 500);
                }
                return;
            }
            
            if (event.error === 'network') {
                actualizarStatus('Error de red...', 'error');
                if (isCallActive && isMicActive && !isBotThinking) {
                    setTimeout(() => {
                        try { recognition.start(); } catch(e) {}
                    }, 2000);
                }
                return;
            }
            
            // Otros errores: reintentar
            if (isCallActive && isMicActive && !isBotThinking && reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                reconnectAttempts++;
                setTimeout(() => {
                    try { recognition.start(); } catch(e) {}
                }, 1000);
            }
        };
        
        recognition.onend = () => {
            if (isCallActive && isMicActive && !isBotThinking) {
                setTimeout(() => {
                    try { recognition.start(); } catch(e) {}
                }, 300);
            }
        };
        
        try {
            recognition.start();
        } catch(e) {
            console.error('Error iniciando reconocimiento:', e);
            if (isCallActive && isMicActive) {
                setTimeout(iniciarReconocimiento, 1000);
            }
        }
    }

    // ==================== PROCESAMIENTO DE MENSAJES ====================
    async function procesarTextoUsuario(texto) {
        if (!texto.trim() || isBotThinking) return;
        
        isBotThinking = true;
        actualizarBadge(false);
        
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
        
        agregarMensaje(texto, 'user');
        const typingMsg = agregarMensaje('', 'bot', true);
        
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ tipo: 'transcripcion', texto: texto }));
        } else {
            await new Promise(resolve => setTimeout(resolve, 1500));
            if (typingMsg && typingMsg.parentNode) typingMsg.remove();
            agregarMensaje("Estoy teniendo problemas de conexión. Por favor, intenta de nuevo en un momento.", 'bot');
        }
        
        isBotThinking = false;
        
        if (isCallActive && isMicActive) {
            setTimeout(() => {
                try { if (recognition) recognition.start(); } catch(e) {}
                actualizarBadge(true);
            }, 500);
        }
    }

    // ==================== WEBSOCKET ====================
    function conectarWebSocket() {
        if (ws && ws.readyState !== WebSocket.CLOSED) {
            ws.close();
        }
        
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${protocol}//${location.host}/ws-voice`);
        
        ws.onopen = () => {
            console.log('✅ WebSocket conectado');
            actualizarStatus('En línea');
            reconnectAttempts = 0;
            
            if (isCallActive && isMicActive && !isBotThinking) {
                setTimeout(() => {
                    iniciarReconocimiento();
                    actualizarBadge(true);
                }, 500);
            }
        };
        
        ws.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.tipo === 'respuesta') {
                    // Eliminar indicador de "escribiendo..."
                    const messages = DOM.conversationArea.querySelectorAll('.message.bot');
                    const lastMessage = messages[messages.length - 1];
                    if (lastMessage && lastMessage.querySelector('.typing-effect')) {
                        lastMessage.remove();
                    }
                    
                    // Agregar respuesta del bot
                    agregarMensaje(data.texto, 'bot');
                }
            } catch (e) {
                console.error('Error procesando mensaje del servidor:', e);
            }
        };
        
        ws.onerror = (error) => {
            console.error('Error WebSocket:', error);
            actualizarStatus('Error de conexión', 'error');
        };
        
        ws.onclose = (event) => {
            console.log(`🔌 WebSocket cerrado (código: ${event.code})`);
            if (isCallActive) {
                actualizarStatus('Reconectando...', 'error');
                const delay = Math.min(1000 * Math.pow(1.5, reconnectAttempts), 10000);
                reconnectAttempts++;
                setTimeout(conectarWebSocket, delay);
            }
        };
    }

    // ==================== INICIO Y FIN DE LLAMADA ====================
    function iniciarLlamada() {
        iniciarTimer();
        conectarWebSocket();
        
        // Sonido sutil de inicio
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
            osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
            osc.start(audioCtx.currentTime);
            osc.stop(audioCtx.currentTime + 0.5);
            setTimeout(() => audioCtx.close(), 600);
        } catch(e) {}
    }

    function finalizarLlamada() {
        isCallActive = false;
        detenerTimer();
        
        if (recognition) {
            try { recognition.stop(); } catch(e) {}
        }
        
        if (synthesis) {
            synthesis.cancel();
        }
        
        if (ws) {
            ws.close();
        }
        
        agregarMensaje("👋 Llamada finalizada. Gracias por contactar Serenity Spa. ¡Hasta luego!", 'bot');
        
        setTimeout(() => {
            window.location.href = '/';
        }, 3000);
    }

    // ==================== EVENT LISTENERS ====================
    
    // Botón de velocidad de voz
    DOM.speedBtn.addEventListener('click', () => {
        currentSpeedIndex = (currentSpeedIndex + 1) % voiceSpeeds.length;
        voiceSpeed = voiceSpeeds[currentSpeedIndex];
        DOM.speedBtn.textContent = voiceSpeed + 'x';
        mostrarToast(`⚡ Velocidad: ${speedNames[currentSpeedIndex]}`);
    });

    // Botón de silenciar micrófono
    DOM.micToggleBtn.addEventListener('click', () => {
        isMicActive = !isMicActive;
        if (isMicActive) {
            DOM.micToggleBtn.innerHTML = '<i class="fas fa-microphone"></i>';
            DOM.micToggleBtn.classList.remove('muted');
            iniciarReconocimiento();
            actualizarStatus('En línea');
            mostrarToast('🎤 Micrófono activado');
        } else {
            DOM.micToggleBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
            DOM.micToggleBtn.classList.add('muted');
            if (recognition) {
                try { recognition.stop(); } catch(e) {}
            }
            actualizarBadge(false);
            actualizarStatus('Micrófono apagado');
            mostrarToast('🔇 Micrófono silenciado');
        }
    });

    // Botón de finalizar llamada
    DOM.endCallBtn.addEventListener('click', finalizarLlamada);
    
    // ==================== INICIALIZACIÓN ====================
    
    // Precargar voces disponibles
    if (synthesis) {
        synthesis.getVoices();
        synthesis.onvoiceschanged = () => {
            const voices = synthesis.getVoices();
            const vocesEspanol = voices.filter(v => v.lang.startsWith('es'));
            console.log('🎙️ Voces en español disponibles:', vocesEspanol.length);
            if (vocesEspanol.length > 0) {
                console.log('   Mejor voz:', seleccionarMejorVoz()?.name || 'No encontrada');
            }
        };
    }
    
    // Verificar soporte de SpeechRecognition
    if (!SpeechRecognition) {
        agregarMensaje("⚠️ Tu navegador no soporta reconocimiento de voz. Usa el chat escrito en la página principal.", 'bot');
        actualizarStatus('No soportado', 'error');
        isMicActive = false;
        DOM.micToggleBtn.classList.add('muted');
        DOM.micToggleBtn.innerHTML = '<i class="fas fa-microphone-slash"></i>';
    }
    
    // Iniciar llamada
    iniciarLlamada();
    
    // Manejar cierre de pestaña
    window.addEventListener('beforeunload', () => {
        if (recognition) try { recognition.stop(); } catch(e) {}
        if (synthesis) synthesis.cancel();
        if (ws) ws.close();
    });
</script>
</body>
