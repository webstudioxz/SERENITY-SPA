<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Login | Serenity Spa Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg,#1a2332,#2C3E50);
            min-height:100vh;display:flex;align-items:center;justify-content:center;
            padding:1rem;
        }
        .login-box{
            background:rgba(255,255,255,.05);
            backdrop-filter:blur(20px);
            border:1px solid rgba(255,255,255,.1);
            border-radius:24px;padding:3rem 2rem;
            width:100%;max-width:400px;text-align:center;
        }
        .login-box i{font-size:3rem;color:#C9A961;margin-bottom:1.5rem}
        .login-box h2{color:white;margin-bottom:.5rem;font-size:1.5rem}
        .login-box p{color:rgba(255,255,255,.5);margin-bottom:2rem;font-size:.9rem}
        input{
            width:100%;padding:1rem;margin-bottom:1rem;
            border:1px solid rgba(255,255,255,.1);
            border-radius:12px;background:rgba(255,255,255,.05);
            color:white;font-size:1rem;outline:none;
        }
        input:focus{border-color:#C9A961}
        button{
            width:100%;padding:1rem;
            background:linear-gradient(135deg,#C9A961,#A8883F);
            color:#1a2332;border:none;border-radius:12px;
            font-weight:700;font-size:1rem;cursor:pointer;
            touch-action:manipulation;
        }
        button:disabled{opacity:.6}
        .error{color:#f87171;margin-top:.5rem;display:none;font-size:.85rem}
        .back-link{color:rgba(255,255,255,.4);text-decoration:none;display:block;margin-top:1.5rem;font-size:.85rem}
        .back-link:hover{color:#C9A961}
    </style>
</head>
<body>
    <div class="login-box">
        <i class="fas fa-spa"></i>
        <h2>Panel Admin</h2>
        <p>Ingresá la contraseña</p>
        
        <input type="password" id="password" placeholder="Contraseña" autocomplete="off">
        <button id="loginBtn">Acceder</button>
        <p class="error" id="errorMsg">Contraseña incorrecta</p>
        
        <a href="/" class="back-link">← Volver al inicio</a>
    </div>
    
    <script>
    // Verificar si ya está logueado
    const token = sessionStorage.getItem('adminToken');
    if (token) {
        window.location.href = '/admin.html';
    }
    
    document.getElementById('loginBtn').onclick = async () => {
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const error = document.getElementById('errorMsg');
        
        if (!password) {
            error.textContent = 'Ingresá la contraseña';
            error.style.display = 'block';
            return;
        }
        
        btn.disabled = true;
        btn.textContent = 'Verificando...';
        error.style.display = 'none';
        
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ password })
            });
            
            const data = await res.json();
            
            if (data.success) {
                sessionStorage.setItem('adminToken', data.token);
                window.location.href = '/admin.html';
            } else {
                error.textContent = data.error || 'Contraseña incorrecta';
                error.style.display = 'block';
            }
        } catch(e) {
            error.textContent = 'Error de conexión';
            error.style.display = 'block';
        } finally {
            btn.disabled = false;
            btn.textContent = 'Acceder';
        }
    };
    </script>
</body>
</html>
