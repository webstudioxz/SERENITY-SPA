<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',sans-serif;
            background:linear-gradient(135deg, #0d0804 0%, #1a1008 50%, #251408 100%);
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:1.5rem;
        }
        .login-card{
            max-width:420px;
            width:100%;
            background:rgba(30,25,20,0.95);
            backdrop-filter:blur(20px);
            border-radius:28px;
            border:1px solid rgba(201,168,122,0.25);
            padding:2.5rem 2rem;
            box-shadow:0 20px 60px rgba(0,0,0,0.6);
            text-align:center;
        }
        .login-icon{
            width:72px;height:72px;
            border-radius:50%;
            background:linear-gradient(135deg,#C9A961,#A8883F);
            display:flex;align-items:center;justify-content:center;
            margin:0 auto 1.2rem;
            font-size:2rem;
            color:white;
            box-shadow:0 8px 32px rgba(201,169,97,0.3);
        }
        h1{
            font-family:'Cormorant Garamond',serif;
            font-size:1.8rem;
            color:#e8c98a;
            letter-spacing:0.05em;
        }
        .subtitle{
            color:#a8906e;
            font-size:0.85rem;
            margin-top:0.3rem;
            margin-bottom:1.8rem;
        }
        .form-group{
            margin-bottom:1.2rem;
            text-align:left;
        }
        .form-group label{
            display:block;
            font-size:0.75rem;
            font-weight:600;
            color:#a8906e;
            text-transform:uppercase;
            letter-spacing:0.08em;
            margin-bottom:0.4rem;
        }
        .form-group input{
            width:100%;
            padding:0.8rem 1rem;
            background:rgba(255,255,255,0.05);
            border:1px solid rgba(201,168,122,0.2);
            border-radius:12px;
            color:#e8d5b8;
            font-size:0.95rem;
            font-family:inherit;
            transition:all 0.3s;
        }
        .form-group input:focus{
            outline:none;
            border-color:#C9A961;
            box-shadow:0 0 0 3px rgba(201,169,97,0.1);
        }
        .form-group input::placeholder{
            color:#5a4a3a;
        }
        .btn-login{
            width:100%;
            padding:0.85rem;
            background:linear-gradient(135deg,#C9A961,#A8883F);
            border:none;
            border-radius:12px;
            color:#1a1008;
            font-size:0.95rem;
            font-weight:700;
            cursor:pointer;
            transition:all 0.3s;
            font-family:inherit;
            margin-top:0.5rem;
        }
        .btn-login:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 28px rgba(201,169,97,0.35);
        }
        .btn-login:disabled{
            opacity:0.6;
            cursor:not-allowed;
            transform:none;
        }
        .error-msg{
            background:rgba(220,38,38,0.12);
            border:1px solid rgba(220,38,38,0.3);
            border-radius:10px;
            padding:0.7rem;
            color:#f87171;
            font-size:0.8rem;
            margin-bottom:1rem;
            display:none;
        }
        .error-msg.show{display:block}
        .footer-text{
            margin-top:1.5rem;
            font-size:0.7rem;
            color:#5a4a3a;
        }
        .footer-text i{color:#C9A961}
        .spinner{
            display:inline-block;
            width:18px;
            height:18px;
            border:2px solid rgba(26,16,8,0.2);
            border-top-color:#1a1008;
            border-radius:50%;
            animation:spin 0.7s linear infinite;
            vertical-align:middle;
            margin-right:0.5rem;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
        .login-version{
            position:fixed;
            bottom:1rem;
            right:1.5rem;
            font-size:0.6rem;
            color:#3a2a1a;
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-icon">
        <i class="fas fa-spa"></i>
    </div>
    <h1>Serenity Spa</h1>
    <p class="subtitle">Panel de Administración</p>
    
    <div class="error-msg" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText">Contraseña incorrecta</span>
    </div>
    
    <form id="loginForm" autocomplete="off">
        <div class="form-group">
            <label><i class="fas fa-lock"></i> Contraseña</label>
            <input type="password" id="passwordInput" placeholder="Ingresa tu contraseña" required>
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
            <i class="fas fa-sign-in-alt"></i> Acceder
        </button>
    </form>
    
    <p class="footer-text">
        <i class="fas fa-shield-alt"></i> Acceso restringido al personal autorizado
    </p>
</div>

<div class="login-version">v1.0.0</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const form = document.getElementById('loginForm');
        const passwordInput = document.getElementById('passwordInput');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');

        // Si ya tiene token, redirigir al admin
        const token = sessionStorage.getItem('adminToken');
        if (token) {
            fetch('/api/verify', {
                headers: { 'Authorization': 'Bearer ' + token }
            })
            .then(r => r.json())
            .then(data => {
                if (data.valid) {
                    window.location.href = '/admin.html';
                } else {
                    sessionStorage.removeItem('adminToken');
                }
            })
            .catch(() => {});
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = passwordInput.value.trim();
            if (!password) {
                showError('Por favor ingresa la contraseña');
                return;
            }

            // Estado de carga
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="spinner"></span> Verificando...';
            hideError();

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });

                const data = await response.json();

                if (data.success) {
                    sessionStorage.setItem('adminToken', data.token);
                    showError('✅ Acceso concedido. Redirigiendo...', 'success');
                    loginBtn.innerHTML = '<i class="fas fa-check"></i> Accediendo...';
                    
                    setTimeout(() => {
                        window.location.href = '/admin.html';
                    }, 800);
                } else {
                    showError('❌ Contraseña incorrecta. Intenta nuevamente.');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Acceder';
                    passwordInput.value = '';
                    passwordInput.focus();
                }
            } catch (error) {
                showError('❌ Error de conexión. Verifica tu internet.');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Acceder';
            }
        });

        // Presionar Enter en el input
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                form.dispatchEvent(new Event('submit'));
            }
        });

        function showError(msg, type = 'error') {
            errorText.textContent = msg;
            errorMsg.className = 'error-msg show';
            if (type === 'success') {
                errorMsg.style.borderColor = 'rgba(16,185,129,0.3)';
                errorMsg.style.background = 'rgba(16,185,129,0.1)';
                errorText.style.color = '#10b981';
            } else {
                errorMsg.style.borderColor = 'rgba(220,38,38,0.3)';
                errorMsg.style.background = 'rgba(220,38,38,0.12)';
                errorText.style.color = '#f87171';
            }
        }

        function hideError() {
            errorMsg.className = 'error-msg';
        }
    });
</script>
</body>
</html>
