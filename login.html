<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            font-family:'Inter',sans-serif;
            background:#0d0804;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:1rem;
        }
        .login-card{
            background:#1c1009;
            border:1px solid rgba(201,168,122,0.28);
            border-radius:24px;
            padding:2.5rem 2rem;
            max-width:400px;
            width:100%;
            text-align:center;
        }
        .login-card .icon{
            font-size:2.5rem;
            color:#c9a87a;
            margin-bottom:1rem;
        }
        .login-card h1{
            font-family:'Inter',serif;
            font-size:1.5rem;
            color:#e8d5b8;
            margin-bottom:0.3rem;
        }
        .login-card p{
            color:#a8906e;
            font-size:0.85rem;
            margin-bottom:1.5rem;
        }
        .form-group{
            margin-bottom:1rem;
            text-align:left;
        }
        .form-group label{
            display:block;
            font-size:0.7rem;
            font-weight:600;
            text-transform:uppercase;
            letter-spacing:0.08em;
            color:#a8906e;
            margin-bottom:0.3rem;
        }
        .form-group input{
            width:100%;
            padding:0.7rem 1rem;
            background:#0d0804;
            border:1px solid rgba(201,168,122,0.28);
            border-radius:12px;
            color:#e8d5b8;
            font-size:0.9rem;
            font-family:inherit;
            transition:border-color 0.3s;
        }
        .form-group input:focus{
            outline:none;
            border-color:#c9a87a;
        }
        .btn-login{
            width:100%;
            padding:0.8rem;
            background:#c9a87a;
            border:none;
            border-radius:50px;
            color:#0d0804;
            font-weight:700;
            font-size:0.9rem;
            cursor:pointer;
            transition:all 0.3s;
            font-family:inherit;
        }
        .btn-login:hover{
            background:#e8c98a;
            transform:translateY(-2px);
        }
        .btn-login:disabled{
            opacity:0.6;
            cursor:not-allowed;
            transform:none;
        }
        .error-msg{
            color:#f87171;
            font-size:0.8rem;
            margin-top:0.5rem;
            min-height:1.2rem;
        }
        .back-link{
            display:inline-block;
            margin-top:1rem;
            color:#a8906e;
            font-size:0.8rem;
            text-decoration:none;
            transition:color 0.3s;
        }
        .back-link:hover{color:#c9a87a;}
        .spinner{
            display:inline-block;
            width:16px;
            height:16px;
            border:2px solid #0d0804;
            border-top-color:transparent;
            border-radius:50%;
            animation:spin 0.8s linear infinite;
            vertical-align:middle;
            margin-right:0.5rem;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon"><i class="fas fa-lock"></i></div>
        <h1>Acceso Admin</h1>
        <p>Ingresa la contraseña para administrar</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">
                <span id="btnText"><i class="fas fa-sign-in-alt"></i> Ingresar</span>
                <span id="btnLoading" style="display:none;"><span class="spinner"></span> Verificando...</span>
            </button>
            <div class="error-msg" id="errorMsg"></div>
        </form>
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');
            const errorMsg = document.getElementById('errorMsg');
            
            if (!password) {
                errorMsg.textContent = 'Ingresa la contraseña';
                return;
            }
            
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';
            errorMsg.textContent = '';
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await res.json();
                if (data.success) {
                    sessionStorage.setItem('adminToken', data.token);
                    window.location.href = '/admin.html';
                } else {
                    errorMsg.textContent = '❌ Contraseña incorrecta';
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    btnLoading.style.display = 'none';
                }
            } catch(e) {
                errorMsg.textContent = '❌ Error de conexión';
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
