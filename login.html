<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin | Serenity Spa</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #1a2332;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-container {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .login-header { text-align: center; margin-bottom: 2.5rem; }
        .login-icon {
            width: 56px; height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(201,169,97,0.15), rgba(201,169,97,0.05));
            border: 1px solid rgba(201,169,97,0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
        }
        .login-icon i { font-size: 1.5rem; color: #C9A961; }
        .login-header h2 { color: #f0ece4; font-size: 1.5rem; margin-bottom: 0.4rem; }
        .login-header p { color: rgba(255,255,255,0.35); font-size: 0.82rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            text-transform: uppercase;
        }
        .password-input-wrapper { position: relative; }
        .form-group input {
            width: 100%;
            padding: 0.85rem 2.8rem 0.85rem 1.1rem;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            background: rgba(255,255,255,0.04);
            color: #f0ece4;
            font-size: 0.95rem;
        }
        .form-group input:focus {
            outline: none;
            border-color: rgba(201,169,97,0.5);
        }
        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: rgba(255,255,255,0.25);
        }
        .btn-login {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #C9A961, #A8883F);
            color: #1a2332;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-login:hover { filter: brightness(1.1); }
        .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
        .error-message {
            color: #f87171;
            font-size: 0.8rem;
            margin-top: 0.75rem;
            text-align: center;
            display: none;
            background: rgba(248,113,113,0.08);
            padding: 0.5rem;
            border-radius: 8px;
        }
        .error-message.show { display: block; }
        .info-message {
            color: rgba(255,255,255,0.4);
            font-size: 0.7rem;
            text-align: center;
            margin-top: 1rem;
            padding: 0.5rem;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255,255,255,0.3);
            text-decoration: none;
            font-size: 0.82rem;
        }
        .back-link:hover { color: rgba(201,169,97,0.7); }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon"><i class="fas fa-spa"></i></div>
            <h2>Panel Administrativo</h2>
            <p>Acceso exclusivo para administradores</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Contraseña</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>
            <div class="error-message" id="errorMessage">Contraseña incorrecta</div>
            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-lock"></i> Acceder al Panel
            </button>
        </form>
        
        <div class="info-message">
            <i class="fas fa-info-circle"></i> Contraseña configurada en Render
        </div>
        
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
    </div>

    <script>
        (function() {
            // Verificar sesión existente - CORREGIDO: redirige a admin.html
            const token = sessionStorage.getItem('adminToken');
            if (token) {
                window.location.href = '/admin.html';
                return;
            }
            
            const form = document.getElementById('loginForm');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            
            // Toggle password
            document.getElementById('togglePassword').onclick = function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                this.classList.toggle('fa-eye-slash');
            };
            
            passwordInput.oninput = () => errorMsg.classList.remove('show');
            
            form.onsubmit = async (e) => {
                e.preventDefault();
                const password = passwordInput.value;
                if (!password) {
                    errorMsg.textContent = 'Ingrese la contraseña';
                    errorMsg.classList.add('show');
                    return;
                }
                
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> Verificando...';
                
                try {
                    const res = await fetch('/api/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ password })
                    });
                    
                    const data = await res.json();
                    
                    if (res.ok && data.success) {
                        sessionStorage.setItem('adminToken', data.token);
                        // CORREGIDO: Redirige a admin.html
                        window.location.href = '/admin.html';
                    } else {
                        errorMsg.textContent = data.error || 'Contraseña incorrecta';
                        errorMsg.classList.add('show');
                        passwordInput.value = '';
                        passwordInput.focus();
                    }
                } catch (err) {
                    errorMsg.textContent = 'Error de conexión';
                    errorMsg.classList.add('show');
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-lock"></i> Acceder al Panel';
                }
            };
        })();
    </script>
</body>
</html>
